<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>高等代数（下）复习平台</title>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        packages: {'[+]': ['ams']}
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <style>
    :root {
      --bg: #f4f7f2;
      --panel: #ffffff;
      --ink: #1f2a2e;
      --muted: #647277;
      --line: #dbe2dc;
      --brand: #2f6f63;
      --brand-dark: #204a42;
      --brand-2: #a65f3b;
      --brand-rgb: 47, 111, 99;
      --brand-2-rgb: 166, 95, 59;
      --soft: #edf4ef;
      --cream: #fff8eb;
      --wrong: #c74d47;
      --right: #2f7d52;
      --warn: #b7861c;
      --shadow: 0 18px 40px rgba(35, 48, 45, .11);
      --shadow-soft: 0 8px 22px rgba(35, 48, 45, .07);
    }

    body.dark {
      --bg: #1e1e1e;
      --panel: #252526;
      --ink: #e6e6e6;
      --muted: #a9b0b3;
      --line: #3b3f42;
      --brand: #6cc3a2;
      --brand-dark: #8ed8c1;
      --brand-2: #d7a875;
      --brand-rgb: 108, 195, 162;
      --brand-2-rgb: 215, 168, 117;
      --soft: #303735;
      --cream: #2b2925;
      --shadow: 0 14px 34px rgba(0, 0, 0, .30);
      --shadow-soft: 0 8px 22px rgba(0, 0, 0, .22);
    }

    body[data-accent="green"] {
      --brand: #2f6f63;
      --brand-dark: #204a42;
      --brand-2: #a65f3b;
      --brand-rgb: 47, 111, 99;
      --brand-2-rgb: 166, 95, 59;
      --soft: #edf4ef;
      --cream: #fff8eb;
    }

    body.dark[data-accent="green"] {
      --brand: #6cc3a2;
      --brand-dark: #8ed8c1;
      --brand-2: #d7a875;
      --brand-rgb: 108, 195, 162;
      --brand-2-rgb: 215, 168, 117;
      --soft: #303735;
      --cream: #2b2925;
    }

    body[data-accent="red"] {
      --brand: #b94242;
      --brand-dark: #7d2727;
      --brand-2: #8d6b2f;
      --brand-rgb: 185, 66, 66;
      --brand-2-rgb: 141, 107, 47;
      --soft: #f8eeee;
      --cream: #fff7eb;
    }

    body.dark[data-accent="red"] {
      --brand: #ff8a8a;
      --brand-dark: #ffb1a3;
      --brand-2: #d8b66d;
      --brand-rgb: 255, 138, 138;
      --brand-2-rgb: 216, 182, 109;
      --soft: #3b3030;
      --cream: #302923;
    }

    body[data-accent="blue"] {
      --brand: #2f67b1;
      --brand-dark: #1f477d;
      --brand-2: #5a7f92;
      --brand-rgb: 47, 103, 177;
      --brand-2-rgb: 90, 127, 146;
      --soft: #eef4fb;
      --cream: #f4f8ff;
    }

    body.dark[data-accent="blue"] {
      --brand: #86b9ff;
      --brand-dark: #b0d1ff;
      --brand-2: #7fc7d9;
      --brand-rgb: 134, 185, 255;
      --brand-2-rgb: 127, 199, 217;
      --soft: #2c3440;
      --cream: #252b32;
    }

    body[data-accent="purple"] {
      --brand: #7352a8;
      --brand-dark: #4f3778;
      --brand-2: #b05f7d;
      --brand-rgb: 115, 82, 168;
      --brand-2-rgb: 176, 95, 125;
      --soft: #f3eff8;
      --cream: #fff2f6;
    }

    body.dark[data-accent="purple"] {
      --brand: #b8a2ff;
      --brand-dark: #d1c4ff;
      --brand-2: #e59ab6;
      --brand-rgb: 184, 162, 255;
      --brand-2-rgb: 229, 154, 182;
      --soft: #342f3d;
      --cream: #312832;
    }

    body[data-accent="ink"] {
      --brand: #4c5963;
      --brand-dark: #2f3941;
      --brand-2: #8a7258;
      --brand-rgb: 76, 89, 99;
      --brand-2-rgb: 138, 114, 88;
      --soft: #eff1f2;
      --cream: #faf6ee;
    }

    body.dark[data-accent="ink"] {
      --brand: #a8b3bd;
      --brand-dark: #d4dce2;
      --brand-2: #c3ad8d;
      --brand-rgb: 168, 179, 189;
      --brand-2-rgb: 195, 173, 141;
      --soft: #303437;
      --cream: #2c2a26;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(var(--brand-rgb), .10), transparent 32%),
        linear-gradient(180deg, rgba(255, 248, 235, .82), transparent 280px),
        var(--bg);
      color: var(--ink);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }

    button, input, textarea {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 18px;
      border-right: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .90), rgba(255, 255, 255, .70)),
        var(--panel);
      backdrop-filter: blur(12px);
      overflow: auto;
    }

    body.dark aside {
      background:
        linear-gradient(180deg, rgba(37, 37, 38, .94), rgba(37, 37, 38, .78)),
        var(--panel);
    }

    .brand-card {
      position: relative;
      padding: 16px 14px 16px;
      border: 1px solid rgba(var(--brand-rgb), .20);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(var(--brand-rgb), .12), rgba(var(--brand-2-rgb), .08)),
        var(--panel);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .brand-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
    }

    .brand-lockup {
      display: grid;
      grid-template-columns: 58px 1fr;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      margin: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--brand-dark);
      font-family: "Times New Roman", serif;
      font-size: 26px;
      font-weight: 900;
      box-shadow: none;
      overflow: hidden;
    }

    .brand-mark img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      display: block;
    }

    .brand-mark-fallback {
      display: none;
    }

    .brand-name {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .brand-name img {
      display: block;
      width: min(142px, 100%);
      max-height: 34px;
      object-fit: contain;
      object-position: left center;
    }

    .brand-name-fallback {
      display: none;
      color: var(--brand-dark);
      font-size: 20px;
      font-weight: 900;
      line-height: 1.1;
    }

    .teacher-line {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .course-title {
      margin: 0;
      text-align: center;
      font-size: 32px;
      font-weight: 900;
      line-height: 1.15;
    }

    .course-subtitle {
      margin: 9px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .section-title {
      margin: 18px 0 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .modules {
      display: grid;
      gap: 8px;
    }

    .module-btn, .tab-btn, .tool-btn, .option-btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
    }

    .module-btn {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      text-align: left;
      font-weight: 800;
      box-shadow: 0 4px 12px rgba(35, 48, 45, .04);
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    .module-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(var(--brand-rgb), .45);
    }

    .module-btn.active {
      border-color: var(--brand);
      background:
        linear-gradient(135deg, rgba(var(--brand-rgb), .13), rgba(var(--brand-2-rgb), .07)),
        var(--panel);
      color: var(--brand);
      box-shadow: 0 8px 20px rgba(var(--brand-rgb), .12);
    }

    .module-progress {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    aside > .small {
      margin-top: 18px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .52);
    }

    body.dark aside > .small {
      background: rgba(255, 255, 255, .04);
    }

    main {
      min-width: 0;
      padding: 24px 28px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
      padding: 18px;
      border: 1px solid rgba(var(--brand-rgb), .14);
      border-radius: 8px;
      background: rgba(255, 255, 255, .66);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(10px);
    }

    body.dark .topbar {
      background: rgba(37, 37, 38, .88);
    }

    h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .search, .accent-select {
      width: min(360px, 100%);
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .45);
    }

    .accent-select {
      width: 118px;
      cursor: pointer;
      font-weight: 800;
      color: var(--brand);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 12px 0 16px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .55);
      box-shadow: var(--shadow-soft);
    }

    body.dark .tabs {
      background: rgba(37, 37, 38, .88);
    }

    .tab-btn, .tool-btn {
      padding: 10px 13px;
      border-radius: 8px;
      font-weight: 800;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .tab-btn:hover, .tool-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(35, 48, 45, .08);
    }

    .tab-btn.active, .tool-btn.primary {
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      border-color: var(--brand);
      color: white;
      box-shadow: 0 10px 24px rgba(var(--brand-rgb), .22);
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .78), rgba(255, 255, 255, .98)),
        var(--panel);
      box-shadow: var(--shadow-soft);
    }

    body.dark .metric {
      background: #252526;
    }

    .metric b {
      display: block;
      font-size: 24px;
      color: var(--brand-dark);
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .card {
      position: relative;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .92), rgba(255, 255, 255, .98)),
        var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    body.dark .card {
      background: #252526;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 5px;
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
    }

    .question-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .tag-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--soft) 86%, white 14%);
      color: var(--brand);
      font-size: 12px;
      font-weight: 800;
    }

    .tag.exam-tag {
      border: 1px solid color-mix(in srgb, var(--brand) 38%, var(--line));
      background: color-mix(in srgb, var(--brand) 10%, var(--panel));
      color: var(--brand);
      border-radius: 999px;
    }

    .star {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: #c8cdd0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 24px;
      line-height: 1;
      box-shadow: var(--shadow-soft);
      filter: grayscale(1) saturate(.12) brightness(1.28) opacity(.72);
    }

    .star.active {
      color: #f1b82d;
      border-color: #f1b82d;
      background: #fff7dd;
      filter: none;
      opacity: 1;
    }

    .star-glyph {
      display: block;
      width: 1em;
      height: 1em;
      line-height: 1;
      transform: translateY(-1px);
    }

    body.dark .star.active {
      background: #413719;
    }

    .stem {
      margin: 12px 0 16px;
      font-size: 19px;
      line-height: 1.75;
      font-weight: 800;
      color: var(--brand-dark);
    }

    .formula {
      display: block;
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(var(--brand-rgb), .11), rgba(var(--brand-2-rgb), .06)),
        var(--soft);
      color: var(--ink);
      font-family: "Cambria Math", "Times New Roman", serif;
      font-size: 18px;
      font-weight: 600;
    }

    .options {
      display: grid;
      gap: 10px;
      margin: 14px 0;
    }

    .option-btn {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: center;
      width: 100%;
      min-height: 50px;
      padding: 11px 13px;
      border-radius: 8px;
      text-align: left;
      line-height: 1.5;
      box-shadow: 0 4px 12px rgba(35, 48, 45, .04);
      transition: transform .14s ease, border-color .14s ease, background .14s ease;
    }

    .option-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(var(--brand-rgb), .45);
    }

    .option-key {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--brand);
      font-weight: 900;
    }

    .option-btn.selected {
      border-color: var(--brand);
      background: rgba(var(--brand-rgb), .10);
    }

    .option-btn.correct {
      border-color: var(--right);
      background: rgba(47, 125, 82, .13);
    }

    .option-btn.wrong {
      border-color: var(--wrong);
      background: rgba(199, 77, 71, .13);
    }

    .option-btn.missed {
      border-color: var(--warn);
      background: rgba(183, 134, 28, .16);
    }

    .fill-row {
      display: flex;
      gap: 8px;
      margin: 14px 0;
    }

    .fill-input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      outline: none;
      line-height: 1.55;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    .self-grade {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin: 12px 0 4px;
      padding: 10px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--soft) 58%, transparent);
    }

    .explain {
      margin-top: 16px;
      padding: 14px;
      border-left: 4px solid var(--brand);
      border-radius: 8px;
      background: var(--soft);
      line-height: 1.75;
    }

    body.dark .explain,
    body.dark .formula,
    body.dark .math-display {
      background:
        linear-gradient(135deg, rgba(var(--brand-rgb), .10), rgba(var(--brand-2-rgb), .05)),
        #303735;
    }

    body.dark .option-btn.selected {
      background: rgba(var(--brand-rgb), .16);
    }

    body.dark .option-btn.correct {
      background: rgba(47, 125, 82, .22);
    }

    body.dark .option-btn.wrong {
      background: rgba(199, 77, 71, .22);
    }

    body.dark .option-btn.missed {
      background: rgba(183, 134, 28, .22);
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .list-item {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      cursor: pointer;
      box-shadow: var(--shadow-soft);
    }

    body.dark .list-item,
    body.dark .study-card,
    body.dark .module-btn,
    body.dark .tab-btn,
    body.dark .tool-btn,
    body.dark .option-btn,
    body.dark .fill-input,
    body.dark textarea,
    body.dark .search,
    body.dark .star {
      background: #252526;
      color: #c8cdd0;
    }

    body.dark .module-btn.active {
      background:
        linear-gradient(135deg, rgba(var(--brand-rgb), .13), rgba(var(--brand-2-rgb), .07)),
        #252526;
    }

    body.dark .study-card.note-area {
      background:
        linear-gradient(135deg, rgba(var(--brand-rgb), .10), rgba(var(--brand-2-rgb), .06)),
        #252526;
    }

    body.dark .option-key,
    body.dark .tag,
    body.dark code {
      background: #303735;
    }

    .list-item:hover {
      border-color: var(--brand);
      transform: translateY(-1px);
    }

    .list-item {
      transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease;
    }

    .list-item:hover {
      box-shadow: var(--shadow);
    }

    .list-item-title {
      margin-bottom: 6px;
      font-weight: 900;
      line-height: 1.55;
    }

    .study-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .study-card {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      line-height: 1.75;
      box-shadow: var(--shadow-soft);
    }

    .study-card h3 {
      margin: 0 0 10px;
      color: var(--brand);
    }

    .study-card.note-area {
      background:
        linear-gradient(135deg, rgba(var(--brand-rgb), .11), rgba(var(--brand-2-rgb), .06)),
        var(--panel);
    }

    .study-card ul {
      margin: 0;
      padding-left: 20px;
    }

    .study-card li {
      margin: 6px 0;
    }

    .note-area {
      grid-column: 1 / -1;
    }

    .hidden {
      display: none !important;
    }

    code {
      padding: 1px 5px;
      border-radius: 5px;
      background: var(--soft);
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: .95em;
    }

    .math-inline,
    .math-display {
      font-family: "Cambria Math", "Times New Roman", "STIX Two Math", serif;
      font-weight: 600;
      color: var(--brand-dark);
    }

    .math-inline {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      vertical-align: middle;
      line-height: 1.2;
    }

    .math-display {
      display: block;
      margin: 12px 0;
      padding: 12px 14px;
      border: 1px solid rgba(var(--brand-rgb), .18);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(var(--brand-rgb), .10), rgba(var(--brand-2-rgb), .05)),
        var(--soft);
      overflow-x: auto;
      text-align: center;
      font-size: 20px;
    }

    .frac {
      display: inline-grid;
      grid-template-rows: auto auto;
      align-items: center;
      justify-items: center;
      vertical-align: middle;
      margin: 0 2px;
      line-height: 1.05;
    }

    .frac .num {

  <script>
    const filterDefs = [
      { id: "全部", label: "全部", kind: "all" },
      { id: "若当标准型", label: "若当标准型", kind: "module", module: "若当标准型" },
      { id: "实内积空间", label: "实内积空间", kind: "module", module: "实内积空间" },
      { id: "张量", label: "张量", kind: "module", module: "张量" },
      { id: "唐少强21年期末", label: "唐少强21年期末", kind: "paper", paper: "LA212" },
      { id: "唐少强23年期末", label: "唐少强23年期末", kind: "paper", paper: "LA232" }
    ];
    const modules = filterDefs.map(item => item.id);

    const questions = [
      {id:"JNF-01", module:"若当标准型", source:"特征值与特征子空间", type:"judge", stem:"若线性变换 A 可对角化，则每个特征值的几何重数等于它的代数重数。", options:["正确","错误"], answer:["A"], explain:"可对角化等价于所有特征子空间维数之和等于空间维数；对每个特征值，几何重数必须等于代数重数。", freq:"高频", diff:"基础"},
      {id:"JNF-02", module:"若当标准型", source:"若当块", type:"fill", stem:"大小为 $k$、特征值为 $\\lambda$ 的若当块通常记作 $J_k(\\lambda)$，其对角线上是 $\\lambda$，超对角线上是 ____。", answer:["1","一"], explain:"若当块 $J_k(\\lambda)=\\lambda I+N$，其中 $N$ 的超对角线上为 1，其余为 0。", freq:"高频", diff:"基础"},
      {id:"JNF-03", module:"若当标准型", source:"判定条件", type:"single", stem:"矩阵 A 可对角化的充分必要条件最准确的是？", options:["最小多项式没有重根","特征多项式没有常数项","A 的秩等于 n","A 的迹为 0"], answer:["A"], explain:"在复数域上，A 可对角化等价于最小多项式分解为互异一次因子，也就是没有重根。", freq:"高频", diff:"易错"},
      {id:"JNF-04", module:"若当标准型", source:"最小多项式", type:"single", stem:"若 $A$ 的若当标准型中，对特征值 $\\lambda$ 的最大若当块大小为 3，则最小多项式中 $(x-\\lambda)$ 的指数为？", options:["3","1","该特征值的代数重数","该特征值的几何重数"], answer:["A"], explain:"最小多项式对每个特征值的指数等于该特征值对应的最大若当块大小。", freq:"高频", diff:"基础"},
      {id:"JNF-05", module:"若当标准型", source:"几何重数", type:"single", stem:"若特征值 $\\lambda$ 对应的若当块共有 $r$ 个，则 $\\dim\\ker(A-\\lambda I)$ 等于？", options:["$r$","最大若当块大小","所有块大小之和","矩阵阶数"], answer:["A"], explain:"每个若当块贡献 1 个特征向量，所以几何重数等于该特征值的若当块个数。", freq:"高频", diff:"易错"},
      {id:"JNF-06", module:"若当标准型", source:"幂零算子", type:"judge", stem:"若 $N$ 是 $n$ 阶幂零矩阵，则 $N$ 的唯一特征值是 0。", options:["正确","错误"], answer:["A"], explain:"$N^m=0$ 时，若 $Nv=\\lambda v$，则 $N^m v=\\lambda^m v=0$，因此 $\\lambda=0$。", freq:"中高频", diff:"基础"},
      {id:"JNF-07", module:"若当标准型", source:"幂零若当块", type:"fill", stem:"大小为 $k$ 的幂零若当块 $N_k$ 满足 $N_k^k=0$，并且上一阶非零：$N_k^{\\underline{\\qquad}}\\ne0$。空格处应填 ____。", answer:["k-1"], explain:"一个 $k$ 阶幂零若当块的幂零指数是 $k$，所以 $N_k^{k-1}\\ne0$，但 $N_k^k=0$。", freq:"中高频", diff:"基础"},
      {id:"JNF-08", module:"若当标准型", source:"核维数序列", type:"multi", stem:"关于 $\\dim\\ker(A-\\lambda I)^m$，下列哪些说法正确？", options:["它随 $m$ 增大不下降","$m$ 足够大时等于 $\\lambda$ 的广义特征子空间维数","它能反映若当块大小信息","它一定等于 $m$"], answer:["A","B","C"], explain:"核维数序列可用来恢复若当块结构；它不会简单等于 $m$。", freq:"高频", diff:"易错"},
      {id:"JNF-09", module:"若当标准型", source:"广义特征向量", type:"judge", stem:"满足 $(A-\\lambda I)^r v=0$ 的非零向量一定是普通特征向量。", options:["正确","错误"], answer:["B"], explain:"它是广义特征向量；只有 $r=1$ 或 $(A-\\lambda I)v=0$ 时才是普通特征向量。", freq:"高频", diff:"易错"},
      {id:"JNF-10", module:"若当标准型", source:"特征多项式", type:"single", stem:"若若当块大小分别为 3 和 2，且特征值都为 $\\lambda$，则特征多项式中 $(x-\\lambda)$ 的指数为？", options:["5","3","2","1"], answer:["A"], explain:"特征多项式指数等于所有该特征值若当块大小之和，即代数重数。", freq:"高频", diff:"基础"},
      {id:"JNF-11", module:"若当标准型", source:"相似不变量", type:"multi", stem:"下列哪些是相似不变量？", options:["特征多项式","最小多项式","迹和行列式","矩阵所有元素之和"], answer:["A","B","C"], explain:"特征多项式、最小多项式、迹、行列式在相似下不变；所有元素之和一般不保持。", freq:"高频", diff:"基础"},
      {id:"JNF-12", module:"若当标准型", source:"手写题", type:"write", stem:"说明如何从若当标准型读出特征多项式、最小多项式和几何重数。", answer:"参考答案：\n\n1. 特征多项式：对每个特征值 $\\lambda$，把所有 $\\lambda$-若当块大小相加，得到代数重数 $a_\\lambda$，因此特征多项式为 $\\prod_\\lambda (x-\\lambda)^{a_\\lambda}$。\n2. 最小多项式：对每个特征值 $\\lambda$，取其最大若当块大小 $s_\\lambda$，因此最小多项式为 $\\prod_\\lambda (x-\\lambda)^{s_\\lambda}$。\n3. 几何重数：特征子空间维数等于 $\\lambda$-若当块个数。", explain:"三句话记住：特征多项式看总大小，最小多项式看最大块，几何重数看块个数。", freq:"高频", diff:"中等"},

      {id:"IP-01", module:"实内积空间", source:"内积定义", type:"multi", stem:"实内积需要满足哪些性质？", options:["正定性","对称性","双线性","反线性"], answer:["A","B","C"], explain:"实内积是对称、双线性、正定的。反线性是复内积空间里需要特别区分的概念。", freq:"高频", diff:"基础"},
      {id:"IP-02", module:"实内积空间", source:"范数", type:"fill", stem:"由内积诱导的范数定义为 $\\|x\\| =$ ____。", answer:["sqrt(<x,x>)","√<x,x>","根号<x,x>","sqrt(x,x)"], explain:"范数 $\\|x\\|=\\sqrt{\\langle x,x\\rangle}$。", freq:"高频", diff:"基础"},
      {id:"IP-03", module:"实内积空间", source:"Cauchy-Schwarz", type:"judge", stem:"Cauchy-Schwarz 不等式给出 $|\\langle x,y\\rangle|\\le \\|x\\|\\cdot\\|y\\|$。", options:["正确","错误"], answer:["A"], explain:"这是内积空间最核心的不等式之一，等号成立当且仅当 $x,y$ 线性相关。", freq:"高频", diff:"基础"},
      {id:"IP-04", module:"实内积空间", source:"正交", type:"single", stem:"若一组非零向量两两正交，则它们一定？", options:["线性无关","张成全空间","长度都为 1","都是特征向量"], answer:["A"], explain:"两两正交且非零可推出线性无关；不一定张成全空间，也不一定单位化。", freq:"高频", diff:"基础"},
      {id:"IP-05", module:"实内积空间", source:"标准正交基", type:"judge", stem:"标准正交基要求基向量两两正交且长度均为 1。", options:["正确","错误"], answer:["A"], explain:"orthonormal = orthogonal + normalized。", freq:"高频", diff:"基础"},
      {id:"IP-06", module:"实内积空间", source:"Gram-Schmidt", type:"single", stem:"Gram-Schmidt 正交化的目的通常是？", options:["把线性无关组化为张成同一子空间的正交组","改变子空间维数","求若当标准型","定义张量积"], answer:["A"], explain:"正交化保留张成子空间，同时把基变成正交或标准正交形式。", freq:"高频", diff:"基础"},
      {id:"IP-07", module:"实内积空间", source:"正交投影", type:"fill", stem:"若 $e$ 是单位向量，则 $x$ 在 $\\operatorname{span}(e)$ 上的正交投影是 ____ $e$。", answer:["<x,e>","(x,e)"], explain:"投影为 $\\langle x,e\\rangle e$。若 $e$ 不是单位向量，则系数为 $\\frac{\\langle x,e\\rangle}{\\langle e,e\\rangle}$。", freq:"高频", diff:"易错"},
      {id:"IP-08", module:"实内积空间", source:"正交补", type:"judge", stem:"有限维实内积空间中，$\\dim W+\\dim W^\\perp=\\dim V$。", options:["正确","错误"], answer:["A"], explain:"这是正交补的基本维数公式，并且 $V=W\\oplus W^\\perp$。", freq:"高频", diff:"基础"},
      {id:"IP-09", module:"实内积空间", source:"伴随算子", type:"single", stem:"线性算子 $T$ 的伴随 $T^*$ 满足？", options:["$\\langle Tx,y\\rangle=\\langle x,T^*y\\rangle$","$T^*x=Tx$","$\\langle Tx,y\\rangle=\\langle Ty,x\\rangle$","$T^*T=0$"], answer:["A"], explain:"伴随由内积关系定义。实标准正交基下，伴随矩阵就是转置矩阵。", freq:"高频", diff:"基础"},
      {id:"IP-10", module:"实内积空间", source:"自伴随算子", type:"judge", stem:"实内积空间中，自伴随算子在标准正交基下对应实对称矩阵。", options:["正确","错误"], answer:["A"], explain:"自伴随 $T=T^*$；在标准正交基下矩阵满足 $A=A^T$。", freq:"高频", diff:"基础"},
      {id:"IP-11", module:"实内积空间", source:"谱定理", type:"single", stem:"实对称矩阵最重要的正交对角化结论是？", options:["存在正交矩阵 Q 使 Q^T A Q 为对角矩阵","一定只有一个特征值","一定不可对角化","只能在复数域对角化"], answer:["A"], explain:"实谱定理：实对称矩阵可正交对角化，且特征值为实数，不同特征值的特征向量正交。", freq:"高频", diff:"基础"},
      {id:"IP-12", module:"实内积空间", source:"正交矩阵", type:"multi", stem:"若 Q 是实正交矩阵，则下列哪些成立？", options:["Q^T Q=I","Q^{-1}=Q^T","Q 的列向量构成标准正交组","det Q 必为 0"], answer:["A","B","C"], explain:"正交矩阵行列式为 ±1，不可能为 0。", freq:"高频", diff:"基础"},
      {id:"IP-13", module:"实内积空间", source:"二次型", type:"single", stem:"实对称矩阵 A 正定的一个等价条件是？", options:["所有特征值均为正","所有元素均为正","迹为正","行列式为 0"], answer:["A"], explain:"实对称矩阵正定等价于所有特征值正，也等价于所有顺序主子式正。", freq:"高频", diff:"易错"},
      {id:"IP-14", module:"实内积空间", source:"手写题", type:"write", stem:"写出 Gram-Schmidt 正交化的基本公式，并说明它为什么保留张成空间。", answer:"参考答案：\n\n给定线性无关组 $a_1,\\ldots,a_k$，可令\n\n$$u_1=a_1,\\qquad e_1=\\frac{u_1}{\\|u_1\\|}.$$\n\n对 $i\\ge2$，令\n\n$$u_i=a_i-\\sum_{j<i}\\langle a_i,e_j\\rangle e_j,\\qquad e_i=\\frac{u_i}{\\|u_i\\|}.$$\n\n每一步 $u_i$ 都是 $a_i$ 减去它在前面已构造子空间上的投影，所以 $u_i$ 与 $e_1,\\ldots,e_{i-1}$ 正交；同时 $a_i$ 可由 $u_1,\\ldots,u_i$ 线性表示，反过来 $u_i$ 也由 $a_1,\\ldots,a_i$ 线性表示，因此逐步保留张成空间。", explain:"高代手写题里，正交化最容易漏掉“减去投影”和“单位化”这两步。", freq:"高频", diff:"中等"},

      {id:"TEN-01", module:"张量", source:"张量积定义", type:"judge", stem:"张量积 $V\\otimes W$ 的元素一般是有限个简单张量 $v\\otimes w$ 的线性组合。", options:["正确","错误"], answer:["A"], explain:"不是所有张量都能写成单个 $v\\otimes w$；一般张量是简单张量的有限线性组合。", freq:"高频", diff:"基础"},
      {id:"TEN-02", module:"张量", source:"双线性泛性质", type:"single", stem:"张量积最核心的泛性质是把哪类映射转化为线性映射？", options:["双线性映射","仿射映射","内积映射","投影映射"], answer:["A"], explain:"任意双线性映射 $B:V\\times W\\to U$ 唯一诱导线性映射 $T:V\\otimes W\\to U$，使 $T(v\\otimes w)=B(v,w)$。", freq:"高频", diff:"基础"},
      {id:"TEN-03", module:"张量", source:"维数", type:"fill", stem:"若 $\\dim V=m$，$\\dim W=n$，则 $\\dim(V\\otimes W)=$ ____。", answer:["mn","m*n","nm","n*m"], explain:"若 $\\{e_i\\}$、$\\{f_j\\}$ 分别为基，则 $\\{e_i\\otimes f_j\\}$ 是 $V\\otimes W$ 的基，共 $mn$ 个。", freq:"高频", diff:"基础"},
      {id:"TEN-04", module:"张量", source:"基", type:"multi", stem:"若 $e_1,e_2$ 是 $V$ 的基，$f_1,f_2,f_3$ 是 $W$ 的基，则 $V\\otimes W$ 的一组基可由哪些元素组成？", options:["$e_i\\otimes f_j$ 全体","只取 $e_1\\otimes f_1$","6 个简单张量 $e_i\\otimes f_j$","任意 6 个张量"], answer:["A","C"], explain:"基由所有 $e_i\\otimes f_j$ 组成，共 $2\\times3=6$ 个；不是任意 6 个都行。", freq:"高频", diff:"基础"},
      {id:"TEN-05", module:"张量", source:"简单张量", type:"judge", stem:"若 $v\\otimes w=0$，则一定有 $v=0$ 或 $w=0$。", options:["正确","错误"], answer:["A"], explain:"在向量空间张量积中，简单张量 $v\\otimes w$ 为零当且仅当 $v=0$ 或 $w=0$。", freq:"中高频", diff:"易错"},
      {id:"TEN-06", module:"张量", source:"线性关系", type:"judge", stem:"在张量积中，$(v_1+v_2)\\otimes w=v_1\\otimes w+v_2\\otimes w$。", options:["正确","错误"], answer:["A"], explain:"张量积对每个分量都是线性的，这是由双线性关系商出来的。", freq:"高频", diff:"基础"},
      {id:"TEN-07", module:"张量", source:"线性关系", type:"single", stem:"标量 $a$ 满足 $(av)\\otimes w$ 等于？", options:["$v\\otimes(aw)$","$a(v\\otimes w)$","$(v\\otimes w)a$","以上都可在通常标量域中理解为同一张量"], answer:["D"], explain:"标量可从任一分量提出：$(av)\\otimes w=v\\otimes(aw)=a(v\\otimes w)$。", freq:"高频", diff:"基础"},
      {id:"TEN-08", module:"张量", source:"非简单张量", type:"judge", stem:"任何张量都可以写成一个简单张量 $v\\otimes w$。", options:["正确","错误"], answer:["B"], explain:"一般张量是简单张量的和。比如矩阵秩大于 1 时，对应张量通常不是单个简单张量。", freq:"高频", diff:"易错"},
      {id:"TEN-09", module:"张量", source:"与线性映射", type:"single", stem:"有限维情形下，$V^*\\otimes W$ 常可自然理解为？", options:["从 $V$ 到 $W$ 的线性映射空间 $\\operatorname{Hom}(V,W)$","$V$ 的内积空间","$W$ 的若当标准型","$V$ 与 $W$ 的交集"], answer:["A"], explain:"$\\varphi\\otimes w$ 对应线性映射 $v\\mapsto \\varphi(v)w$；有限维时 $V^*\\otimes W$ 与 $\\operatorname{Hom}(V,W)$ 自然同构。", freq:"中高频", diff:"中等"},
      {id:"TEN-10", module:"张量", source:"坐标", type:"fill", stem:"若 $v=\\sum a_i e_i$，$w=\\sum b_j f_j$，则 $v\\otimes w=\\sum$ ____ $e_i\\otimes f_j$。", answer:["a_i b_j","ai bj","a_i*b_j","aibj"], explain:"按双线性展开，坐标系数为 $a_i b_j$。", freq:"高频", diff:"基础"},
      {id:"TEN-11", module:"张量", source:"矩阵类比", type:"single", stem:"把 $\\mathbb{R}^m\\otimes\\mathbb{R}^n$ 与 $m\\times n$ 矩阵空间类比时，简单张量 $v\\otimes w$ 对应的矩阵秩通常至多为？", options:["1","2","$m+n$","$mn$"], answer:["A"], explain:"简单张量对应外积矩阵，秩至多 1；一般张量对应矩阵，可有更高秩。", freq:"中高频", diff:"易错"},
      {id:"TEN-12", module:"张量", source:"手写题", type:"write", stem:"说明张量积的泛性质，并解释为什么它能把双线性问题变成线性问题。", answer:"参考答案：\n\n张量积 $V\\otimes W$ 配有双线性映射 $\\tau:V\\times W\\to V\\otimes W$，$\\tau(v,w)=v\\otimes w$。对任意双线性映射 $B:V\\times W\\to U$，存在唯一线性映射 $T:V\\otimes W\\to U$，使得 $T(v\\otimes w)=B(v,w)$。\n\n因此，只要先规定简单张量 $v\\otimes w$ 的像为 $B(v,w)$，再按线性扩张到整个 $V\\otimes W$，就能用线性映射 $T$ 研究原来的双线性映射 $B$。", explain:"泛性质的关键词是：双线性映射、唯一线性映射、$T(v\\otimes w)=B(v,w)$。", freq:"高频", diff:"中等"},

      {id:"LA212-Q1", title:"最小二乘法近似求解三元方程组", module:"实内积空间", source:"期末真题", type:"write", longStem:true, paper:"LA212", examNo:"1", examTag:"唐少强21年期末第1题", origin:"LA212final_obsidian_refined.md", stem:String.raw`用最小二乘法近似求解方程组

$$
\begin{cases}
x_1+2x_2=6,\\
2x_1+3x_2=6,\\
3x_1+4x_2=8.
\end{cases}
$$`, answer:String.raw`参考答案：

原方程组写成 $Ax=b$，其中

$$
A=\begin{bmatrix}1&2\\2&3\\3&4\end{bmatrix},\qquad
b=\begin{bmatrix}6\\6\\8\end{bmatrix}.
$$

最小二乘解满足正规方程

$$
A^TAx=A^Tb.
$$

计算得

$$
\begin{bmatrix}14&20\\20&29\end{bmatrix}
\begin{bmatrix}x_1\\x_2\end{bmatrix}
=
\begin{bmatrix}42\\62\end{bmatrix}.
$$

解得

$$
x_1=-\frac{11}{3},\qquad x_2=\frac{14}{3}.
$$`, explain:"真题核心是把超定方程组转化为正规方程 $A^TAx=A^Tb$，不要直接把原方程组当成可精确求解。", freq:"真题", diff:"中等"},

      {id:"LA212-Q2", title:"顺序主子式与对称阵的下三角相合化", module:"实内积空间", source:"期末真题", type:"write", longStem:true, paper:"LA212", examNo:"2", examTag:"唐少强21年期末第2题", origin:"LA212final_obsidian_refined.md", stem:String.raw`若 $n$ 阶对称方阵 $A,B$ 满足

$$
B=LAL^T,
$$

其中 $L$ 为对角元素均为 $1$ 的下三角矩阵。证明：

a) $A$ 与 $B$ 的 $r$ 阶顺序主子式相等，$1\le r\le n$；

b) 若 $A$ 的各阶顺序主子式均非 $0$，则必存在对角元素均为 $1$ 的下三角矩阵 $L$，使得

$$
B=LAL^T
$$

为对角阵。`, answer:String.raw`参考答案：

a) 对 $L,A,B$ 取左上角 $r$ 阶分块。因为 $L$ 是下三角且对角元均为 $1$，左上角块 $L_{11}$ 仍是对角元均为 $1$ 的下三角矩阵，并且

$$
B_{11}=L_{11}A_{11}L_{11}^T.
$$

于是

$$
\det B_{11}=\det L_{11}\det A_{11}\det L_{11}^T=\det A_{11}.
$$

所以二者的 $r$ 阶顺序主子式相等。

b) 对阶数归纳。写

$$
A=\begin{bmatrix}A_1&\alpha^T\\ \alpha&a_2\end{bmatrix}.
$$

由顺序主子式非零可知 $A_1$ 非奇异。取

$$
\ell_1=-\alpha A_1^{-1}.
$$

则

$$
\begin{bmatrix}L_1&O\\ \ell_1&1\end{bmatrix}
\begin{bmatrix}A_1&\alpha^T\\ \alpha&a_2\end{bmatrix}
\begin{bmatrix}L_1^T&\ell_1^T\\ O&1\end{bmatrix}
=
\begin{bmatrix}
L_1A_1L_1^T&O\\
O&a_2-\alpha A_1^{-1}\alpha^T
\end{bmatrix}.
$$

由归纳假设，$L_1A_1L_1^T$ 可化为对角阵，因此整体可被对角元均为 $1$ 的下三角矩阵相合化为对角阵。`, explain:"这题容易考“顺序主子式为什么不变”和“用 Schur 补消去最后一行列”的思路。", freq:"真题", diff:"较难"},

      {id:"LA212-Q3", title:"$P_2[x]$ 上内积、正交化、对偶基、伴随算子与双线性型", module:"实内积空间", source:"期末真题", type:"write", longStem:true, paper:"LA212", examNo:"3", examTag:"唐少强21年期末第3题", origin:"LA212final_obsidian_refined.md", stem:String.raw`在线性空间 $V=P_2[x]$ 上，选定基

$$
e_1=1,\qquad e_2=x,\qquad e_3=x^2,
$$

定义

$$
(f,g)=\int_0^1 f(x)g(x)\,dx.
$$

a) 证明 $(\cdot,\cdot)$ 定义了 $V$ 上的内积；

b) 求 $(e_1,e_2,e_3)$ 下的度量阵；

c) 由 $(e_1,e_2,e_3)$ 出发，通过 Gram-Schmidt 正交化求一组单位正交基，并写出这组基下的度量阵；

d) 对 $f(x)=f_0+f_1x+f_2x^2$，定义 $I(f)=f_0+f_1+f_2$。证明 $I$ 为线性泛函；求 Riesz 表示中满足 $I(f)=(f,h)$ 的 $h$；求 $(e_1,e_2,e_3)$ 的一组对偶基；

e) 定义 $\mathcal A f=f'(x)$。求其共轭算子 $\mathcal A^*$；

f) 定义

$$
II(f,g)=f_0g_0+f_1g_1+f_2g_2.
$$

证明它为对称双线性型；求它在单位正交基下的系数方阵，并求相合标准形。`, answer:String.raw`参考答案要点：

a) 双线性和对称性由积分直接得到。正定性中，若 $\int_0^1 f^2(x)\,dx=0$，由于 $f^2(x)\ge0$ 且连续，推出 $f\equiv0$。

b) 度量阵为 Hilbert 型矩阵

$$
G=
\begin{bmatrix}
1&\frac12&\frac13\\
\frac12&\frac13&\frac14\\
\frac13&\frac14&\frac15
\end{bmatrix}.
$$

c) Gram-Schmidt 得

$$
\varepsilon_1=1,\qquad
\varepsilon_2=\sqrt3(2x-1),\qquad
\varepsilon_3=\sqrt5(6x^2-6x+1).
$$

该基为单位正交基，所以度量阵为 $I_3$。

d) 对偶基由 $G^{-1}$ 给出：

$$
G^{-1}=
\begin{bmatrix}
9&-36&30\\
-36&192&-180\\
30&-180&180
\end{bmatrix}.
$$

因此

$$
\begin{aligned}
e_1^*&=9-36x+30x^2,\\
e_2^*&=-36+192x-180x^2,\\
e_3^*&=30-180x+180x^2.
\end{aligned}
$$

又 $I(f)=f_0+f_1+f_2$，故

$$
h=e_1^*+e_2^*+e_3^*=3-24x+30x^2.
$$

e) 由 $(\mathcal Af,g)=(f,\mathcal A^*g)$，在基 $(1,x,x^2)$ 下有

$$
A^*=G^{-1}
\begin{bmatrix}0&0&0\\1&0&0\\0&2&0\end{bmatrix}
G
=
\begin{bmatrix}
-6&2&3\\
12&-24&-26\\
0&30&30
\end{bmatrix}.
$$

所以

$$
\mathcal A^*g=(-6g_0+2g_1+3g_2)+(12g_0-24g_1-26g_2)x+(30g_1+30g_2)x^2.
$$

f) $II$ 显然对称双线性。在单位正交基下系数阵为

$$
C=
\begin{bmatrix}
1&-\sqrt3&\sqrt5\\
-\sqrt3&15&-13\sqrt{15}\\
\sqrt5&-13\sqrt{15}&365
\end{bmatrix}.
$$

由于 $II$ 在原基下系数阵为 $I_3$，故 $C$ 与 $I_3$ 相合，相合标准形为 $I_3$。`, explain:"这是一道综合大题：内积定义、度量阵、正交化、Riesz 表示、伴随算子、双线性型相合标准形全串起来。", freq:"真题", diff:"困难"},

      {id:"LA232-Q1", title:"最小二乘、SVD、二次型规范形与 Gram-Schmidt", module:"实内积空间", source:"期末真题", type:"write", longStem:true, paper:"LA232", examNo:"1", examTag:"唐少强23年期末第1题", origin:"LA232final_obsidian_refined.md", stem:String.raw`1）用最小二乘法近似求解

$$
\begin{cases}
x_1-2x_2=4,\\
x_1-x_2=2,\\
x_1=1.
\end{cases}
$$

2）对矩阵

$$
\begin{bmatrix}1&2&3\\3&2&1\end{bmatrix}
$$

作奇异值分解。

3）计算

$$
f(x,y,z)=x^2+2xy+2y^2+4yz+4z^2
$$

的规范形。

4）在 $\mathcal P_2[x]$ 上定义内积

$$
(f,g)=\int_1^2 f(x)g(x)\,dx.
$$

若取 $\{x-1,(x-1)^2,1\}$ 为一组基，求对偶基中相应于 $1$ 的基向量；并由该基出发作 Gram-Schmidt 正交化求单位正交基。`, answer:String.raw`参考答案要点：

1）正规方程化简得

$$
\begin{bmatrix}1&-1&\frac73\\0&2&-3\end{bmatrix},
$$

故

$$
x_1=\frac56,\qquad x_2=-\frac32.
$$

2）设 $C=\begin{bmatrix}1&2&3\\3&2&1\end{bmatrix}$。有

$$
CC^T=\begin{bmatrix}14&10\\10&14\end{bmatrix},
$$

特征值为 $24,4$，故奇异值为 $2\sqrt6,2$。可取

$$
U=\frac1{\sqrt2}\begin{bmatrix}1&1\\1&-1\end{bmatrix},
\quad
\Sigma=\begin{bmatrix}2\sqrt6&0&0\\0&2&0\end{bmatrix},
$$

$$
V^T=
\begin{bmatrix}
\frac1{\sqrt3}&\frac1{\sqrt3}&\frac1{\sqrt3}\\
-\frac1{\sqrt2}&0&\frac1{\sqrt2}\\
\frac1{\sqrt6}&-\frac2{\sqrt6}&\frac1{\sqrt6}
\end{bmatrix}.
$$

于是 $C=U\Sigma V^T$。

3）

$$
f=(x+y)^2+(y+2z)^2,
$$

所以规范形为 $\tilde x^2+\tilde y^2$。

4）令 $y=x-1$。设对偶基中对应于 $1$ 的向量为 $e^3=ay^2+by+c$，由

$$
\int_0^1 e^3y\,dy=0,\quad
\int_0^1 e^3y^2\,dy=0,\quad
\int_0^1 e^3\,dy=1
$$

解得

$$
e^3=30y^2-36y+9=30x^2-96x+75.
$$

Gram-Schmidt 得

$$
\varepsilon_1=\sqrt3(x-1),
$$

$$
\varepsilon_2=\sqrt5\bigl(4(x-1)^2-3(x-1)\bigr),
$$

$$
\varepsilon_3=3-12(x-1)+10(x-1)^2.
$$`, explain:"这道大题把计算型考点打包：正规方程、SVD、配方法/规范形、对偶基方程组、Gram-Schmidt。", freq:"真题", diff:"困难"},

      {id:"LA232-Q2", title:"实对称矩阵同时正交对角化的充要条件", module:"实内积空间", source:"期末真题", type:"write", longStem:true, paper:"LA232", examNo:"2", examTag:"唐少强23年期末第2题", origin:"LA232final_obsidian_refined.md", stem:String.raw`$n$ 阶对称方阵 $A,B$ 可同时正交对角化（即用同一正交矩阵为过渡阵）的充要条件是 $A,B$ 可交换，即

$$
AB=BA.
$$`, answer:String.raw`参考答案要点：

必要性：若存在正交矩阵 $P$ 使

$$
PAP^T=\Lambda_1,\qquad PBP^T=\Lambda_2,
$$

其中 $\Lambda_1,\Lambda_2$ 为对角阵。对角阵可交换，因此

$$
AB=P^T\Lambda_1\Lambda_2P=P^T\Lambda_2\Lambda_1P=BA.
$$

充分性：设 $A$ 的互异特征值为 $\lambda_1,\ldots,\lambda_s$，对应特征子空间为 $V_1,\ldots,V_s$。因为 $AB=BA$，若 $v\in V_i$，则

$$
A(Bv)=B(Av)=\lambda_iBv,
$$

故 $Bv\in V_i$，即每个 $V_i$ 都是 $B$ 的不变子空间。由于 $B$ 对称，$B|_{V_i}$ 可在 $V_i$ 中取标准正交特征基。把各 $V_i$ 中的标准正交特征基合起来，即得一组同时使 $A,B$ 对角化的标准正交基。

等价地，也可先把 $A$ 正交化为

$$
\operatorname{diag}(\lambda_1I_{n_1},\ldots,\lambda_sI_{n_s}),
$$

再由交换关系推出 $B$ 在不同特征值块之间的非对角块为零，最后分别正交对角化每个对称对角块。`, explain:"证明关键：可交换使 $B$ 保持 $A$ 的每个特征子空间；实对称再保证每个限制都能正交对角化。", freq:"真题", diff:"较难"},

      {id:"LA232-Q3", title:"正定阵的秩一扰动行列式严格增大", module:"实内积空间", source:"期末真题", type:"write", longStem:true, paper:"LA232", examNo:"3", examTag:"唐少强23年期末第3题", origin:"LA232final_obsidian_refined.md", stem:String.raw`$A$ 为 $n$ 阶对称正定阵，$x$ 为 $n$ 阶非零列向量，求证：

$$
|A+xx^T|>|A|.
$$`, answer:String.raw`参考答案要点：

因为 $A$ 对称正定，存在可逆矩阵 $P$，使

$$
P^TAP=I_n.
$$

令

$$
y=P^Tx.
$$

由于 $x\ne0$ 且 $P$ 可逆，故 $y\ne0$。于是

$$
P^T(A+xx^T)P=I_n+yy^T.
$$

取正交矩阵 $Q$ 使

$$
Q^Ty=(\|y\|,0,\ldots,0)^T.
$$

则

$$
Q^T(I_n+yy^T)Q
=\operatorname{diag}(1+\|y\|^2,1,\ldots,1).
$$

所以

$$
|P^T(A+xx^T)P|=1+\|y\|^2>1=|P^TAP|.
$$

又两边分别等于 $|P|^2|A+xx^T|$ 和 $|P|^2|A|$，且 $|P|^2>0$，故

$$
|A+xx^T|>|A|.
$$`, explain:"这题可记成：正定阵先合同化为 $I$，秩一扰动变成 $I+yy^T$，它的特征/行列式一眼可读。", freq:"真题", diff:"中等"},

      {id:"LA232-Q4", title:"对称双线性型与标准正交基下对角阵", module:"实内积空间", source:"期末真题", type:"write", longStem:true, paper:"LA232", examNo:"4", examTag:"唐少强23年期末第4题", origin:"LA232final_obsidian_refined.md", stem:String.raw`在 $n$ 维内积空间 $V$ 上，求证：双线性型 $f(a,b)$ 为对称的，当且仅当 $V$ 有一组标准正交基，使 $f(a,b)$ 的度量阵为对角阵。`, answer:String.raw`参考答案要点：

必要性：若 $f$ 对称，任选标准正交基 $\{e_1,\ldots,e_n\}$。其度量阵

$$
G=(g_{ij}),\qquad g_{ij}=f(e_i,e_j)
$$

满足

$$
g_{ij}=f(e_i,e_j)=f(e_j,e_i)=g_{ji},
$$

所以 $G$ 是实对称矩阵。由实谱定理，存在正交矩阵 $P$ 使

$$
P^TGP
$$

为对角阵。令新基

$$
[\varepsilon_1,\ldots,\varepsilon_n]=[e_1,\ldots,e_n]P.
$$

因为 $P$ 正交，新基仍是标准正交基；在新基下 $f$ 的度量阵正是 $P^TGP$，故为对角阵。

充分性：若某标准正交基下 $f$ 的度量阵为对角阵 $G=\operatorname{diag}(g_1,\ldots,g_n)$，则对

$$
a=\sum x_ie_i,\qquad b=\sum y_ie_i
$$

有

$$
f(a,b)=\sum_i x_iy_ig_i=\sum_i y_ix_ig_i=f(b,a).
$$

因此 $f$ 对称。`, explain:"这题就是“对称双线性型 ↔ 实对称矩阵 ↔ 正交对角化”的语言互译。", freq:"真题", diff:"中等"}

    function escapeHTML(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function readGroup(text, start) {
      if (text[start] !== "{") return null;
      let depth = 0;
      for (let i = start; i < text.length; i++) {
        if (text[i] === "{") depth++;
        if (text[i] === "}") depth--;
        if (depth === 0) {
          return { value: text.slice(start + 1, i), end: i + 1 };
        }
      }
      return null;
    }

    function renderTeX(tex) {
      let s = String(tex || "");

      const replaceCommandWithGroups = (source, command, count, build) => {
        let out = "";
        let i = 0;
        const needle = "\\" + command;
        while (i < source.length) {
          const pos = source.indexOf(needle, i);
          if (pos < 0) {
            out += source.slice(i);
            break;
          }
          out += source.slice(i, pos);
          let cursor = pos + needle.length;
          const groups = [];
          let ok = true;
          for (let g = 0; g < count; g++) {
            while (/\s/.test(source[cursor] || "")) cursor++;
            const group = readGroup(source, cursor);
            if (!group) {
              ok = false;
              break;
            }
            groups.push(group.value);
            cursor = group.end;
          }
          if (!ok) {
            out += source.slice(pos, cursor);
            i = cursor;
          } else {
            out += build(...groups.map(renderTeX));
            i = cursor;
          }
        }
        return out;
      };

      s = replaceCommandWithGroups(s, "frac", 2, (a, b) => `<span class="frac"><span class="num">${a}</span><span class="den">${b}</span></span>`);
      s = replaceCommandWithGroups(s, "sqrt", 1, a => `<span class="sqrt"><span class="radicand">${a}</span></span>`);
      s = s.replace(/\\operatorname\{([^{}]+)\}/g, "$1");
      s = s.replace(/\\mathbb\{R\}/g, "ℝ")
        .replace(/\\mathbb\{C\}/g, "ℂ")
        .replace(/\\mathbb\{Q\}/g, "ℚ")
        .replace(/\\mathbb\{Z\}/g, "ℤ");

      const commands = {
        "\\lambda": "λ", "\\mu": "μ", "\\alpha": "α", "\\beta": "β", "\\gamma": "γ", "\\delta": "δ",
        "\\epsilon": "ε", "\\theta": "θ", "\\sigma": "σ", "\\tau": "τ", "\\phi": "φ", "\\psi": "ψ",
        "\\omega": "ω", "\\Lambda": "Λ", "\\Delta": "Δ", "\\Sigma": "Σ", "\\Omega": "Ω",
        "\\dim": "dim", "\\ker": "Ker", "\\Ker": "Ker", "\\rank": "rank", "\\tr": "tr", "\\det": "det",
        "\\span": "span", "\\Hom": "Hom", "\\End": "End", "\\operatorname": "", "\\mathrm": "",
        "\\otimes": "⊗", "\\oplus": "⊕", "\\perp": "⊥", "\\le": "≤", "\\ge": "≥", "\\neq": "≠",
        "\\ne": "≠", "\\in": "∈", "\\notin": "∉", "\\subset": "⊂", "\\subseteq": "⊆",
        "\\to": "→", "\\mapsto": "↦", "\\Rightarrow": "⇒", "\\Leftarrow": "⇐", "\\Leftrightarrow": "⇔",
        "\\cdot": "·", "\\times": "×", "\\sum": "∑", "\\prod": "∏", "\\forall": "∀", "\\exists": "∃",
        "\\langle": "⟨", "\\rangle": "⟩", "\\|": "‖"
      };
      Object.entries(commands)
        .sort((a, b) => b[0].length - a[0].length)
        .forEach(([cmd, val]) => {
          s = s.split(cmd).join(val);
        });

      s = s.replace(/([A-Za-z0-9λμθφψω\)\]\}])\^\{([^{}]+)\}/g, "$1<sup>$2</sup>");
      s = s.replace(/([A-Za-z0-9λμθφψω\)\]\}])_\{([^{}]+)\}/g, "$1<sub>$2</sub>");
      s = s.replace(/([A-Za-z0-9λμθφψω\)\]\}])\^([A-Za-z0-9+\-]+)/g, "$1<sup>$2</sup>");
      s = s.replace(/([A-Za-z0-9λμθφψω\)\]\}])_([A-Za-z0-9+\-]+)/g, "$1<sub>$2</sub>");
      s = s.replace(/\\([A-Za-z]+)/g, "$1");
      return s;
    }

    function renderMathSegments(escaped) {
      let text = escaped;
      text = text.replace(/\$\$([\s\S]+?)\$\$/g, (_, tex) => `<span class="math-display">${renderTeX(tex)}</span>`);
      text = text.replace(/\\\[([\s\S]+?)\\\]/g, (_, tex) => `<span class="math-display">${renderTeX(tex)}</span>`);
      text = text.replace(/\$([^$\n]+?)\$/g, (_, tex) => `<span class="math-inline">${renderTeX(tex)}</span>`);
      text = text.replace(/\\\((.+?)\\\)/g, (_, tex) => `<span class="math-inline">${renderTeX(tex)}</span>`);
      return text;
    }

    function inline(text) {
      if (window.marked && window.DOMPurify) {
        const { text: protectedText, restore } = protectMath(String(text || ""));
        const html = marked.parseInline(protectedText, { breaks: true, mangle: false, headerIds: false });
        return restore(DOMPurify.sanitize(html));
      }
      const chunks = [];
      let escaped = escapeHTML(text).replace(/`([^`]+)`/g, (_, code) => {
        const token = `@@CODE${chunks.length}@@`;
        chunks.push(`<code>${code}</code>`);
        return token;
      });
      escaped = renderMathSegments(escaped)
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\[\[([^\]]+)\]\]/g, "<strong>$1</strong>");
      chunks.forEach((html, i) => {
        escaped = escaped.replace(`@@CODE${i}@@`, html);
      });
      return escaped;
    }

    function protectMath(text) {
      const tokens = [];
      const stash = (match) => {
        const token = `@@MATH${tokens.length}@@`;
        tokens.push(escapeHTML(match));
        return token;
      };
      const protectedText = String(text || "")
        .replace(/\$\$[\s\S]+?\$\$/g, stash)
        .replace(/\\\[[\s\S]+?\\\]/g, stash)
        .replace(/\$[^$\n]+?\$/g, stash)
        .replace(/\\\(.+?\\\)/g, stash);
      return {
        text: protectedText,
        restore(html) {
          let out = html;
          tokens.forEach((value, i) => {
            out = out.split(`@@MATH${i}@@`).join(value);
          });
          return out;
        }
      };
    }

    function markdown(text) {
      if (window.marked && window.DOMPurify) {
        const { text: protectedText, restore } = protectMath(String(text || ""));
        const html = marked.parse(protectedText, { breaks: true, mangle: false, headerIds: false });
        return `<div class="md-block">${restore(DOMPurify.sanitize(html))}</div>`;
      }
      const lines = String(text || "").replace(/\r\n/g, "\n").split("\n");
      const html = [];
      let list = null;
      const closeList = () => {
        if (list) {
          html.push(`</${list}>`);
          list = null;
        }
      };
      lines.forEach(line => {
        if (!line.trim()) {
          closeList();
          return;
        }
        const heading = line.match(/^(#{1,4})\s+(.+)$/);
        if (heading) {
          closeList();
          const level = Math.min(4, Number(heading[1].length) + 2);
          html.push(`<h${level}>${inline(heading[2])}</h${level}>`);
          return;
        }
        const bullet = line.match(/^\s*[-*]\s+(.+)$/);
        if (bullet) {
          if (list !== "ul") {
            closeList();
            list = "ul";
            html.push("<ul>");
          }
          html.push(`<li>${inline(bullet[1])}</li>`);
          return;
        }
        const ordered = line.match(/^\s*\d+\.\s+(.+)$/);
        if (ordered) {
          if (list !== "ol") {
            closeList();
            list = "ol";
            html.push("<ol>");
          }
          html.push(`<li>${inline(ordered[1])}</li>`);
          return;
        }
        closeList();
        html.push(`<p>${inline(line)}</p>`);
      });
      closeList();
      return `<div class="md-block">${html.join("")}</div>`;
    }

    function normalize(text) {
      return String(text || "")
        .trim()
        .toLowerCase()
        .replace(/[，。；、\s]/g, "")
        .replace(/（/g, "(")
        .replace(/）/g, ")");
    }

    function currentFilter(id = state.module) {
      return filterDefs.find(item => item.id === id) || filterDefs[0];
    }

    function filterLabel(id = state.module) {
      return currentFilter(id).label;
    }

    function moduleQuestions(filterId = state.module) {
      const filter = currentFilter(filterId);
      if (filter.kind === "module") return questions.filter(q => q.module === filter.module);
      if (filter.kind === "paper") return questions.filter(q => q.paper === filter.paper);
      return questions;
    }

    function searched(list) {
      const key = state.search.trim().toLowerCase();
      if (!key) return list;
      return list.filter(q => `${q.id} ${q.title || ""} ${q.module} ${q.source} ${q.paper || ""} ${q.examTag || ""} ${q.origin || ""} ${q.stem} ${q.explain} ${q.answer}`.toLowerCase().includes(key));
    }

    function basePool() {
      let list = moduleQuestions();
      if (state.view === "wrong") list = list.filter(q => state.wrong[q.id]);
      if (state.view === "fav") list = list.filter(q => state.fav[q.id]);
      return searched(list);
    }

    function practicePool() {
      const list = basePool();
      if (state.view === "practice") {
        const undone = list.filter(q => !state.answers[q.id]);
        return undone.length ? undone : list;
      }
      return list;
    }

    function currentQuestion() {
      if (state.view === "focus" && state.focusId) {
        return questions.find(q => q.id === state.focusId) || null;
      }
      const pool = state.view === "practice" ? practicePool() : basePool();
      if (!pool.length) return null;
      state.index = Math.max(0, Math.min(state.index, pool.length - 1));
      return pool[state.index];
    }

    function answeredCount(module) {
      return moduleQuestions(module).filter(q => state.answers[q.id]).length;
    }

    function renderModules() {
      $("moduleList").innerHTML = filterDefs.map(filter => {
        const total = moduleQuestions(filter.id).length;
        const done = answeredCount(filter.id);
        return `<button class="module-btn ${state.module === filter.id ? "active" : ""}" data-module="${filter.id}">
          ${filter.label}<span class="module-progress">${done}/${total} 题</span>
        </button>`;
      }).join("");
      document.querySelectorAll(".module-btn").forEach(btn => {
        btn.onclick = () => {

          state.view = currentFilter(state.module).kind === "paper" ? "bank" : "study";

          state.selected = [];
          save();
          render();

          save();
          render();

    function answerMeta(q) {
      const record = state.answers[q.id];
      if (!record) return "";
      if (record.correct === null) return `<span class="tag">已看参考</span>`;
      return record.correct ? `<span class="tag">已答对</span>` : `<span class="tag" style="color:var(--wrong)">错题</span>`;
    }

    function renderMetrics() {
      const all = moduleQuestions();
      const answered = all.filter(q => state.answers[q.id]);
      const graded = answered.filter(q => state.answers[q.id].correct !== null);
      const right = graded.filter(q => state.answers[q.id].correct === true).length;
      $("doneMetric").textContent = answered.length;
      $("rightMetric").textContent = graded.length ? `${Math.round(right / graded.length * 100)}%` : "0%";
      $("wrongMetric").textContent = all.filter(q => state.wrong[q.id]).length;
      $("poolMetric").textContent = basePool().length;
    }

    function renderQuestion() {
      const q = currentQuestion();
      if (!q) {
        $("quizCard").innerHTML = `<div class="stem">当前没有题目。</div><div class="small">可以切换板块，或者清空搜索条件。</div>`;
        return;
      }
      const record = state.answers[q.id];
      const fav = !!state.fav[q.id];
      const done = !!record;
      const body = q.type === "fill"
        ? renderFill(q, record)
        : q.type === "write"
          ? renderWrite(q, record)
          : renderOptions(q, record);

      $("quizCard").innerHTML = `
        <div class="question-head">
          <div class="tag-row">
            <span class="tag">${q.id}</span>
            <span class="tag">${q.module}</span>
            <span class="tag">${q.source}</span>
            ${q.examTag ? `<span class="tag exam-tag">${q.examTag}</span>` : ""}
            <span class="tag">${q.freq || "中频"}</span>
            <span class="tag">${q.diff || "基础"}</span>
            ${answerMeta(q)}
          </div>
          <button class="star ${fav ? "active" : ""}" id="favBtn" title="收藏或取消收藏"><span class="star-glyph">⭐</span></button>
        </div>

        ${q.code ? `<pre>${escapeHTML(q.code)}</pre>` : ""}
        ${body}
        ${done ? `<div class="explain"><b>解析：</b>${markdown(q.explain)}${q.answer ? `<b>参考答案：</b>${markdown(Array.isArray(q.answer) ? q.answer.join(" / ") : q.answer)}` : ""}</div>` : ""}
        ${done && (q.type === "fill" || q.type === "write") ? selfGradeMarkup(record) : ""}
        <div class="toolbar">
          ${!done && q.type !== "judge" ? `<button class="tool-btn primary" id="submitBtn">提交</button>` : ""}
          ${done && state.view !== "focus" ? `<button class="tool-btn primary" id="nextBtn">下一题</button>` : ""}
          ${state.view === "focus" ? `<button class="tool-btn" id="backListBtn">返回列表</button>` : ""}
          ${state.view !== "focus" ? `<button class="tool-btn" id="prevBtn">上一题</button><button class="tool-btn" id="jumpBtn">跳至未做</button>` : ""}
          ${state.wrong[q.id] ? `<button class="tool-btn" id="clearWrongBtn">移出错题</button>` : ""}
          <button class="tool-btn" id="copyBtn">复制题目</button>
        </div>
      `;

      $("favBtn").onclick = () => {
        if (state.fav[q.id]) delete state.fav[q.id];
        else state.fav[q.id] = true;
        save();
        render();
      };
      const submitBtn = $("submitBtn");
      if (submitBtn) submitBtn.onclick = () => submit(q);
      const nextBtn = $("nextBtn");
      if (nextBtn) nextBtn.onclick = goNext;
      const backListBtn = $("backListBtn");
      if (backListBtn) backListBtn.onclick = () => {
        state.view = state.returnView || "bank";
        state.focusId = null;
        state.selected = [];
        save();
        render();
      };
      const prevBtn = $("prevBtn");
      if (prevBtn) prevBtn.onclick = goPrev;
      const jumpBtn = $("jumpBtn");
      if (jumpBtn) jumpBtn.onclick = jumpUnanswered;
      const clearWrongBtn = $("clearWrongBtn");
      if (clearWrongBtn) clearWrongBtn.onclick = () => {
        delete state.wrong[q.id];
        save();
        render();
      };
      const markRightBtn = $("markRightBtn");
      if (markRightBtn) markRightBtn.onclick = () => markSelfGrade(q.id, true);
      const markWrongBtn = $("markWrongBtn");
      if (markWrongBtn) markWrongBtn.onclick = () => markSelfGrade(q.id, false);
      $("copyBtn").onclick = () => copyQuestion(q);

      if (!done && q.type !== "write") {
        const input = $("fillInput");

        }

    function renderOptions(q, record) {
      return `<div class="options">${q.options.map((opt, i) => {
        const key = letters[i];
        const picked = record ? record.selected.includes(key) : state.selected.includes(key);
        const should = q.answer.includes(key);
        const cls = record
          ? should ? (picked ? "correct" : "missed") : picked ? "wrong" : ""
          : picked ? "selected" : "";
        return `<button class="option-btn ${cls}" data-key="${key}" ${record ? "disabled" : ""}>
          <span class="option-key">${key}</span><span>${inline(opt)}</span>
        </button>`;
      }).join("")}</div>`;
    }

    function renderFill(q, record) {
      return `<div class="fill-row">
        <input class="fill-input" id="fillInput" value="${record ? escapeHTML(record.text || "") : ""}" ${record ? "disabled" : ""} placeholder="输入答案">
        ${record ? "" : `<button class="tool-btn primary" id="fillSubmitBtn">提交</button>`}
      </div>`;
    }

    function renderWrite(q, record) {
      return `<textarea id="writeInput" ${record ? "disabled" : ""} placeholder="先自己写，再看参考答案">${record ? escapeHTML(record.text || "") : ""}</textarea>`;
    }

    function selfGradeMarkup(record) {
      const status = record.correct === null
        ? "请对照参考答案自判"
        : record.correct
          ? "你已标记为算对"
          : "你已标记为算错";
      return `<div class="self-grade">
        <span class="small">${status}</span>
        <button class="tool-btn ${record.correct === true ? "primary" : ""}" id="markRightBtn">算对</button>
        <button class="tool-btn ${record.correct === false ? "primary" : ""}" id="markWrongBtn">算错</button>
      </div>`;
    }

    function chooseOption(key) {
      const q = currentQuestion();
      if (!q || state.answers[q.id] || q.type === "fill" || q.type === "write") return;
      if (q.type === "judge") {
        state.selected = [key];
        submit(q);
        return;
      }
      if (state.selected.includes(key)) {
        state.selected = state.selected.filter(x => x !== key);
      } else {
        state.selected.push(key);
      }
      renderQuestion();
    }

    function submit(q = currentQuestion()) {
      if (!q || state.answers[q.id]) return;
      let selected = [...state.selected].sort();
      let correct = false;
      let text = "";

      if (q.type === "fill") {
        text = $("fillInput")?.value || "";
        correct = null;
        selected = [];
      } else if (q.type === "write") {
        text = $("writeInput")?.value || "";
        correct = null;
      } else {
        const expected = [...q.answer].sort();
        correct = selected.length === expected.length && selected.every((x, i) => x === expected[i]);
      }

      state.answers[q.id] = { selected, text, correct, at: Date.now() };
      if (correct === false) state.wrong[q.id] = true;
      state.selected = [];
      pushHistory(q.id);
      save();
      render();
    }

    function markSelfGrade(id, correct) {
      if (!state.answers[id]) return;
      state.answers[id].correct = correct;
      state.answers[id].gradedAt = Date.now();
      if (correct === false) state.wrong[id] = true;
      else delete state.wrong[id];
      save();
      render();
    }

    function pushHistory(id) {
      if (state.history[state.historyIndex] === id) return;
      state.history = state.history.slice(0, state.historyIndex + 1);
      state.history.push(id);
      state.historyIndex = state.history.length - 1;
    }

    function goNext() {
      if (state.historyIndex < state.history.length - 1) {
        const nextId = state.history[state.historyIndex + 1];
        const pool = basePool();
        const idx = pool.findIndex(q => q.id === nextId);
        if (idx >= 0) {
          state.historyIndex++;
          state.index = idx;
          save();
          render();
          return;
        }
      }
      jumpUnanswered();
    }

    function goPrev() {
      if (state.historyIndex <= 0) return;
      const prevId = state.history[state.historyIndex - 1];
      const pool = basePool();
      const idx = pool.findIndex(q => q.id === prevId);
      if (idx >= 0) {
        state.historyIndex--;
        state.index = idx;
        save();
        render();
      }
    }

    function jumpUnanswered() {
      const pool = basePool();
      const idx = pool.findIndex(q => !state.answers[q.id]);
      state.index = idx >= 0 ? idx : 0;
      state.selected = [];
      save();
      render();
    }

    function copyQuestion(q) {
      const answerText = Array.isArray(q.answer) ? q.answer.join(" / ") : q.answer;
      const record = state.answers[q.id];
      const user = record
        ? record.text || (record.selected || []).join(", ")
        : state.selected.join(", ");
      const text = [
        `题号：${q.id}`,
        `板块：${q.module}`,
        `题目：${q.stem}`,
        q.options ? `选项：\n${q.options.map((o, i) => `${letters[i]}. ${o}`).join("\n")}` : "",
        user ? `我的作答：${user}` : "",
        `参考答案：${answerText}`,
        `解析：${q.explain}`
      ].filter(Boolean).join("\n\n");
      navigator.clipboard?.writeText(text);
    }

    function renderList() {
      const pool = basePool();
      $("questionList").innerHTML = pool.map((q, i) => `
        <div class="list-item" data-index="${i}">
          <div class="list-item-title">${q.id} ${inline(q.title || q.stem)}</div>
          <div class="tag-row">
            <span class="tag">${q.module}</span>
            <span class="tag">${q.source}</span>
            ${q.examTag ? `<span class="tag exam-tag">${q.examTag}</span>` : ""}
            <span class="tag">${q.freq || "中频"}</span>
            <span class="tag">${q.diff || "基础"}</span>
            ${state.fav[q.id] ? `<span class="tag">已收藏</span>` : ""}
            ${state.wrong[q.id] ? `<span class="tag" style="color:var(--wrong)">错题</span>` : ""}
            ${state.answers[q.id] ? `<span class="tag">已做</span>` : `<span class="tag">未做</span>`}
          </div>
        </div>
      `).join("") || `<div class="list-item">没有匹配题目。</div>`;
      document.querySelectorAll(".list-item[data-index]").forEach(item => {
        item.onclick = () => {
          const list = basePool();
          const q = list[Number(item.dataset.index)];
          state.focusId = q ? q.id : null;
          state.returnView = state.view;
          state.view = "focus";
          state.selected = [];
          save();
          render();
        };
      });
    }

    function renderStudy() {
      const filter = currentFilter();
      const info = filter.kind === "module" ? (knowledge[filter.module] || knowledge["全部"]) : knowledge["全部"];
      const isTensor = filter.module === "张量";
      const sectionsLoaded = isTensor && state.chapter9Loaded && state.chapter9Sections;

      let chapterHTML = '';
      if (isTensor) {
        if (sectionsLoaded) {
          chapterHTML = state.chapter9Sections.map(s => `
            <div class="study-card chapter-sec">
              <h3>${escapeHTML(s.heading)}</h3>
              <div class="md-block">${markdown(s.content)}</div>
            </div>
          `).join('');
        } else {
          chapterHTML = `
            <div class="study-card note-area" style="text-align:center;padding:28px">
              <p style="margin-bottom:14px">第九章包含 9.1 线性泛函、9.2 双线性型、9.3 张量概念、9.4 张量运算、9.5 作业。</p>
              <button class="tool-btn primary" id="loadChapter9Btn">📖 加载完整章节</button>
              <p class="small" style="margin-top:10px" id="chapter9Status"></p>
            </div>
          `;
        }
      }

      $("studyView").innerHTML = `
        <div class="study-card note-area">
          <h3>${info.title}</h3>
          <div class="small">当前索引：${filter.label}</div>
        </div>
        ${info.sections.map(sec => `
          <div class="study-card">
            <h3>${sec.title}</h3>
            <ul>${sec.items.map(item => `<li>${inline(item)}</li>`).join("")}</ul>
          </div>
        `).join("")}
        ${chapterHTML}
        <div class="study-card note-area">
          <h3>我的知识补充</h3>
          <textarea id="noteInput" placeholder="把老师强调、错题总结、AI 解释粘到这里">${escapeHTML(state.notes[state.module] || "")}</textarea>
          <div class="toolbar"><button class="tool-btn primary" id="saveNoteBtn">保存补充</button></div>
          ${state.notes[state.module] ? `<h3>补充预览</h3>${markdown(state.notes[state.module])}` : `<div class="small">支持 Markdown 和 TeX：例如 \`**重点**\`、\`$\\dim\\ker(A-\\lambda I)$\`、\`$$\\frac{1}{2}\\|x\\|^2$$\`。</div>`}
        </div>
      `;

      // Load chapter button
      const loadBtn = $("loadChapter9Btn");
      if (loadBtn) {
        loadBtn.onclick = () => {
          loadBtn.disabled = true;
          loadBtn.textContent = '加载中...';
          const status = $("chapter9Status");
          if (status) status.textContent = '正在获取第九章内容...';

          fetch('tensor-ch9-content.txt')
            .then(r => { if (!r.ok) throw Error('fetch failed'); return r.text(); })
            .then(md => {
              // strip frontmatter
              const bs = md.startsWith('---') ? md.indexOf('---', 4) + 3 : 0;
              const body = md.slice(bs).trim();
              const parts = body.split(/^## /m);
              parts.shift(); // discard intro (# heading)
              const sections = parts.map(p => {
                const nl = p.indexOf('\n');
                return {
                  heading: nl > -1 ? p.slice(0, nl).trim() : p.trim(),
                  content: nl > -1 ? p.slice(nl + 1).trim() : ''
                };
              });
              state.chapter9Sections = sections;
              state.chapter9Loaded = true;
              render(); // re-render to show content
            })
            .catch(e => {
              if (status) status.textContent = '加载失败，请刷新后重试。';
              loadBtn.disabled = false;
              loadBtn.textContent = '📖 重试加载';
              console.error(e);
            });
        };
      }

      $("saveNoteBtn").onclick = () => {
        state.notes[state.module] = $("noteInput").value;
        save();
        render();
      };
    }

    function render() {
      document.body.classList.toggle("dark", state.dark);
      document.body.dataset.accent = state.accent;
      $("themeBtn").textContent = state.dark ? "亮色" : "暗色";
      $("accentSelect").value = state.accent;
      $("viewTitle").textContent = `${filterLabel()} · ${viewName()}`;
      $("viewHint").textContent = hintText();
      renderModules();
      renderTabs();
      renderMetrics();

      const isStudy = state.view === "study";
      $("quizView").classList.toggle("hidden", isStudy);
      $("studyView").classList.toggle("hidden", !isStudy);
      $("quizCard").classList.toggle("hidden", state.view === "bank" || state.view === "wrong" || state.view === "fav");
      $("questionList").classList.toggle("hidden", !(state.view === "bank" || state.view === "wrong" || state.view === "fav"));

      if (isStudy) renderStudy();
      else if (state.view === "bank" || state.view === "wrong" || state.view === "fav") renderList();
      else renderQuestion();
      save();
      typesetMath();
    }

    function typesetMath() {
      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise([document.body]).catch(() => {});
      }
    }

    function viewName() {
      return {
        practice: "刷题",
        bank: "题库",
        study: "知识库",
        wrong: "错题库",
        fav: "收藏题库",
        focus: "题目详情"
      }[state.view] || "刷题";
    }

    function hintText() {
      if (state.view === "practice") return "刷题模式优先跳到当前板块未做题；做完后可回题库复盘。";
      if (state.view === "study") return "知识库按板块梳理核心概念，并可保存自己的补充。";
      if (state.view === "focus") return "从列表打开的单题详情，不会自动跳到别的题。";
      return "点击题目可在当前列表中打开该题。";
    }

    $("searchInput").oninput = (e) => {
      state.search = e.target.value;
      state.index = 0;
      render();
    };

    $("themeBtn").onclick = () => {
      state.dark = !state.dark;
      save();
      render();
    };

    $("accentSelect").onchange = (e) => {
      state.accent = e.target.value;
      save();
      render();
    };

    document.addEventListener("click", (e) => {
      const btn = e.target.closest(".option-btn");
      if (!btn) return;
      chooseOption(btn.dataset.key);
    });

    document.addEventListener("keydown", (e) => {
      const tag = (e.target.tagName || "").toLowerCase();
      if (tag === "input" || tag === "textarea") return;
      const q = currentQuestion();
      if (!q || !["practice", "bank", "focus"].includes(state.view)) return;
      if (e.key === "Enter") {
        e.preventDefault();
        state.answers[q.id] ? goNext() : submit(q);
        return;
      }
      if (e.key.toLowerCase() === "s") {
        e.preventDefault();
        if (state.fav[q.id]) delete state.fav[q.id];
        else state.fav[q.id] = true;
        save();
        render();
        return;
      }
      const lower = e.key.toLowerCase();
      const idx = "abcd".indexOf(lower) >= 0 ? "abcd".indexOf(lower) : "1234".indexOf(e.key);
      if (idx >= 0) {
        e.preventDefault();
        chooseOption(letters[idx]);
      }
    });

    initCandidateImages();
    jumpUnanswered();
    render();
  </script>
</body>
</html>
