    }

    function normalize(text) {
      return String(text).trim().toLowerCase().replace(/\s+/g, " ");
    }

    function escapeHTML(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function inlineMarkdown(text) {
      return escapeHTML(text)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\[\[([^\]]+)\]\]/g, "<span class=\"wiki-link\">$1</span>")
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, "<span class=\"wiki-link\">$1</span>");
    }

    function renderMarkdownTable(rows) {
      const cleaned = rows
        .map(row => row.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(cell => cell.trim()))
        .filter(cells => cells.length > 1);
      if (!cleaned.length) return "";
      const hasHeader = cleaned.length > 1 && cleaned[1].every(cell => /^:?-{3,}:?$/.test(cell));
      if (!hasHeader) {
        return `<table><tbody>${cleaned.map(row => `<tr>${row.map(cell => `<td>${inlineMarkdown(cell)}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
      }
      const head = cleaned[0];
      const body = cleaned.slice(2);
      return `<table><thead><tr>${head.map(cell => `<th>${inlineMarkdown(cell)}</th>`).join("")}</tr></thead><tbody>${body.map(row => `<tr>${row.map(cell => `<td>${inlineMarkdown(cell)}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
    }

    function renderMarkdown(markdown) {
      const lines = String(markdown || "").replace(/\r\n/g, "\n").split("\n");
      const html = [];
      let inCode = false;
      let codeLines = [];
      let listType = null;
      let tableRows = [];

      const closeList = () => {
        if (listType) {
          html.push(`</${listType}>`);
          listType = null;
        }
      };
      const closeTable = () => {
        if (tableRows.length) {
          closeList();
          html.push(renderMarkdownTable(tableRows));
          tableRows = [];
        }
      };
      const openList = (type) => {
        closeTable();
        if (listType !== type) {
          closeList();
          html.push(`<${type}>`);
          listType = type;
        }
      };

      lines.forEach(line => {
        const fence = line.match(/^```/);
        if (fence) {
          closeTable();
          closeList();
          if (inCode) {
            html.push(`<pre><code>${escapeHTML(codeLines.join("\n"))}</code></pre>`);
            codeLines = [];
            inCode = false;
          } else {
            inCode = true;
          }
          return;
        }

        if (inCode) {
          codeLines.push(line);
          return;
        }

        if (!line.trim()) {
          closeTable();
          closeList();
          return;
        }

        if (/^\s*\|.*\|\s*$/.test(line)) {
          tableRows.push(line);
          return;
        }
        closeTable();

        const heading = line.match(/^(#{1,4})\s+(.+)$/);
        if (heading) {
          closeList();
          const level = heading[1].length;
          html.push(`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`);
          return;
        }

        if (/^---+$/.test(line.trim())) {
          closeList();
          html.push("<hr>");
          return;
        }

        const quote = line.match(/^>\s?(.*)$/);
        if (quote) {
          closeList();
          html.push(`<blockquote>${inlineMarkdown(quote[1])}</blockquote>`);
          return;
        }

        const task = line.match(/^\s*[-*]\s+\[( |x|X)\]\s+(.+)$/);
        if (task) {
          openList("ul");
          const checked = task[1].toLowerCase() === "x" ? " checked" : "";
          html.push(`<li><input type="checkbox" disabled${checked}> ${inlineMarkdown(task[2])}</li>`);
          return;
        }

        const bullet = line.match(/^\s*[-*]\s+(.+)$/);
        if (bullet) {
          openList("ul");
          html.push(`<li>${inlineMarkdown(bullet[1])}</li>`);
          return;
        }

        const ordered = line.match(/^\s*\d+\.\s+(.+)$/);
        if (ordered) {
          openList("ol");
          html.push(`<li>${inlineMarkdown(ordered[1])}</li>`);
          return;
        }

        closeList();
        html.push(`<p>${inlineMarkdown(line)}</p>`);
      });

      if (inCode) html.push(`<pre><code>${escapeHTML(codeLines.join("\n"))}</code></pre>`);
      closeTable();
      closeList();
      return html.join("");
    }

    function noteBody(note) {
      return state.markdownBodies[note.source] || note.body;
    }

    function loadMarkdownNotes(notes) {
      if (!window.fetch || location.protocol === "file:") return;
      notes.forEach(note => {
        if (!note.source || state.markdownStatus[note.source]) return;
        state.markdownStatus[note.source] = "loading";
        fetch(encodeURI(note.source))
          .then(response => {
            if (!response.ok) throw new Error("markdown fetch failed");
            return response.text();
          })
          .then(text => {
            state.markdownBodies[note.source] = text;
            state.markdownStatus[note.source] = "loaded";
            if (state.view === "knowledge") render();
          })
          .catch(() => {
            state.markdownStatus[note.source] = "failed";
          });
      });
    }

    function isCorrect(q, value) {
      if (q.type === "write") {
        return String(value || "").trim().length > 0;
      }
      if (q.type === "fill") {
        const v = normalize(value);
        return q.answer.some(a => normalize(a) === v);
      }
      const got = [...value].sort().join("");
      const ans = [...q.answer].sort().join("");
      return got === ans;
    }

    function isNormalPracticeMode() {
      return state.view === "practice" && !state.wrongOnly && !state.favOnly && !state.search.trim();
    }

    function compareQuestionId(a, b) {
      const aid = typeof a === "string" ? a : a.id;
      const bid = typeof b === "string" ? b : b.id;
      return aid.localeCompare(bid, "zh-Hans-CN", { numeric: true, sensitivity: "base" });
    }

    function rememberPracticeQuestion(id) {
      if (!isNormalPracticeMode()) return;
      trackPracticeView(id);
    }

    function trackPracticeView(id) {
      if (!isNormalPracticeMode() || !id) return;
      if (state.practiceHistoryIndex >= 0 && state.practiceHistory[state.practiceHistoryIndex] === id) return;

      if (state.practiceHistoryIndex >= 0 && state.practiceHistoryIndex < state.practiceHistory.length - 1) {
        state.practiceHistory = state.practiceHistory.slice(0, state.practiceHistoryIndex + 1);
      }

      const lastIndex = state.practiceHistory.length - 1;
      if (state.practiceHistory[lastIndex] === id) {
        state.practiceHistoryIndex = lastIndex;
        return;
      }

      state.practiceHistory.push(id);
      if (state.practiceHistory.length > 200) state.practiceHistory.shift();
      state.practiceHistoryIndex = state.practiceHistory.length - 1;
    }

    function practiceHistoryIdInCurrentModule(id) {
      const q = questions.find(item => item.id === id);
      return q && (state.module === "全部" || q.module === state.module);
    }

    function goPreviousPracticeQuestion() {
      if (!isNormalPracticeMode()) return false;
      let targetIndex = state.practiceHistoryIndex - 1;
      while (targetIndex >= 0 && !practiceHistoryIdInCurrentModule(state.practiceHistory[targetIndex])) targetIndex -= 1;
      if (targetIndex < 0) return false;

      state.practiceHistoryIndex = targetIndex;
      state.practiceFocusId = state.practiceHistory[targetIndex];
      state.justAnsweredId = null;
      state.index = 0;
      render();
      return true;
    }

    function goNextPracticeQuestion() {
      if (!isNormalPracticeMode()) return false;
      let targetIndex = state.practiceHistoryIndex + 1;
      while (targetIndex < state.practiceHistory.length && !practiceHistoryIdInCurrentModule(state.practiceHistory[targetIndex])) targetIndex += 1;
      if (targetIndex < state.practiceHistory.length) {
        state.practiceHistoryIndex = targetIndex;
        state.practiceFocusId = state.practiceHistory[targetIndex];
        state.justAnsweredId = null;
        state.index = 0;
        render();
        return true;
      }
      jumpToFirstUnanswered();
      render();
      return true;
    }

    function pool() {
      if (state.view === "detail" && state.focusQuestionId) {
        return questions.filter(q => q.id === state.focusQuestionId);
      }
      if (isNormalPracticeMode() && state.practiceFocusId) {
        return questions.filter(q => q.id === state.practiceFocusId && (state.module === "全部" || q.module === state.module));
      }
      let list = questions.filter(q => state.module === "全部" || q.module === state.module);
      if (state.wrongOnly || state.wrongBankOnly) list = list.filter(q => state.mistakes[q.id]);
      if (state.favOnly) list = list.filter(q => state.favorites[q.id]);
      if (state.view === "practice" && !state.wrongOnly && !state.favOnly && !state.search.trim()) {
        list = list.filter(q => !state.answers[q.id] || q.id === state.justAnsweredId);
      }
      if (state.search.trim()) {
        const s = normalize(state.search);
        list = list.filter(q => {
          const meta = getMeta(q);
          return normalize([q.id, q.module, q.source, meta.freq, meta.diff, q.stem, q.code || "", q.explain, ...(q.options || [])].join(" ")).includes(s);
        });
      }
      return list;
    }

    function jumpToFirstUnanswered() {
      if (isNormalPracticeMode()) {
        const target = questions
          .filter(q => (state.module === "全部" || q.module === state.module) && !state.answers[q.id])
          .sort(compareQuestionId)[0];
        state.practiceFocusId = target ? target.id : null;
        state.justAnsweredId = null;
        state.index = 0;
        return;
      }
      state.practiceFocusId = null;
      const list = pool();
      const bank = (state.favPractice || state.wrongPractice) ? state.practiceAnswers : state.answers;
      const candidates = list
        .map((q, index) => ({ q, index }))
        .filter(item => !bank[item.q.id])
        .sort((a, b) => compareQuestionId(a.q, b.q));
      state.index = candidates.length ? candidates[0].index : 0;
    }

    function visibleRecord(q) {
      return (state.favPractice || state.wrongPractice) ? state.practiceAnswers[q.id] : state.answers[q.id];
    }

    function currentReviewMode() {
      if (state.wrongPractice) return "wrong";
      if (state.favPractice) return "fav";
      return null;
    }

    function reviewModeTitle(mode) {
      return mode === "wrong" ? "错题" : "收藏";
    }

    function reviewEntry(mode, id) {
      return (state.reviewStats[mode] || {})[id] || null;
    }

    function reviewAttempts(entry) {
      return Number((entry && (entry.attempts || entry.rounds)) || 0);
    }

    function questionsForReviewMode(mode) {
      let list = questions.filter(q => state.module === "全部" || q.module === state.module);
      if (mode === "wrong") list = list.filter(q => state.mistakes[q.id]);
      if (mode === "fav") list = list.filter(q => state.favorites[q.id]);
      return list;
    }

    function reviewSummary(mode, list = questionsForReviewMode(mode)) {
      if (!list.length) {
        return { completedRounds: 0, currentRound: 1, currentDone: 0, total: 0 };
      }
      const attempts = list.map(q => reviewAttempts(reviewEntry(mode, q.id)));
      const completedRounds = Math.min(...attempts);
      const currentDone = attempts.filter(n => n > completedRounds).length;
      return {
        completedRounds,
        currentRound: completedRounds + 1,
        currentDone,
        total: list.length
      };
    }

    function reviewDegree(mode, id) {
      const entry = reviewEntry(mode, id);
      const attempts = reviewAttempts(entry);
      if (!attempts) {
        return { label: "未复习", className: "none", title: "还没有在二刷模式中作答过这题" };
      }
      const correct = Number(entry.correct || 0);
      const ratio = correct / attempts;
      const streak = Number(entry.streak || 0);
      if (streak >= 3) return { label: "熟练", className: "strong", title: `连续答对 ${streak} 次，累计复习 ${attempts} 次` };
      if (streak >= 2) return { label: "稳定", className: "strong", title: `连续答对 ${streak} 次，累计复习 ${attempts} 次` };
      if (entry.lastCorrect && ratio >= 0.6) return { label: "初步掌握", className: "ok", title: `最近答对，累计正确率 ${Math.round(ratio * 100)}%` };
      if (entry.lastCorrect) return { label: "复习过", className: "ok", title: `最近答对，累计复习 ${attempts} 次` };
      return { label: "需加强", className: "weak", title: `最近仍答错，累计复习 ${attempts} 次` };
    }

    function reviewTags(mode, q) {
      if (!mode) return "";
      const entry = reviewEntry(mode, q.id);
      const attempts = reviewAttempts(entry);
      const degree = reviewDegree(mode, q.id);
      return `<span class="tag review ${degree.className}" title="${escapeHTML(degree.title)}">${reviewModeTitle(mode)}二刷：${degree.label}</span><span class="tag review ${degree.className}">已复习 ${attempts} 次</span>`;
    }

    function updateReviewStats(q, ok) {
      const mode = currentReviewMode();
      if (!mode) return;
      const stats = state.reviewStats[mode];
      const entry = stats[q.id] || { attempts: 0, correct: 0, wrong: 0, streak: 0 };
      entry.attempts = reviewAttempts(entry) + 1;
      entry.rounds = entry.attempts;
      entry.correct = Number(entry.correct || 0) + (ok ? 1 : 0);
      entry.wrong = Number(entry.wrong || 0) + (ok ? 0 : 1);
      entry.streak = ok ? Number(entry.streak || 0) + 1 : 0;
      entry.lastCorrect = ok;
      entry.lastTime = Date.now();
      stats[q.id] = entry;
    }

    function renderReviewBadges() {
      [
        ["wrong", "wrongRoundBadge"],
        ["fav", "favRoundBadge"]
      ].forEach(([mode, id]) => {
        const badge = $(id);
        if (!badge) return;
        const list = questionsForReviewMode(mode);
        const summary = reviewSummary(mode, list);
        badge.textContent = `${summary.completedRounds}轮`;
        badge.classList.toggle("empty", !list.length);
        badge.title = list.length
          ? `${reviewModeTitle(mode)}库已完整二刷 ${summary.completedRounds} 轮；第 ${summary.currentRound} 轮 ${summary.currentDone}/${summary.total}`
          : `当前板块没有${reviewModeTitle(mode)}二刷题`;
      });
    }

    function getMeta(q) {
      const highIds = new Set([
        "LNX-01","LNX-02","LNX-03","LNX-04","LNX-05","CPP-01","CPP-03","CPP-04","CPP-07",
        "MPI-03","MPI-05","MPI-07","MPI-08","MPI-09","MPI-10","MPI-11","MPI-14",
        "OMP-01","OMP-04","OMP-05","OMP-07","OMP-09","OMP-10","OMP-12",
        "GPU-04","GPU-06","GPU-08","GPU-09","GPU-10","GPU-11","GPU-12","GPU-13","GPU-15",
        "PERF-01","PERF-02","PERF-03","PERF-10","PERF-11"
      ]);
      const source = q.source || "";
      const freq = q.freq || (highIds.has(q.id) || source.includes("真题") || source.includes("复习课") ? "高频" : (q.module === "Linux" || q.module === "C++" ? "中频" : "中高频"));
      let diff = q.diff;
      if (!diff) {
        if (q.type === "fill") diff = "基础";
        else if (q.type === "multi") diff = "易错";
        else if (q.stem.includes("死锁") || q.stem.includes("伪共享") || q.stem.includes("发散") || q.stem.includes("Amdahl") || q.stem.includes("隐藏延迟")) diff = "易错";
        else if (q.module === "综合/性能") diff = "中等";
        else diff = "基础";
      }
      return { freq, diff };
    }

    function renderModules() {
      const box = $("moduleList");
      box.innerHTML = "";
      modules.forEach(m => {
        const moduleQuestions = m === "全部" ? questions : questions.filter(q => q.module === m);
        const total = moduleQuestions.length;
        const done = moduleQuestions.filter(q => state.answers[q.id]).length;
        const btn = document.createElement("button");
        btn.className = "module-btn" + (state.module === m ? " active" : "");
        btn.innerHTML = `<span class="module-row"><span>${m}</span><span class="count">${done}/${total} 题</span></span>`;
        btn.onclick = () => {
          const keepWrongBank = state.view === "wrongBank";
          const keepFavBank = state.view === "favBank";
          const keepWrongPractice = state.wrongPractice;
          const keepFavPractice = state.favPractice;
          state.module = m;
          state.wrongOnly = false;
          state.favOnly = false;
          state.wrongPractice = false;
          state.favPractice = false;
          state.wrongBankOnly = false;
          if (keepWrongBank) state.wrongBankOnly = true;
          if (keepFavBank) state.favOnly = true;
          if (keepWrongPractice) {
            state.wrongOnly = true;
            state.wrongPractice = true;
            state.practiceAnswers = {};
          }
          if (keepFavPractice) {
            state.favOnly = true;
            state.favPractice = true;
            state.practiceAnswers = {};
          }
          state.focusQuestionId = null;
          state.justAnsweredId = null;
          jumpToFirstUnanswered();
          render();
        };
        box.appendChild(btn);
      });
    }

    function renderMetrics(list) {
      const allAnswers = Object.values(state.answers);
      const done = allAnswers.length;
      const right = allAnswers.filter(a => a.correct).length;
      const wrong = allAnswers.filter(a => !a.correct).length;
      const mistakes = Object.values(state.mistakes).filter(Boolean).length;
      const fav = Object.values(state.favorites).filter(Boolean).length;
      const practiceDone = pool().filter(q => state.practiceAnswers[q.id]).length;
      $("doneMetric").textContent = done;
      $("rightMetric").textContent = done ? Math.round(right / done * 100) + "%" : "0%";
      $("wrongMetric").textContent = mistakes || wrong;
      $("poolMetric").textContent = (state.favPractice || state.wrongPractice) ? `${practiceDone}/${list.length}` : (state.favOnly ? fav : list.length);
      $("poolLabel").textContent = (state.favPractice || state.wrongPractice) ? "二刷进度" : (state.favOnly ? "收藏题数" : "当前题量");
    }

    function renderCard(list) {
      const card = $("quizCard");
      if (!list.length) {
        const emptyText = (!state.wrongOnly && !state.favOnly && !state.search.trim())
          ? "这个范围的未做题已经清空了。"
          : "当前筛选下没有题目。";
        const emptyHint = (!state.wrongOnly && !state.favOnly && !state.search.trim())
          ? "可以切换其他板块，或进入错题、收藏、二刷继续复习。"
          : "换一个板块、清空搜索，或退出当前模式。";
        card.innerHTML = `<div class="stem">${emptyText}</div><div class="small">${emptyHint}</div>`;
        $("questionList").innerHTML = "";
        return;
      }
      if (state.index >= list.length) state.index = 0;
      const q = list[state.index];
      trackPracticeView(q.id);
      const record = visibleRecord(q);
      const meta = getMeta(q);
      const typeTip = q.type === "write" ? "手写题" : q.type === "fill" ? "填空题" : q.type === "judge" ? "判断题" : "选择题";
      const starred = !!state.favorites[q.id];
      const reviewMode = currentReviewMode();
      card.innerHTML = `
        <div class="question-head">
          <div>
            <div class="tagline">
              <span class="tag">${q.module}</span>
              <span class="tag">${typeTip}</span>
              <span class="tag hot">考频：${meta.freq}</span>
              <span class="tag hard">难度：${meta.diff}</span>
              <span class="tag">${q.source}</span>
              ${reviewTags(reviewMode, q)}
            </div>
            <div class="stem">${inlineMarkdown(q.stem)}</div>
            ${q.code ? `<pre class="code-snippet">${escapeHTML(q.code)}</pre>` : ""}
          </div>
          <div class="qid">
            <button class="star-btn ${starred ? "active" : ""}" id="starBtn" title="${starred ? "取消收藏" : "加入收藏"}" aria-label="${starred ? "取消收藏" : "加入收藏"}">⭐</button>
            <br>${state.index + 1} / ${list.length}<br>${q.id}
            <br><button class="copy-ai-btn" id="copyAiBtn" title="复制题目、你的作答、答案和解析，方便粘贴给 AI 继续追问">复制问AI</button>
            ${state.mistakes[q.id] ? `<br><button class="mistake-btn" id="removeMistakeBtn">移出错题</button>` : ""}
          </div>
        </div>
        <div class="answers" id="answers"></div>
        <div class="explain ${record ? "show" : ""}" id="explain">${explainText(q, record)}</div>
        ${renderAINotes(q)}
        <div class="nav">
          ${state.view === "detail"
            ? `<button class="tool-btn primary" id="backToBankBtn">返回题库</button>`
            : `<button class="tool-btn" id="prevBtn">上一题</button><button class="tool-btn primary" id="nextBtn">下一题</button>${isNormalPracticeMode() ? `<button class="tool-btn" id="jumpUnansweredBtn">跳至未做</button>` : ""}`}
        </div>
      `;
      $("starBtn").onclick = () => {
        if (state.favorites[q.id]) delete state.favorites[q.id];
        else state.favorites[q.id] = true;
        save();
        render();
      };
      $("copyAiBtn").onclick = () => copyQuestionForAI(q, $("copyAiBtn"));
      const saveNoteBtn = $("saveNoteBtn");
      if (saveNoteBtn) {
        saveNoteBtn.onclick = () => saveManualNote(q.id);
      }
      document.querySelectorAll("[data-remove-ai-note]").forEach(btn => {
        btn.onclick = () => {
          const index = Number(btn.getAttribute("data-remove-ai-note"));
          removeAINote(q.id, index);
        };
      });
      const removeMistakeBtn = $("removeMistakeBtn");
      if (removeMistakeBtn) {
        removeMistakeBtn.onclick = () => {
          delete state.mistakes[q.id];
          save();
          state.justAnsweredId = null;
          jumpToFirstUnanswered();
          render();
        };
      }
      const backToBankBtn = $("backToBankBtn");
      if (backToBankBtn) {
        backToBankBtn.onclick = () => {
          state.view = "bank";
          state.focusQuestionId = null;
          state.index = 0;
          render();
        };
      }
      const prevBtn = $("prevBtn");
      if (prevBtn) {
        prevBtn.onclick = () => {
          if (isNormalPracticeMode()) {
            goPreviousPracticeQuestion();
            return;
          }
          state.justAnsweredId = null;
          if (!state.wrongOnly && !state.favOnly && !state.search.trim()) {
            jumpToFirstUnanswered();
          } else {
            state.index = (state.index - 1 + list.length) % list.length;
          }
          render();
        };
      }
      const nextBtn = $("nextBtn");
      if (nextBtn) {
        nextBtn.onclick = () => {
          if (isNormalPracticeMode()) {
            goNextPracticeQuestion();
            return;
          }
          state.justAnsweredId = null;
          state.practiceFocusId = null;
          state.practiceHistoryIndex = -1;
          if (!state.wrongOnly && !state.favOnly && !state.search.trim()) {
            jumpToFirstUnanswered();
          } else {
            state.index = (state.index + 1) % list.length;
          }
          render();
        };
      }
      const jumpUnansweredBtn = $("jumpUnansweredBtn");
      if (jumpUnansweredBtn) {
        jumpUnansweredBtn.onclick = () => {
          jumpToFirstUnanswered();
          render();
        };
      }
      renderAnswers(q, record);
    }

    function currentPracticeContext() {
      if (state.view !== "practice") return null;
      const list = pool();
      if (!list.length) return null;
      if (state.index >= list.length) state.index = 0;
      const q = list[state.index];
      return { list, q, record: visibleRecord(q) };
    }

    function goNextQuestion() {
      const list = pool();
      if (!list.length) return;
      if (isNormalPracticeMode()) {
        goNextPracticeQuestion();
        return;
      }
      state.justAnsweredId = null;
      state.practiceFocusId = null;
      state.practiceHistoryIndex = -1;
      if (!state.wrongOnly && !state.favOnly && !state.search.trim()) {
        jumpToFirstUnanswered();
      } else {
        state.index = (state.index + 1) % list.length;
      }
      render();
    }

    function chooseOption(q, letter) {
      if (!q.options) return;
      const optionIndex = letter.charCodeAt(0) - 65;
      if (optionIndex < 0 || optionIndex >= q.options.length) return;
      if (visibleRecord(q)) return;
      if (q.type === "judge") {
        submit(q, [letter]);
        return;
      }

      const selected = new Set(state.drafts[q.id] || []);
      if (q.type === "single") {
        state.drafts[q.id] = [letter];
      } else {
        selected.has(letter) ? selected.delete(letter) : selected.add(letter);
        state.drafts[q.id] = [...selected];
      }
      render();
    }

    function submitCurrentAnswerOrNext() {
      const ctx = currentPracticeContext();
      if (!ctx) return;
      const { q, record } = ctx;
      if (record) {
        goNextQuestion();
        return;
      }
      if (q.type === "fill") {
        const input = $("fillInput");
        submit(q, input ? input.value : (state.drafts[q.id] || ""));
        return;
      }
      if (q.type === "write") {
        const input = $("writeInput");
        submit(q, input ? input.value : (state.drafts[q.id] || ""));
        return;
      }
      const selected = state.drafts[q.id] || [];
      if (selected.length) submit(q, selected);
    }

    function explainText(q, record) {
      const ans = answerText(q);
      const result = record ? (record.correct ? "答对了。" : "这题需要回看。") : "";
      const detail = detailExplain(q);
      if (q.type === "write") {
        return `<b>${record ? "已提交手写答案。" : ""}</b> 参考答案：<div class="markdown-body">${renderMarkdown(ans)}</div>${q.explain ? `<br>${inlineMarkdown(q.explain)}` : ""}${detail ? `<br><br><b>复盘提示：</b>${detail}` : ""}`;
      }
      return `<b>${result}</b> 正确答案：${inlineMarkdown(ans)}<br>${inlineMarkdown(q.explain)}${detail ? `<br><br><b>复盘提示：</b>${detail}` : ""}`;
    }

    function answerText(q) {
      if (q.type === "fill") return q.answer[0];
      if (q.type === "write") return q.answer;
      return q.answer.map(letter => {
        const index = letter.charCodeAt(0) - 65;
        return `${letter}. ${q.options[index]}`;
      }).join("；");
    }

    function formatTime(time) {
      return new Date(time).toLocaleString("zh-CN", { hour12: false });
    }

    function renderAINotes(q) {
      const notes = state.aiNotes[q.id] || [];
      return `
        <div class="ai-notes">
          <h3>本题笔记</h3>
          <div class="note-editor">
            <textarea id="manualNoteInput" placeholder="把 AI 给你的补充解释、自己的易错点、口诀或改错步骤粘贴在这里，支持简单 Markdown。"></textarea>
            <div class="note-actions">
              <button class="copy-ai-btn" id="saveNoteBtn">保存笔记</button>
            </div>
          </div>
          ${notes.map((note, index) => `
            <div class="ai-note">
              <div class="ai-note-head">
                <span class="small">${escapeHTML(note.model || "手动笔记")} · ${escapeHTML(formatTime(note.time))}</span>
                <button class="ai-note-remove" data-remove-ai-note="${index}">删除</button>
              </div>
              <div class="markdown-body">${renderMarkdown(note.content)}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function saveManualNote(qid) {
      const input = $("manualNoteInput");
      if (!input) return;
      const content = input.value.trim();
      if (!content) {
        input.focus();
        return;
      }
      const notes = state.aiNotes[qid] || [];
      notes.unshift({
        time: Date.now(),
        model: "手动笔记",
        content
      });
      state.aiNotes[qid] = notes.slice(0, 12);
      save();
      input.value = "";
      render();
    }

    function removeAINote(qid, index) {
      const notes = state.aiNotes[qid] || [];
      notes.splice(index, 1);
      if (notes.length) state.aiNotes[qid] = notes;
      else delete state.aiNotes[qid];
      save();
      render();
    }

    function hasAIConfig() {
      return false;
    }

    function configureAI() {
      alert("公开版已关闭网页内问 AI 功能。请使用“复制问AI”按钮，再把外部 AI 的回答粘贴到本题笔记。");
      return false;
    }

    function renderAIConfigButton() {
      const btn = $("aiConfigBtn");
      if (btn) btn.style.display = "none";
    }

    async function askAIForQuestion() {
      configureAI();
    }

    function userAnswerTextForAI(q) {
      let value = state.drafts[q.id];
      let status = "未提交";
      const record = visibleRecord(q) || state.answers[q.id];
      if ((value === undefined || value === null || (Array.isArray(value) && !value.length) || value === "") && record) {
        value = record.value;
        status = record.correct ? "已提交，判定为答对" : "已提交，判定为答错";
      }

      if (q.type === "fill") {
        const input = $("fillInput");
        if (input && document.activeElement === input) value = input.value;
        const text = String(value || "").trim();
        return text ? `我的作答（${status}）：${text}` : "我的作答：尚未填写";
      }

      if (q.type === "write") {
        const input = $("writeInput");
        if (input && document.activeElement === input) value = input.value;
        const text = String(value || "").trim();
        return text ? `我的作答（${status}）：\n${text}` : "我的作答：尚未书写";
      }

      const selected = Array.isArray(value) ? value : [];
      if (!selected.length) return "我的作答：尚未选择";
      const selectedText = selected
        .slice()
        .sort()
        .map(letter => {
          const index = letter.charCodeAt(0) - 65;
          const option = q.options && q.options[index] ? q.options[index] : "";
          return option ? `${letter}. ${option}` : letter;
        })
        .join("；");
      return `我的作答（${status}）：${selectedText}`;
    }

    function questionPromptForAI(q) {
      const meta = getMeta(q);
      const typeTip = q.type === "write" ? "手写题" : q.type === "fill" ? "填空题" : q.type === "judge" ? "判断题" : "选择题";
      const options = q.options && q.options.length
        ? "\n选项：\n" + q.options.map((opt, i) => `${String.fromCharCode(65 + i)}. ${opt}`).join("\n")
        : "";
      const code = q.code ? `\n代码：\n${q.code}\n` : "";
      return [
        "请你作为并行程序设计课程助教，帮我讲透下面这道题。",
        "要求：先判断考点，再解释正确答案为什么对，错误选项为什么容易混淆；如果是程序改错题，请指出具体 bug、可能后果和修改方式；最后给我一个可以背下来的判断口诀。",
        "",
        `题号：${q.id}`,
        `板块：${q.module}`,
        `题型：${typeTip}`,
        `考频：${meta.freq}`,
        `难度：${meta.diff}`,
        `来源：${q.source}`,
        "",
        `题目：${q.stem}`,
        `${code}${options}`,
        "",
        userAnswerTextForAI(q),
        `正确答案：${answerText(q)}`,
        `原解析：${q.explain}`,
        "",
        "请不要只重复答案，要用考试做题的角度讲清楚。"
      ].join("\n");
    }

    function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
      }
      const area = document.createElement("textarea");
      area.value = text;
      area.setAttribute("readonly", "");
      area.style.position = "fixed";
      area.style.left = "-9999px";
      document.body.appendChild(area);
      area.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(area);
      return ok ? Promise.resolve() : Promise.reject(new Error("copy failed"));
    }

    function copyQuestionForAI(q, btn) {
      const oldText = btn.textContent;
      copyText(questionPromptForAI(q)).then(() => {
        btn.textContent = "已复制";
        setTimeout(() => { btn.textContent = oldText; }, 1200);
      }).catch(() => {
        btn.textContent = "复制失败";
        setTimeout(() => { btn.textContent = oldText; }, 1400);
      });
    }

    function detailExplain(q) {
      const text = `${q.id} ${q.module} ${q.source} ${q.stem} ${q.code || ""}`;
      const notes = [];
      const add = (condition, note) => { if (condition) notes.push(note); };

      add(text.includes("MPI_Send") || text.includes("MPI_Recv") || text.includes("tag") || text.includes("source") || text.includes("dest"), "定位 MPI 点对点错误时按四件事逐项核对：通信器、source/dest、tag、缓冲区大小。任何一项不匹配，都可能表现为等待不返回，而不是编译错误。");
      add(text.includes("MPI_Isend") || text.includes("MPI_Irecv") || text.includes("MPI_Wait") || text.includes("非阻塞"), "非阻塞通信的关键判断是“发起不等于完成”。缓冲区在 Wait/Test 完成前不能随意释放、复用或修改。");
      add(text.includes("MPI_Reduce") || text.includes("Allreduce"), "`Reduce` 和 `Allreduce` 的核心差别不是规约运算本身，而是结果可见范围：Reduce 只保证 root 有结果，Allreduce 才是所有进程都有。");
      add(text.includes("MPI_Bcast") || text.includes("Scatter") || text.includes("Gather") || text.includes("集合通信") || text.includes("root"), "集合通信题先问“同一通信器里谁参与、参数是否一致”。root 参数、通信器和调用顺序不一致时，经常卡住。");
      add(text.includes("Comm_split") || text.includes("通信器") || text.includes("rank"), "通信器决定 rank 的编号空间。创建新通信器后要重新查询新 rank，不能把 MPI_COMM_WORLD 的 rank 直接当作子通信器 rank。");
      add(text.includes("OpenMP") || text.includes("omp") || text.includes("#pragma"), "OpenMP 改错题先看共享变量：哪些变量被多线程同时读写，哪些变量应该 private/firstprivate/reduction，再看同步是否过多或过少。");
      add(text.includes("private") || text.includes("firstprivate"), "`private` 只创建线程私有副本，初值通常未定义；要继承进入并行区前的值，应使用 `firstprivate`。");
      add(text.includes("critical") || text.includes("atomic") || text.includes("reduction"), "三种保护要分场景：求和/最大值优先 reduction，单条简单更新可用 atomic，多行互斥才考虑 critical；critical 用多了会把并行代码拖回串行。");
      add(text.includes("single") || text.includes("master") || text.includes("task") || text.includes("taskwait"), "`single` 是任意一个线程执行且默认有 barrier，`master` 只主线程执行且默认无 barrier；task 创建后可能异步执行，依赖结果前要 taskwait。");
      add(text.includes("schedule") || text.includes("static") || text.includes("dynamic") || text.includes("guided"), "调度题看负载形状：每轮工作量差不多时 static 开销小；工作量不均匀时 dynamic/guided 更容易把活分匀。");
      add(text.includes("CUDA") || text.includes("cuda") || text.includes("threadIdx") || text.includes("blockIdx") || text.includes("kernel"), "CUDA 改错题按流程扫：全局线程编号是否正确、是否有 idx < N 越界保护、cudaMemcpy 方向是否对、kernel 异步后是否需要同步。");
      add(text.includes("__syncthreads") || text.includes("__syncwarp") || text.includes("共享内存"), "`__syncthreads()` 只同步同一 block，且同一 block 中需要同步的线程都应到达；读其他线程写入的共享内存前通常需要它。");
      add(text.includes("warp") || text.includes("分支发散"), "warp 题多数考性能判断：同一 warp 内走不同分支会分批执行，结果未必错，但有效并行度下降。");
      add(text.includes("cudaMemcpy") || text.includes("HostToDevice") || text.includes("DeviceToHost"), "CUDA 拷贝方向按数据流向记：CPU 到 GPU 是 HostToDevice，GPU 回 CPU 是 DeviceToHost；方向写反常导致结果没更新。");
      add(text.includes("new") || text.includes("delete") || text.includes("指针") || text.includes("数组") || text.includes("局部变量"), "C++ 内存题先看生命周期和边界：new/delete 是否配对，数组下标是否越界，函数返回后局部变量地址是否已经失效。");
      add(text.includes("virtual") || text.includes("析构"), "通过基类指针删除派生类对象时，基类析构函数应为 virtual，否则派生类资源可能释放不完整。");
      add(text.includes("setw") || text.includes("right") || text.includes("iomanip"), "`setw` 只影响下一次输出，`right` 控制右对齐，`setprecision` 控制浮点精度；它们来自 iomanip，常用来把表格列排整齐。");
      add(text.includes("grep") || text.includes("find") || text.includes("PATH") || text.includes("vim") || text.includes("cp ") || text.includes("Shell"), "Linux/Shell 题先区分对象：grep 查内容，find 查文件，PATH 管命令搜索路径；变量展开遇到文件名空格时要想到引号。");
      add(text.includes("Amdahl") || text.includes("强可扩展") || text.includes("弱可扩展") || text.includes("加速比") || text.includes("效率"), "性能题先列公式和条件：加速比 S=Ts/Tp，效率 E=S/P；强扩展固定总规模，弱扩展固定每处理器规模，Amdahl 受串行比例限制。");
      add(text.includes("AI") || text.includes("代码审查") || text.includes("纠错"), "AI 写出的并行代码尤其要人工查“能编译但逻辑错”的地方：通信匹配、同步范围、共享写、越界保护、异步完成时机。");

      if (!notes.length) {
        notes.push("这类题不要只记答案，先判断它属于命令、内存、通信、同步、线程组织还是性能模型，再套对应检查清单。");
      }

      return `<ul class="review-points">${notes.slice(0, 3).map(note => `<li>${inlineMarkdown(note)}</li>`).join("")}</ul>`;
    }

    function renderAnswers(q, record) {
      const box = $("answers");
      if (q.type === "write") {
        const draft = state.drafts[q.id] || "";
        box.innerHTML = `
          <div class="write-row">
            <textarea class="write-input" id="writeInput" placeholder="在这里手写命令、函数参数含义或改错思路；提交后对照参考答案。"></textarea>
            <button class="tool-btn primary" id="writeSubmit">${record ? "下一题" : "提交手写答案"}</button>
          </div>
        `;
        $("writeInput").value = record ? (record.value || "") : draft;
        $("writeInput").disabled = !!record;
        $("writeSubmit").onclick = () => {
          if (record) {
            goNextQuestion();
            return;
          }
          const value = $("writeInput").value;
          if (!value.trim()) {
            $("writeInput").focus();
            return;
          }
          submit(q, value);
        };
        $("writeInput").addEventListener("input", e => {
          state.drafts[q.id] = e.target.value;
        });
        return;
      }

      if (q.type === "fill") {
        const draft = state.drafts[q.id] || "";
        box.innerHTML = `
          <div class="fill-row">
            <input class="fill-input" id="fillInput" placeholder="输入答案，大小写和多余空格会宽松处理">
            <button class="tool-btn primary" id="fillSubmit">提交</button>
          </div>
        `;
        $("fillSubmit").onclick = () => submit(q, $("fillInput").value);
        $("fillInput").value = record ? (record.value || "") : draft;
        $("fillInput").addEventListener("input", e => {
          state.drafts[q.id] = e.target.value;
        });
        $("fillInput").addEventListener("keydown", e => {
          if (e.key === "Enter") {
            e.preventDefault();
            record ? goNextQuestion() : submit(q, $("fillInput").value);
          }
        });
        return;
      }

      const selected = new Set(record ? record.value : (state.drafts[q.id] || []));
      q.options.forEach((opt, i) => {
        const letter = String.fromCharCode(65 + i);
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        if (record) {
          btn.classList.add("locked");
          if (q.answer.includes(letter) && selected.has(letter)) btn.classList.add("correct");
          if (q.type === "multi" && q.answer.includes(letter) && !selected.has(letter)) btn.classList.add("missed");
          if (q.type !== "multi" && q.answer.includes(letter)) btn.classList.add("correct");
          if (selected.has(letter) && !q.answer.includes(letter)) btn.classList.add("wrong");
        } else if (selected.has(letter)) {
          btn.classList.add("selected");
        }
        btn.innerHTML = `<span class="letter">${letter}</span><span>${opt}</span>`;
        btn.onclick = () => {
          if (record) return;
          chooseOption(q, letter);
        };
        box.appendChild(btn);
      });

      if (!record && q.type !== "judge") {
        const btn = document.createElement("button");
        btn.className = "tool-btn primary";
        btn.textContent = "提交答案";
        btn.onclick = () => {
          if (!selected.size) return;
          submit(q, [...selected]);
        };
        box.appendChild(btn);
      }
    }

    function submit(q, value) {
      const ok = isCorrect(q, value);
      delete state.drafts[q.id];
      if (state.favPractice || state.wrongPractice) {
        state.practiceAnswers[q.id] = { value, correct: ok, time: Date.now() };
        updateReviewStats(q, ok);
      }
      if (!ok) {
        state.mistakes[q.id] = true;
      }
      state.answers[q.id] = { value, correct: ok, time: Date.now() };
      rememberPracticeQuestion(q.id);
      state.justAnsweredId = (!state.wrongOnly && !state.favOnly && !state.search.trim()) ? q.id : null;
      save();
      render();
    }

    function renderList(list) {
      const box = $("questionList");
      box.innerHTML = "";
      const listReviewMode = state.wrongBankOnly ? "wrong" : (state.view === "favBank" ? "fav" : null);
      list.forEach((q, i) => {
        const record = visibleRecord(q);
        const meta = getMeta(q);
        const div = document.createElement("div");
        div.className = "mini-card";
        const mark = record ? (record.correct ? "已对" : "错题") : "未做";
        div.innerHTML = `<b>${q.id}</b> <span class="tag">${mark}</span> <span class="tag hot">${meta.freq}</span> <span class="tag hard">${meta.diff}</span> ${reviewTags(listReviewMode, q)}<br><span class="small">${inlineMarkdown(q.stem)}</span>${state.wrongBankOnly ? `<br><button class="mistake-btn" data-remove-mistake="${q.id}">移出错题</button>` : ""}`;
        const removeBtn = div.querySelector("[data-remove-mistake]");
        if (removeBtn) {
          removeBtn.onclick = (event) => {
            event.stopPropagation();
            delete state.mistakes[q.id];
            save();
            render();
          };
        }
        div.onclick = () => {
          state.focusQuestionId = q.id;
          state.index = 0;
          state.view = "detail";
          state.wrongOnly = false;
          state.wrongBankOnly = false;
          state.wrongPractice = false;
          state.favOnly = false;
          state.favPractice = false;
          state.justAnsweredId = null;
          render();
          window.scrollTo({top: 0, behavior: "smooth"});
        };
        box.appendChild(div);
      });
    }

    function renderTitle(list) {
      if (state.view === "knowledge") {
        $("viewTitle").textContent = state.module === "全部" ? "知识库" : state.module + "知识库";
        $("viewHint").textContent = "按当前板块梳理核心概念、必背清单、易错辨析和复习入口";
        return;
      }
      if (state.view === "bank") {
        $("viewTitle").textContent = state.module === "全部" ? "题库" : state.module + "题库";
        $("viewHint").textContent = state.search ? `搜索中：${state.search}` : `浏览当前范围题目，共 ${list.length} 题`;
        return;
      }
      if (state.view === "wrongBank") {
        $("viewTitle").textContent = state.module === "全部" ? "错题库" : state.module + "错题库";
        $("viewHint").textContent = `独立错题列表，共 ${list.length} 题；点题目可进入错题练习`;
        return;
      }
      if (state.view === "favBank") {
        $("viewTitle").textContent = state.module === "全部" ? "收藏题库" : state.module + "收藏题库";
        $("viewHint").textContent = `独立收藏列表，共 ${list.length} 题；点题目可进入收藏练习`;
        return;
      }
      if (state.view === "detail") {
        const q = list[0];
        $("viewTitle").textContent = q ? `${q.id} 题目详情` : "题目详情";
        $("viewHint").textContent = q ? `来自 ${q.module} / ${q.source}；题库点击后仅展示这一题` : "当前题目不存在";
        return;
      }
      $("viewTitle").textContent = state.wrongOnly ? (state.wrongPractice ? "错题库二刷" : "错题练习") : state.module + "未做题";
      if (state.favOnly) $("viewTitle").textContent = state.favPractice ? "收藏题库二刷" : "收藏题库";
      if (state.favPractice) {
        const summary = reviewSummary("fav", list);
        $("viewHint").textContent = `收藏二刷不显示历史答案；已完整二刷 ${summary.completedRounds} 轮，第 ${summary.currentRound} 轮 ${summary.currentDone}/${summary.total}；当前第 ${list.length ? state.index + 1 : 0} 题，共 ${list.length} 题`;
      } else if (state.wrongPractice) {
        const summary = reviewSummary("wrong", list);
        $("viewHint").textContent = `错题二刷不显示历史答案；已完整二刷 ${summary.completedRounds} 轮，第 ${summary.currentRound} 轮 ${summary.currentDone}/${summary.total}；当前第 ${list.length ? state.index + 1 : 0} 题，共 ${list.length} 题`;
      } else {
        $("viewHint").textContent = state.search ? `搜索中：${state.search}` : `当前第 ${list.length ? state.index + 1 : 0} 题，共 ${list.length} 题`;
      }
    }

    function renderMindMap(module) {
      const map = mindMaps[module];
      if (!map) return "";
      return `
        <div class="mind-map">
          <div class="mind-map-title">
            <b>${escapeHTML(map.title)}</b>
            <span class="tag hard">${escapeHTML(map.hint)}</span>
          </div>
          <div class="mind-map-grid">
            ${map.nodes.map(node => `
              <div class="mind-node">
                <strong>${escapeHTML(node.title)}</strong>
                <ul>${node.items.map(item => `<li>${inlineMarkdown(item)}</li>`).join("")}</ul>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderKnowledge() {
      const info = knowledge[state.module] || knowledge["全部"];
      const notes = markdownNotes[state.module] || markdownNotes["全部"];
      $("studyPanel").innerHTML = `
        <div class="study-head">
          <div>
            <h3>${escapeHTML(info.title)}</h3>
            <div class="small">${escapeHTML(info.subtitle)}</div>
          </div>
          <span class="tag hot">来自 .md 复习资料</span>
        </div>
        <div class="study-grid">
          ${info.blocks.map(block => `
            <div class="study-block">
              <b>${escapeHTML(block.title)}</b>
              <ul>${block.items.map(item => `<li>${inlineMarkdown(item)}</li>`).join("")}</ul>
            </div>
          `).join("")}
        </div>
        ${renderMindMap(state.module)}
        <div class="markdown-panel">
          ${notes.map(note => `
            <div class="markdown-card">
              <b>${escapeHTML(note.title)}</b>
              <div class="markdown-body">${renderMarkdown(noteBody(note))}</div>
              <div class="study-source">摘录来源：${escapeHTML(note.source)}</div>
            </div>
          `).join("")}
        </div>
        <div class="study-source">资料来源：${escapeHTML(info.source)}</div>
      `;
      loadMarkdownNotes(notes);
    }

    function renderThemeToggle() {
      document.body.classList.toggle("dark", state.darkMode);
      const btn = $("themeToggle");
      btn.textContent = state.darkMode ? "亮色" : "暗色";
      btn.classList.toggle("active", state.darkMode);
      btn.setAttribute("aria-pressed", state.darkMode ? "true" : "false");
      btn.title = state.darkMode ? "切换到亮色模式" : "切换到暗色模式";
    }

    function render() {
      const list = pool();
      renderModules();
      renderTitle(list);
      renderKnowledge();
      renderThemeToggle();
      renderAIConfigButton();
      renderReviewBadges();
      renderMetrics(list);
      renderCard(list);
      renderList(list);
      $("studyPanel").style.display = state.view === "knowledge" ? "block" : "none";
      $("quizView").style.display = state.view === "knowledge" ? "none" : "block";
      $("quizCard").style.display = (state.view === "practice" || state.view === "detail") ? "block" : "none";
      $("questionList").style.display = (state.view === "bank" || state.view === "wrongBank" || state.view === "favBank") ? "grid" : "none";
      $("quizTab").classList.toggle("active", state.view === "practice" && !state.wrongOnly && !state.favOnly);
      $("bankTab").classList.toggle("active", state.view === "bank");
      $("wrongBankTab").classList.toggle("active", state.view === "wrongBank");
      $("wrongPracticeTab").classList.toggle("active", state.view === "practice" && state.wrongPractice);
      $("favBankTab").classList.toggle("active", state.view === "favBank");
      $("favPracticeTab").classList.toggle("active", state.view === "practice" && state.favOnly && state.favPractice);
      $("knowledgeTab").classList.toggle("active", state.view === "knowledge");
      $("searchInput").style.display = (state.view === "bank" || state.view === "wrongBank" || state.view === "favBank") ? "block" : "none";
    }

    $("searchInput").addEventListener("input", e => {
      state.search = e.target.value;
      state.index = 0;
      render();
    });

    $("themeToggle").onclick = () => {
      state.darkMode = !state.darkMode;
      localStorage.setItem("ppd_dark_mode", state.darkMode ? "true" : "false");
      render();
    };

    if ($("aiConfigBtn")) {
      $("aiConfigBtn").onclick = () => {
        configureAI();
      };
    }

    document.addEventListener("keydown", e => {
      if (e.ctrlKey || e.altKey || e.metaKey) return;
      if (state.view !== "practice") return;
      const target = e.target;
      const targetId = target && target.id;
      const tagName = target && target.tagName ? target.tagName.toLowerCase() : "";

      if (targetId === "searchInput") return;
      if (targetId === "fillInput") return;
      if (tagName === "textarea" || tagName === "select") return;

      if (e.key === "Enter") {
        e.preventDefault();
        submitCurrentAnswerOrNext();
        return;
      }

      const key = e.key.toUpperCase();
      if (key === "S") {
        const ctx = currentPracticeContext();
        if (!ctx) return;
        e.preventDefault();
        if (state.favorites[ctx.q.id]) delete state.favorites[ctx.q.id];
        else state.favorites[ctx.q.id] = true;
        save();
        render();
        return;
      }

      const numberChoice = { "1": "A", "2": "B", "3": "C", "4": "D" }[e.key];
      const letter = numberChoice || key;
      if (["A", "B", "C", "D"].includes(letter)) {
        const ctx = currentPracticeContext();
        if (!ctx || ctx.record || ctx.q.type === "fill") return;
        e.preventDefault();
        chooseOption(ctx.q, letter);
      }
    });

    $("quizTab").onclick = () => {
      state.view = "practice";
      state.wrongOnly = false;
      state.wrongBankOnly = false;
      state.wrongPractice = false;
      state.favOnly = false;
      state.favPractice = false;
      state.focusQuestionId = null;
      state.justAnsweredId = null;
      state.search = "";
      $("searchInput").value = "";
      jumpToFirstUnanswered();
      render();
    };

    $("bankTab").onclick = () => {
      state.view = "bank";
      state.wrongOnly = false;
      state.wrongBankOnly = false;
      state.wrongPractice = false;
      state.favOnly = false;
      state.favPractice = false;
      state.focusQuestionId = null;
      state.justAnsweredId = null;
      state.index = 0;
      render();
    };

    $("wrongBankTab").onclick = () => {
      state.view = "wrongBank";
      state.wrongOnly = false;
      state.wrongBankOnly = true;
      state.wrongPractice = false;
      state.favOnly = false;
      state.favPractice = false;
      state.focusQuestionId = null;
      state.justAnsweredId = null;
      state.search = "";
      $("searchInput").value = "";
      state.index = 0;
      render();
    };

    $("wrongPracticeTab").onclick = () => {
      state.view = "practice";
      state.wrongOnly = true;
      state.wrongBankOnly = false;
      state.wrongPractice = true;
      state.favOnly = false;
      state.favPractice = false;
      state.focusQuestionId = null;
      state.justAnsweredId = null;
      state.search = "";
      $("searchInput").value = "";
      state.practiceAnswers = {};
      jumpToFirstUnanswered();
      render();
    };

    $("favBankTab").onclick = () => {
      state.view = "favBank";
      state.wrongOnly = false;
      state.wrongBankOnly = false;
      state.wrongPractice = false;
      state.favOnly = true;
      state.favPractice = false;
      state.focusQuestionId = null;
      state.justAnsweredId = null;
      state.search = "";
      $("searchInput").value = "";
      state.index = 0;
      render();
    };

    $("favPracticeTab").onclick = () => {
      state.view = "practice";
      state.wrongOnly = false;
      state.wrongBankOnly = false;
      state.wrongPractice = false;
      state.favOnly = true;
      state.favPractice = true;
      state.focusQuestionId = null;
      state.justAnsweredId = null;
      state.search = "";
      $("searchInput").value = "";
      state.practiceAnswers = {};
      jumpToFirstUnanswered();
      render();
    };

    $("knowledgeTab").onclick = () => {
      state.view = "knowledge";
      state.focusQuestionId = null;
      render();
    };

    async function initialize() {
      await loadServerState();
      syncMistakesFromAnswers();
      render();
      saveServerState();
    }

    initialize();
  </script>
</body>
</html>
