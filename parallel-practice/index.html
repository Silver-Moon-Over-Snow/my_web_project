<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>并行程序设计刷题台</title>
  <style>
    :root {
      --bg: #f6f7f2;
      --panel: #ffffff;
      --ink: #202428;
      --muted: #667078;
      --line: #dfe4da;
      --brand: #1f6f78;
      --brand-2: #b9472f;
      --good: #27734f;
      --bad: #b83232;
      --warn: #936b10;
      --shadow: 0 18px 50px rgba(34, 41, 43, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      line-height: 1.55;
    }

    button, input, select {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 300px 1fr;
      position: relative;
      z-index: 1;
    }

    aside {
      border-right: 1px solid var(--line);
      background: #eef2ea;
      padding: 22px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand-lockup {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      align-items: center;
      margin-bottom: 18px;
      padding: 12px;
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .brand-lockup > div:last-child {
      display: grid;
      justify-items: center;
      transform: none;
    }

    .seal-wrap {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      transform: translateX(6px);
      border: 0;
      background: transparent;
      overflow: hidden;
      color: var(--brand-2);
      font-weight: 800;
    }

    .brand-seal {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 0;
    }

    .brand-name-img {
      display: none;
      max-width: 156px;
      max-height: 34px;
      object-fit: contain;
      object-position: center center;
      margin-bottom: 4px;
    }

    .brand-name-text {
      color: #7a1f1f;
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 1px;
      text-align: center;
    }

    .brand-course {
      color: #3f4d52;
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0;
    }

    main {
      padding: 28px;
      max-width: 1160px;
      width: 100%;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0;
    }

    h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .sub {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .section-title {
      margin: 24px 0 10px;
      color: #3e474d;
      font-size: 13px;
      font-weight: 700;
    }

    .modules {
      display: grid;
      gap: 8px;
    }

    .module-btn,
    .tool-btn,
    .answer-btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      min-height: 42px;
      padding: 9px 12px;
      cursor: pointer;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
      text-align: left;
    }

    .module-btn:hover,
    .tool-btn:hover,
    .answer-btn:hover {
      transform: translateY(-1px);
      border-color: #aab8ad;
    }

    .module-btn.active {
      background: #dbeae5;
      border-color: var(--brand);
      color: #143f45;
      font-weight: 700;
    }

    .module-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .count {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .tools {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .tool-btn {
      text-align: center;
      font-weight: 700;
      background: #fff;
    }

    .tool-btn.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    .tool-btn.danger {
      color: var(--bad);
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .theme-toggle,
    .ai-config-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: #3f4d52;
      border-radius: 8px;
      min-height: 42px;
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 800;
      white-space: nowrap;
    }
    .theme-toggle.active,
    .ai-config-btn.active {
      background: #dbeae5;
      border-color: var(--brand);
      color: #143f45;
    }

    .star-btn {
      border: 1px solid #d8dfd4;
      background: #f8faf5;
      color: #ffffff;
      filter: grayscale(1) saturate(.15) brightness(1.18) opacity(.62);
      text-shadow: none;
      border-radius: 8px;
      width: 38px;
      height: 38px;
      display: inline-grid;
      place-items: center;
      padding: 0;
      cursor: pointer;
      font-weight: 800;
      font-size: 22px;
      line-height: 1;
    }

    .star-btn.active {
      background: #ffe38b;
      border-color: #c69013;
      color: #d49300;
      filter: none;
    }

    .mistake-btn {
      margin-top: 8px;
      border: 1px solid #d8b9a7;
      background: rgba(255, 247, 241, .88);
      color: #8a3c20;
      border-radius: 8px;
      min-height: 30px;
      padding: 4px 9px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .mistake-btn:hover {
      border-color: #b9472f;
    }

    .copy-ai-btn {
      margin-top: 8px;
      border: 1px solid #c9d4dc;
      background: rgba(246, 250, 252, .92);
      color: #2f5368;
      border-radius: 8px;
      min-height: 30px;
      padding: 4px 9px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .copy-ai-btn:hover {
      border-color: #4b819f;
    }

    .ai-notes {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid #cddfea;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(247, 252, 255, .96), rgba(238, 247, 251, .94)),
        #f7fcff;
      display: grid;
      gap: 6px;
    }

    .ai-notes h3 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
      color: #28536a;
    }

    .ai-note {
      border-top: 1px solid #dce9f0;
      padding-top: 10px;
    }

    .ai-note:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .ai-note-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }

    .ai-note-remove {
      border: 1px solid #c9d4dc;
      background: #fff;
      color: #60707b;
      border-radius: 8px;
      min-height: 28px;
      padding: 3px 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
    }

    .note-editor {
      display: grid;
      gap: 8px;
    }

    .note-editor textarea {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      border: 1px solid #c9d4dc;
      border-radius: 8px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, .88);
      color: #203036;
      font: inherit;
      line-height: 1.55;
    }

    .note-editor textarea:focus {
      outline: 2px solid rgba(69, 127, 146, .22);
      border-color: #4b819f;
    }

    .note-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 6px;
      margin: 18px 0 20px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(34, 41, 43, .05);
    }

    .metric b {
      display: block;
      font-size: 24px;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
    }

    .topbar {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .view-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef2ea;
      margin-bottom: 16px;
    }

    .view-tab {
      position: relative;
      min-height: 36px;
      border: 0;
      border-radius: 6px;
      padding: 7px 14px;
      background: transparent;
      color: #445057;
      cursor: pointer;
      font-weight: 800;
    }

    .view-tab.review-tab {
      padding-right: 30px;
    }

    .round-badge {
      position: absolute;
      top: -7px;
      right: -6px;
      min-width: 34px;
      min-height: 18px;
      border-radius: 999px;
      padding: 1px 6px;
      display: inline-grid;
      place-items: center;
      background: #8d1f1f;
      color: #fff;
      border: 2px solid #eef2ea;
      font-size: 11px;
      line-height: 1;
      box-shadow: 0 5px 12px rgba(34, 41, 43, .12);
    }

    .view-tab.active .round-badge {
      border-color: #fff;
    }

    .round-badge.empty {
      background: #8f9894;
    }

    .view-tab.active {
      background: #fff;
      color: var(--brand);
      box-shadow: 0 4px 14px rgba(34, 41, 43, .08);
    }

    .search {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 42px;
      padding: 9px 12px;
      background: #fff;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      min-height: 620px;
    }

    .card > *:not(.quiz-portrait) {
      position: relative;
      z-index: 1;
    }

    .quiz-portrait {
      position: absolute;
      inset: -86px -380px -160px -380px;
      background: none;
      pointer-events: none;
      z-index: 2;
      opacity: .70;
      transition: background-image .18s ease, opacity .18s ease;
    }

    .quiz-portrait.answered {
      opacity: .46;
    }

    .quiz-portrait.answered.correct {
      background-image: none;
      opacity: .30;
    }

    .quiz-portrait.answered.wrong {
      background-image: none;
    }

    .quiz-portrait.hidden {
      display: none;
    }

    .question-head,
    .explain,
    .nav {
      position: relative;
      z-index: 3;
    }

    .answers {
      position: relative;
      z-index: 1;
    }

    .study-panel {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 10px 30px rgba(34, 41, 43, .06);
    }

    .study-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }

    .study-head h3 {
      margin: 0 0 4px;
      font-size: 19px;
      letter-spacing: 0;
    }

    .study-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .study-block {
      min-width: 0;
      border: 1px solid #e4e8df;
      border-radius: 8px;
      padding: 12px;
      background: #fbfcf8;
    }

    .study-block b {
      display: block;
      margin-bottom: 8px;
      color: #334247;
      font-size: 14px;
    }

    .study-block ul {
      margin: 0;
      padding-left: 18px;
      color: #354045;
      font-size: 13px;
    }

    .study-block li {
      margin: 5px 0;
    }

    .study-source {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .mind-map {
      margin-top: 14px;
      border: 1px solid #d8dfd4;
      border-radius: 8px;
      padding: 14px;
      background: #fbfcf8;
    }

    .mind-map-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .mind-map-title b {
      color: #334247;
      font-size: 15px;
    }

    .mind-map-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .mind-node {
      border: 1px solid #e1e7dd;
      border-radius: 8px;
      background: #fff;
      padding: 11px;
    }

    .mind-node strong {
      display: block;
      color: var(--brand);
      margin-bottom: 6px;
      font-size: 14px;
    }

    .mind-node ul {
      margin: 0;
      padding-left: 18px;
      color: #354045;
      font-size: 12px;
    }

    .mind-node li {
      margin: 4px 0;
    }

    .question-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .tagline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tag {
      border-radius: 999px;
      background: #eef2ea;
      color: #3c4a43;
      padding: 4px 9px;
      font-size: 12px;
      border: 1px solid #d8dfd4;
    }

    .tag.hot {
      background: #fff1e6;
      border-color: #e4bc91;
      color: #7a3b13;
    }

    .tag.hard {
      background: #eef0ff;
      border-color: #bfc6ed;
      color: #303f7d;
    }

    .tag.review {
      background: #f4faf5;
      border-color: #b8d9be;
      color: #235b32;
    }

    .tag.review.none {
      background: #f4f5f2;
      border-color: #d8ddd4;
      color: #68726c;
    }

    .tag.review.weak {
      background: #fff1e6;
      border-color: #e4bc91;
      color: #7a3b13;
    }

    .tag.review.ok {
      background: #edf7f1;
      border-color: #b8d9be;
      color: #235b32;
    }

    .tag.review.strong {
      background: #e9f4ff;
      border-color: #acd0ef;
      color: #1f5782;
    }

    .qid {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .stem {
      margin: 12px 0 18px;
      font-size: 19px;
      font-weight: 700;
    }

    .code-snippet {
      margin: 0 0 18px;
      padding: 14px;
      border-radius: 8px;
      background: #20262b;
      color: #eef5f1;
      overflow: auto;
      font-family: Consolas, "Cascadia Mono", "Courier New", monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      align-items: stretch;
      margin-top: 26px;
      min-height: 260px;
    }

    .answer-btn {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: center;
      text-align: left;
      min-height: 86px;
      background: rgba(255, 255, 255, .88);
      backdrop-filter: blur(2px);
      box-shadow: 0 8px 22px rgba(34, 41, 43, .06);
    }

    .answer-btn .letter {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #eef2ea;
      font-weight: 800;
    }

    .answers > .tool-btn.primary {
      grid-column: 1 / -1;
      justify-self: stretch;
    }

    .answer-btn.correct {
      border-color: var(--good);
      background: #edf7f1;
    }

    .answer-btn.wrong {
      border-color: var(--bad);
      background: #fff0ef;
    }

    .answer-btn.missed {
      border-color: #d7a928;
      background: #fff8d9;
    }

    .answer-btn.selected {
      border-color: var(--brand);
      background: #eaf5f4;
    }

    .answer-btn.locked {
      cursor: default;
      transform: none;
    }

    .fill-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .fill-input {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 46px;
      padding: 10px 12px;
      background: #fff;
    }

    .write-row {
      display: grid;
      gap: 10px;
    }

    .write-input {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: rgba(255, 255, 255, .9);
      color: var(--ink);
      font: 14px/1.6 "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }

    .write-input:focus {
      outline: 2px solid rgba(69, 127, 146, .22);
      border-color: #4b819f;
    }

    .explain {
      margin-top: 18px;
      padding: 14px;
      border-radius: 8px;
      background: #f7f1e2;
      border: 1px solid #e6d8b6;
      color: #443718;
      display: none;
    }

    .explain.show {
      display: block;
    }

    .review-points {
      margin: 8px 0 0;
      padding-left: 20px;
    }

    .review-points li {
      margin: 5px 0;
    }

    .markdown-panel {
      margin-top: 14px;
      display: grid;
      gap: 6px;
    }

    .markdown-card {
      border: 1px solid #e4e8df;
      border-radius: 8px;
      background: #fbfcf8;
      padding: 13px;
    }

    .markdown-card b {
      display: block;
      margin-bottom: 6px;
      color: #334247;
    }

    .markdown-body {
      color: #354045;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      font-size: 13px;
      line-height: 1.6;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 {
      margin: 16px 0 8px;
      color: #25383f;
      letter-spacing: 0;
    }

    .markdown-body h1 { font-size: 20px; }
    .markdown-body h2 { font-size: 18px; }
    .markdown-body h3 { font-size: 16px; }
    .markdown-body h4 { font-size: 14px; }

    .markdown-body p {
      margin: 8px 0;
    }

    .markdown-body ul,
    .markdown-body ol {
      margin: 8px 0;
      padding-left: 22px;
    }

    .markdown-body li {
      margin: 4px 0;
    }

    .markdown-body code {
      padding: 1px 5px;
      border-radius: 5px;
      background: #edf0ea;
      color: #28333a;
      font-family: Consolas, "Cascadia Mono", "Courier New", monospace;
      font-size: .94em;
    }

    .stem code,
    .explain code,
    .study-block code,
    .mind-node code,
    .small code,
    .review-points code {
      padding: 1px 5px;
      border-radius: 5px;
      background: #edf0ea;
      color: #28333a;
      font-family: Consolas, "Cascadia Mono", "Courier New", monospace;
      font-size: .94em;
    }

    .markdown-body pre {
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      background: #20262b;
      color: #eef5f1;
      overflow: auto;
      white-space: pre;
      font-family: Consolas, "Cascadia Mono", "Courier New", monospace;
      font-size: 12px;
      line-height: 1.5;
    }

    .markdown-body pre code {
      padding: 0;
      background: transparent;
      color: inherit;
    }

    .markdown-body blockquote {
      margin: 10px 0;
      padding: 8px 12px;
      border-left: 4px solid #bfd1c7;
      background: #f0f4ee;
      color: #4b5b57;
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
      font-size: 12px;
    }

    .markdown-body th,
    .markdown-body td {
      border: 1px solid #d8dfd4;
      padding: 6px 8px;
      vertical-align: top;
    }

    .markdown-body th {
      background: #eef2ea;
      color: #334247;
    }

    .markdown-body hr {
      border: 0;
      border-top: 1px solid #d8dfd4;
      margin: 14px 0;
    }

    .markdown-body .wiki-link {
      color: var(--brand);
      font-weight: 700;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      margin-top: 16px;
    }

    .small {
      color: var(--muted);
      font-size: 13px;
    }

    .list {
      margin-top: 20px;
      display: grid;
      gap: 10px;
    }

    .mini-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px 14px;
      cursor: pointer;
    }

    .mini-card:hover {
      border-color: var(--brand);
    }

    .mini-card .mistake-btn {
      margin-top: 9px;
    }

    body.dark {
      --bg: #1e1e1e;
      --panel: #252526;
      --ink: #d4d4d4;
      --muted: #9da5ad;
      --line: #3c3c3c;
      --brand: #4fc1ff;
      --brand-2: #f48771;
      --good: #6a9955;
      --bad: #f14c4c;
      --warn: #dcdcaa;

    body.dark aside,
    body.dark .view-tabs {
      background: #181818;
    }

    body.dark main {
      background: #1e1e1e;
    }

    body.dark .brand-name-text {
      color: #ff8a80;
    }

    body.dark .brand-course,
    body.dark .section-title {

    body.dark .module-btn,
    body.dark .tool-btn,
    body.dark .answer-btn,
    body.dark .metric,
    body.dark .card,
    body.dark .study-panel,
    body.dark .mini-card,
    body.dark .search,

    body.dark .ai-config-btn {

      border-color: var(--line);

    body.dark .tool-btn:hover,

    body.dark .theme-toggle.active,
    body.dark .ai-config-btn.active {
      background: #094771;
      border-color: #3794ff;
      color: #ffffff;
    }

    body.dark .tool-btn.primary {
      background: #0e639c;
      border-color: #3794ff;
      color: #ffffff;
    }

    body.dark .view-tab {
      color: #b8c0c7;
    }

    body.dark .view-tab.active {
      background: #252526;
      color: #9cdcfe;

      background: #c586c0;

    }

    body.dark .view-tab.active .round-badge {

    }

    body.dark .round-badge.empty {
      background: #6b7075;
      color: #f0f0f0;
    }

    body.dark .tag {

      border-color: #4a4f55;
      color: #c8d0d7;
    }

    body.dark .tag.hot,
    body.dark .tag.review.weak {
      background: #3a2d20;
      border-color: #6a4c26;
      color: #d7ba7d;
    }

    body.dark .tag.hard {
      background: #273044;
      border-color: #4b5b86;
      color: #b4c6ff;
    }

    body.dark .tag.review,
    body.dark .tag.review.ok {
      background: #1f3a2b;
      border-color: #3d6b4f;
      color: #b5cea8;
    }

    body.dark .tag.review.none {
      background: #2d3135;
      border-color: #4a4f55;
      color: #9da5ad;
    }

    body.dark .tag.review.strong {
      background:
        linear-gradient(180deg, rgba(23, 52, 74, .96), rgba(20, 42, 58, .96)),
        #17344a;
      border-color: #2c6f9e;
      color: #9cdcfe;
    }

    body.dark .answer-btn {
      background: rgba(37, 37, 38, .88);
      box-shadow: 0 8px 22px rgba(0, 0, 0, .26);
    }

    body.dark .answer-btn .letter {
      background: #333842;
      color: #d4d4d4;
    }

    body.dark .answer-btn.selected {
      border-color: #3794ff;
      background: #16344a;
    }

    body.dark .answer-btn.correct {
      border-color: #6a9955;
      background: #1f3a2b;
    }

    body.dark .answer-btn.wrong {
      border-color: #f14c4c;
      background: #3a2020;
    }

    body.dark .answer-btn.missed {
      border-color: #d7ba7d;
      background: #3a3320;
    }

    body.dark .explain {
      background: #2d2a20;
      border-color: #5d512f;
      color: #e7d9aa;
    }

    body.dark .study-block,
    body.dark .mind-map,
    body.dark .mind-node,
    body.dark .markdown-card {
      background: #202124;
      border-color: #3c3c3c;
    }

    body.dark .study-block b,
    body.dark .mind-map-title b,
    body.dark .markdown-card b {
      color: #dcdcaa;
    }

    body.dark .study-block ul,
    body.dark .mind-node ul,
    body.dark .markdown-body {
      color: #d4d4d4;
    }

    body.dark .markdown-body h1,
    body.dark .markdown-body h2,
    body.dark .markdown-body h3,
    body.dark .markdown-body h4,
    body.dark .markdown-body th {
      color: #dcdcaa;
    }

    body.dark .markdown-body code {
      background: #333842;
      color: #ce9178;
    }

    body.dark .stem code,
    body.dark .explain code,
    body.dark .study-block code,
    body.dark .mind-node code,
    body.dark .small code,
    body.dark .review-points code {
      background: #333842;
      color: #ce9178;
    }

    body.dark .markdown-body pre {
      background: #111316;
      color: #d4d4d4;
      border: 1px solid #3c3c3c;
    }

    body.dark .markdown-body blockquote {
      background: #252b2f;
      border-left-color: #3794ff;
      color: #c8d0d7;
    }

    body.dark .markdown-body th,
    body.dark .markdown-body td {
      border-color: #3c3c3c;
    }

    body.dark .markdown-body th {
      background: #2d3135;
    }

    body.dark .markdown-body hr {
      border-top-color: #3c3c3c;
    }

    body.dark .code-snippet {
      background: #111316;
      color: #d4d4d4;
      border: 1px solid #3c3c3c;
    }

    body.dark .star-btn {
      background: #252526;
      border-color: #4a4f55;
      color: #d4d4d4;
      filter: grayscale(1) saturate(.1) brightness(.9) opacity(.7);
    }

    body.dark .star-btn.active {
      background: #4b3f13;
      border-color: #d7ba7d;
      color: #ffd866;
      filter: none;
    }

    body.dark .mistake-btn {
      background: #3a2020;
      border-color: #7b3a3a;
      color: #f48771;
    }

    body.dark .copy-ai-btn {
      background: #17344a;
      border-color: #2c6f9e;
      color: #9cdcfe;
    }

    body.dark .ai-notes {
      background: #17344a;
      border-color: #2c6f9e;
      color: #d4d4d4;
    }

    body.dark .ai-notes h3 {
      color: #9cdcfe;
    }

    body.dark .ai-note {
      border-top-color: #2c6f9e;
    }

    body.dark .ai-note-remove {
      background: #252526;
      border-color: #4a4f55;
      color: #c8d0d7;
    }

    body.dark .note-editor textarea {
      background: #1e1e1e;
      border-color: #4a4f55;
      color: #d4d4d4;
    }

    body.dark .note-editor textarea:focus {
      outline-color: rgba(55, 148, 255, .24);
      border-color: #3794ff;
    }

    body.dark .quiz-portrait {
      opacity: .56;
      mix-blend-mode: screen;
    }

    body.dark .quiz-portrait.answered {
      opacity: .42;
    }

    body.dark .quiz-portrait.answered.correct {
      opacity: .24;
    }

    @media (max-width: 860px) {
      .card {
        min-height: 560px;
      }

      .answers {
        grid-template-columns: 1fr;
        min-height: 0;
      }

      .quiz-portrait {
        inset: -20px -300px -100px -300px;
        opacity: .50;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .quiz-portrait {
        height: 260px;
        margin-bottom: -34px;
        opacity: .30;
      }

      aside {
        position: static;
        height: auto;
      }

      main {
        padding: 18px;
      }

      .dashboard {
        grid-template-columns: 1fr 1fr;
      }

      .study-grid {
        grid-template-columns: 1fr;
      }

      .mind-map-grid {
        grid-template-columns: 1fr;
      }

      .topbar,
      .question-head,
      .study-head,
      .fill-row {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand-lockup" aria-label="并行程序设计刷题台">
        <div>
          <div class="brand-course">并行程序设计</div>
        </div>
      </div>
      <h1>刷题台</h1>
      <p class="sub">按讲义板块练习选择、判断和填空。答完立即看解析，错题会自动留下。</p>

      <div class="section-title">板块</div>
      <div class="modules" id="moduleList"></div>

      <p class="small">题库依据本文件夹中的复习入口、期末复习、速查手册、真题复习全书整理。</p>
    </aside>

    <main>
      <div class="topbar">
        <div>
          <h2 id="viewTitle">全部题目</h2>
          <div class="small" id="viewHint"></div>
        </div>
        <div class="top-actions">
          <input class="search" id="searchInput" placeholder="搜索：如 Allreduce、伪共享、warp、delete[]">
          <button class="theme-toggle" id="themeToggle" title="切换亮色或暗色模式">暗色</button>
        </div>
      </div>

      <div class="view-tabs" aria-label="视图切换">
        <button class="view-tab active" id="quizTab">刷题</button>
        <button class="view-tab" id="bankTab">题库</button>
        <button class="view-tab" id="knowledgeTab">知识库</button>
        <button class="view-tab" id="wrongBankTab">错题库</button>
        <button class="view-tab review-tab" id="wrongPracticeTab">错题库二刷<span class="round-badge" id="wrongRoundBadge">0轮</span></button>
        <button class="view-tab" id="favBankTab">收藏题库</button>
        <button class="view-tab review-tab" id="favPracticeTab">收藏题库二刷<span class="round-badge" id="favRoundBadge">0轮</span></button>
      </div>

      <section class="study-panel" id="studyPanel"></section>

      <section id="quizView">
        <div class="dashboard">
          <div class="metric"><b id="doneMetric">0</b><span>已作答</span></div>
          <div class="metric"><b id="rightMetric">0%</b><span>正确率</span></div>
          <div class="metric"><b id="wrongMetric">0</b><span>错题数</span></div>
          <div class="metric"><b id="poolMetric">0</b><span id="poolLabel">当前题量</span></div>
        </div>

        <section class="card" id="quizCard"></section>
        <section class="list" id="questionList"></section>
      </section>
    </main>
  </div>

  <script>
    const questions = [
      {id:"LNX-01", module:"Linux", source:"复习1 / 真题", type:"single", stem:"要显示当前目录下所有文件，包括以点开头的隐藏文件，应使用哪个命令？", options:["ls -a","ls -l","ls -h","pwd"], answer:["A"], explain:"`ls -a` 会显示 all entries，包括隐藏文件。"},
      {id:"LNX-02", module:"Linux", source:"Linux 基本命令", type:"judge", stem:"管道符 `|` 的作用是把前一个命令的输出交给后一个命令作为输入。", options:["正确","错误"], answer:["A"], explain:"例如 `ls -l | grep txt` 会先列出文件，再筛选包含 txt 的行。"},
      {id:"LNX-03", module:"Linux", source:"真题高频", type:"single", stem:"在当前目录及子目录中查找所有 `.txt` 文件，最合适的是？", options:["find . -name \"*.txt\"","grep . \"*.txt\"","touch *.txt","PATH=*.txt"], answer:["A"], explain:"`find . -name \"*.txt\"` 是按文件名递归检索；`grep` 是查文件内容。"},
      {id:"LNX-04", module:"Linux", source:"vi/vim", type:"single", stem:"在 vi/vim 中向后搜索字符串 `word`，应输入？", options:["/word","?word",":word","grep word"], answer:["A"], explain:"`/word` 向后搜索，`?word` 向前搜索。"},
      {id:"LNX-05", module:"Linux", source:"Shell 环境变量", type:"fill", stem:"Shell 中保存命令搜索路径列表的环境变量是 ____。", answer:["PATH"], explain:"`PATH` 决定直接输入命令时系统去哪些目录找可执行文件。"},
      {id:"LNX-06", module:"Linux", source:"Shell 脚本", type:"judge", stem:"`mkdir -p DIR$i` 在目录已存在时通常不会报错退出，适合脚本中批量创建目录。", options:["正确","错误"], answer:["A"], explain:"`-p` 会创建缺失的父目录，并让已存在目录成为可接受状态。"},

      {id:"CPP-01", module:"C++", source:"10-14 讲 / 真题", type:"single", stem:"释放 `new int[10]` 申请的数组，应该使用？", options:["delete[] a","delete a","free(a)","a = nullptr"], answer:["A"], explain:"`new[]` 必须和 `delete[]` 配对；混用是常见错误。"},
      {id:"CPP-02", module:"C++", source:"C++ 数据类型", type:"single", stem:"下列哪一个通常不是 C++ 浮点类型？", options:["float","double","long long","long double"], answer:["C"], explain:"`long long` 是整数类型。真题辨析里也强调它不是浮点类型。"},
      {id:"CPP-03", module:"C++", source:"访问限定符", type:"judge", stem:"`protected` 成员可以被类外任意对象直接访问。", options:["正确","错误"], answer:["B"], explain:"`protected` 类外不可直接访问，但派生类成员函数中可以访问。"},
      {id:"CPP-04", module:"C++", source:"const 成员函数", type:"judge", stem:"`const` 成员函数承诺不修改调用它的对象的可观察状态。", options:["正确","错误"], answer:["A"], explain:"这是 `const` 成员函数的核心语义，`mutable` 成员是例外点。"},
      {id:"CPP-05", module:"C++", source:"标准库", type:"single", stem:"`setw`、`right`、`setprecision` 等输出格式控制通常来自哪个头文件？", options:["iomanip","fstream","iostream","vector"], answer:["A"], explain:"`iomanip` 提供常用的流格式控制器。`setw(n)` 设置下一次输出占 n 个字符宽度，`right` 表示右对齐，常用于把表格数字排整齐；例如 `cout << setw(6) << right << 23` 会在 23 左边补空格。"},
      {id:"CPP-06", module:"C++", source:"Makefile", type:"judge", stem:"如果 `obj.o` 的依赖中包含 `head.h`，那么修改 `head.h` 会触发 `obj.o` 重新编译。", options:["正确","错误"], answer:["A"], explain:"Make 按依赖时间戳判断是否需要重建目标文件。"},
      {id:"CPP-07", module:"C++", source:"指针和动态分配", type:"multi", stem:"下列哪些属于指针使用风险？", options:["未检查分配结果直接使用","越界访问","`delete[]` 释放动态数组","野指针"], answer:["A","B","D"], explain:"正确配对的 `delete[]` 是释放方式，不是风险；其他三项都容易引发错误。"},
      {id:"CPP-08", module:"C++", source:"多态", type:"judge", stem:"C++ 中模板常被归入静态多态，虚函数常被归入动态多态。", options:["正确","错误"], answer:["A"], explain:"模板在编译期实例化，虚函数通过运行时动态绑定体现动态多态。"},

      {id:"MPI-01", module:"MPI", source:"20 MPI 基础知识", type:"fill", stem:"MPI 的全称是 ____。", answer:["Message Passing Interface"], explain:"MPI 是消息传递接口，不是一门语言，而是配合 C/C++/Fortran 使用的通信库规范。"},
      {id:"MPI-02", module:"MPI", source:"20 MPI 基础知识", type:"judge", stem:"MPI 程序通常采用 SPMD：多个进程运行同一个程序，但根据 rank 处理不同数据或分支。", options:["正确","错误"], answer:["A"], explain:"SPMD 是 Single Program Multiple Data，是 MPI 常见编程方式。"},
      {id:"MPI-03", module:"MPI", source:"20 MPI 基础知识", type:"single", stem:"获取当前进程编号 rank 的函数是？", options:["MPI_Comm_rank","MPI_Comm_size","MPI_Get_version","MPI_Barrier"], answer:["A"], explain:"`MPI_Comm_rank(comm, &rank)` 返回当前进程在通信器内的编号。"},
      {id:"MPI-04", module:"MPI", source:"22 点对点通信", type:"judge", stem:"`MPI_Send` 和 `MPI_Recv` 是点对点通信；`MPI_Bcast` 是集合通信。", options:["正确","错误"], answer:["A"], explain:"点对点只涉及发送方和接收方，集合通信涉及通信器内所有进程。"},
      {id:"MPI-05", module:"MPI", source:"22 点对点通信", type:"single", stem:"两个进程都先执行阻塞 `MPI_Send` 再执行 `MPI_Recv`，大消息时最可能出现什么问题？", options:["死锁","自动 Allreduce","rank 自动重排","编译失败"], answer:["A"], explain:"双方都等待发送完成，而没有人先接收，可能形成循环等待。"},
      {id:"MPI-06", module:"MPI", source:"22 点对点通信", type:"single", stem:"为了避免互发时阻塞顺序导致死锁，以下哪个函数最直接？", options:["MPI_Sendrecv","MPI_Comm_size","MPI_Finalize","MPI_Get_processor_name"], answer:["A"], explain:"`MPI_Sendrecv` 把发送和接收合成一次调用，常用于交换边界数据。"},
      {id:"MPI-07", module:"MPI", source:"22 点对点通信", type:"judge", stem:"非阻塞通信 `MPI_Isend/Irecv` 启动后通常还需要 `MPI_Wait` 或 `MPI_Waitall` 确认完成。", options:["正确","错误"], answer:["A"], explain:"非阻塞调用只是启动通信，缓冲区安全复用前要等待完成。"},
      {id:"MPI-08", module:"MPI", source:"23 集合通信", type:"single", stem:"把 root 上一段数组按块分发到各进程，应该优先想到？", options:["MPI_Scatter","MPI_Bcast","MPI_Gather","MPI_Barrier"], answer:["A"], explain:"`Scatter` 是分发不同数据；`Bcast` 是给所有进程相同数据。"},
      {id:"MPI-09", module:"MPI", source:"23/24 集合通信", type:"single", stem:"规约求和后希望每个进程都得到最终结果，应使用？", options:["MPI_Allreduce","MPI_Reduce","MPI_Gather","MPI_Scan"], answer:["A"], explain:"`Reduce` 结果只到 root，`Allreduce` 让所有进程都有结果。"},
      {id:"MPI-10", module:"MPI", source:"23 集合通信", type:"judge", stem:"集合通信一般没有 tag 参数，并要求通信器内相关进程共同调用。", options:["正确","错误"], answer:["A"], explain:"集合通信以通信器定义参与范围，调用不一致常导致等待或死锁。"},
      {id:"MPI-11", module:"MPI", source:"25 进程组划分", type:"single", stem:"`MPI_Comm_split(comm, color, key, &newcomm)` 中决定进程分到哪个新通信器的是？", options:["color","key","newcomm","rank"], answer:["A"], explain:"`color` 决定分组，`key` 决定组内 rank 排序。"},
      {id:"MPI-12", module:"MPI", source:"25 进程组划分", type:"judge", stem:"MPI 的 Group 是成员列表，本身不能直接用于通信，通常要创建 Communicator。", options:["正确","错误"], answer:["A"], explain:"进程组描述成员关系，通信仍要通过通信器进行。"},
      {id:"MPI-13", module:"MPI", source:"并行性能", type:"fill", stem:"加速比常写作 S_p = T_s / ____。", answer:["T_p","Tp","T_P"], explain:"`T_s` 是串行时间，`T_p` 是使用 p 个处理器的并行时间。"},
      {id:"MPI-14", module:"MPI", source:"并行性能", type:"judge", stem:"强可扩展性关注问题规模不变时，处理器数增加能否缩短运行时间。", options:["正确","错误"], answer:["A"], explain:"弱可扩展性则关注每个处理器问题规模基本不变时整体效率。"},

      {id:"OMP-01", module:"OpenMP", source:"30 编程模型", type:"multi", stem:"OpenMP 的三个组成部分包括哪些？", options:["编译器指令","运行时库函数","环境变量","消息标签 tag"], answer:["A","B","C"], explain:"OpenMP 由 pragma 指令、`omp_*` 库函数和环境变量组成；tag 是 MPI 通信概念。"},
      {id:"OMP-02", module:"OpenMP", source:"30 编程模型", type:"judge", stem:"OpenMP 主要面向共享内存并行，线程通常共享同一进程的地址空间。", options:["正确","错误"], answer:["A"], explain:"这也是它和 MPI 进程私有地址空间模型的关键区别。"},
      {id:"OMP-03", module:"OpenMP", source:"31 并行构造", type:"single", stem:"将 for 循环迭代分配给多个线程，常用指令是？", options:["#pragma omp for","#pragma omp taskwait","#pragma omp master","#pragma omp flush"], answer:["A"], explain:"通常可写成 `#pragma omp parallel for` 或在并行区内使用 `#pragma omp for`。"},
      {id:"OMP-04", module:"OpenMP", source:"31 并行构造", type:"single", stem:"求和变量 `sum` 在并行循环中最推荐使用哪个子句自动合并？", options:["reduction(+:sum)","private(sum)","schedule(sum)","master(sum)"], answer:["A"], explain:"`reduction` 会为线程创建局部副本，最后按指定运算合并。"},
      {id:"OMP-05", module:"OpenMP", source:"32 同步", type:"single", stem:"多行代码同一时间只允许一个线程执行，最合适的是？", options:["critical","atomic","taskwait","simd"], answer:["A"], explain:"`atomic` 更适合单条简单读改写语句；多行互斥常用 `critical`。"},
      {id:"OMP-06", module:"OpenMP", source:"32 同步", type:"judge", stem:"`#pragma omp atomic` 通常比 `critical` 适用范围更窄，但开销也可能更小。", options:["正确","错误"], answer:["A"], explain:"atomic 只覆盖特定单条原子更新，粒度更细。"},
      {id:"OMP-07", module:"OpenMP", source:"33 调度", type:"single", stem:"`schedule(static, 2)` 中的 2 表示什么？", options:["每个连续迭代块大小","线程总数固定为 2","只执行第 2 次迭代","循环变量步长必须为 2"], answer:["A"], explain:"chunk size 是每次分配的连续迭代块大小。"},
      {id:"OMP-08", module:"OpenMP", source:"33 调度", type:"single", stem:"循环每次迭代耗时差异很大时，通常更适合哪类调度？", options:["dynamic","static","只用 master","取消并行"], answer:["A"], explain:"`dynamic` 让线程做完一个块再取下一个，更能缓解负载不均。"},
      {id:"OMP-09", module:"OpenMP", source:"34 数据环境", type:"judge", stem:"`private(x)` 表示每个线程都有自己的 `x` 副本。", options:["正确","错误"], answer:["A"], explain:"`shared(x)` 才表示所有线程共享同一个变量。"},
      {id:"OMP-10", module:"OpenMP", source:"35 任务", type:"single", stem:"等待当前任务创建的子任务完成，应使用？", options:["taskwait","barrier","single","master"], answer:["A"], explain:"`taskwait` 的语义是等待当前任务的直接子任务完成。"},
      {id:"OMP-11", module:"OpenMP", source:"35 任务", type:"judge", stem:"`single` 表示并行区中只让一个线程执行该代码块，不一定是主线程。", options:["正确","错误"], answer:["A"], explain:"`master` 才限定由主线程执行。"},
      {id:"OMP-12", module:"OpenMP", source:"36 内存模型", type:"single", stem:"伪共享的核心原因是？", options:["多个线程写不同变量但落在同一缓存行","多个线程只读同一个常量","一个线程使用了太多寄存器","MPI tag 不匹配"], answer:["A"], explain:"不同变量位于同一 cache line，写入会导致缓存行反复失效。"},
      {id:"OMP-13", module:"OpenMP", source:"37 SIMD", type:"fill", stem:"SIMD 的全称是 ____。", answer:["Single Instruction Multiple Data"], explain:"SIMD 即单指令多数据流。"},
      {id:"OMP-14", module:"OpenMP", source:"运行时函数", type:"single", stem:"在并行区内获取实际线程总数，应调用？", options:["omp_get_num_threads()","omp_get_thread_num()","omp_set_num_threads()","MPI_Comm_size()"], answer:["A"], explain:"`omp_get_thread_num()` 返回当前线程编号，不是总数。"},

      {id:"GPU-01", module:"GPU/CUDA", source:"40 GPU 发展简介", type:"single", stem:"GPU 更擅长哪类任务？", options:["大规模数据并行计算","复杂顺序控制逻辑","低并行度分支密集任务","操作系统进程调度"], answer:["A"], explain:"GPU 单核复杂控制能力弱，但核心多，适合吞吐型数据并行。"},
      {id:"GPU-02", module:"GPU/CUDA", source:"40 GPU 架构", type:"fill", stem:"SM 的中文常译是 ____。", answer:["流式多处理器","流多处理器"], explain:"SM 是 Streaming Multiprocessor，是 GPU 的核心计算单元。"},
      {id:"GPU-03", module:"GPU/CUDA", source:"41 核函数与线程", type:"single", stem:"CUDA 核函数由 CPU 调用、在 GPU 上执行，通常使用哪个修饰符？", options:["__global__","__hostonly__","__shared__","__constant__"], answer:["A"], explain:"`__device__` 是设备函数，只能由 GPU 端调用；`__global__` 是 kernel。"},
      {id:"GPU-04", module:"GPU/CUDA", source:"41 核函数与线程", type:"fill", stem:"一维 CUDA 全局线程索引常写作 threadIdx.x + ____ * blockDim.x。", answer:["blockIdx.x"], explain:"公式是 `threadIdx.x + blockIdx.x * blockDim.x`。"},
      {id:"GPU-05", module:"GPU/CUDA", source:"41 核函数与线程", type:"judge", stem:"CUDA 的 Grid、Block、Thread 都可以按一维、二维或三维组织。", options:["正确","错误"], answer:["A"], explain:"CUDA 内建变量提供 `.x/.y/.z` 三个维度。"},
      {id:"GPU-06", module:"GPU/CUDA", source:"42 内存管理", type:"single", stem:"下列哪种内存是同一个 Block 内线程共享、速度较快、常用 `__shared__` 声明？", options:["共享内存","全局内存","主机内存","纹理内存"], answer:["A"], explain:"共享内存是片上存储，作用域为 block。"},
      {id:"GPU-07", module:"GPU/CUDA", source:"42 内存管理", type:"judge", stem:"统一内存 `cudaMallocManaged` 简化 CPU/GPU 指针管理，但并不天然保证更高性能。", options:["正确","错误"], answer:["A"], explain:"统一内存主要降低编程复杂度，性能仍取决于访问模式和迁移。"},
      {id:"GPU-08", module:"GPU/CUDA", source:"42 内存管理", type:"single", stem:"多个 CUDA 线程同时累加同一全局变量，为避免数据竞争应优先使用？", options:["atomicAdd","printf","cudaFree","MPI_Reduce"], answer:["A"], explain:"`atomicAdd` 保证读-改-写过程不可被其他线程打断。"},
      {id:"GPU-09", module:"GPU/CUDA", source:"43 线程束", type:"fill", stem:"NVIDIA GPU 中一个 warp 通常包含 ____ 个线程。", answer:["32"], explain:"warp 是 GPU 调度和执行的基本单位，通常 32 个线程。"},
      {id:"GPU-10", module:"GPU/CUDA", source:"43 线程束", type:"judge", stem:"同一个 warp 内出现分支发散，可能降低硬件利用率。", options:["正确","错误"], answer:["A"], explain:"SIMT 中不同路径会被分批执行，未走当前路径的 lane 会闲置。"},
      {id:"GPU-11", module:"GPU/CUDA", source:"43 同步", type:"single", stem:"`__syncthreads()` 的同步范围是？", options:["整个 Block","整个 Grid","整个 CPU 进程","所有 MPI rank"], answer:["A"], explain:"它是 block 内同步；CUDA block 间通常不能直接全局同步。"},
      {id:"GPU-12", module:"GPU/CUDA", source:"43 同步", type:"judge", stem:"把 `__syncthreads()` 放在只有部分线程会进入的 if 分支里，可能导致死锁。", options:["正确","错误"], answer:["A"], explain:"同一个 block 内没有进入分支的线程不会到达屏障，其他线程会一直等待。"},
      {id:"GPU-13", module:"GPU/CUDA", source:"43 延迟隐藏", type:"single", stem:"GPU 隐藏访存延迟主要依靠什么？", options:["大量活跃 warp 快速切换","减少全部并行度","把所有线程放到一个 CPU 核","禁止使用共享内存"], answer:["A"], explain:"一个 warp 等待访存时，SM 可以切换到其他 ready warp 执行。"},
      {id:"GPU-14", module:"GPU/CUDA", source:"45 流和事件 / 复习", type:"single", stem:"创建 CUDA stream 的 API 是？", options:["cudaStreamCreate()","cudaMakeStream()","cudaDeviceCreate()","MPI_Comm_split()"], answer:["A"], explain:"stream 是 CUDA 任务队列，可配合异步拷贝和 kernel 调度。"},
      {id:"GPU-15", module:"GPU/CUDA", source:"Kernel 调用", type:"multi", stem:"`kernel<<<gridDim, blockDim, sharedMemBytes, stream>>>()` 中后两个可选参数表示？", options:["动态共享内存字节数","CUDA stream","MPI tag","CPU 线程数"], answer:["A","B"], explain:"第三参数是动态共享内存大小，第四参数是 stream。"},

      {id:"PERF-01", module:"综合/性能", source:"复习全书", type:"single", stem:"Amdahl 定律中，如果串行部分占 10%，理论最大加速比最接近？", options:["10","100","1","处理器数无限大也无限加速"], answer:["A"], explain:"最大加速比受串行部分限制，为 `1/S = 1/0.1 = 10`。"},
      {id:"PERF-02", module:"综合/性能", source:"复习全书", type:"judge", stem:"弱可扩展性关注处理器数增加时，每个处理器承担的问题规模基本保持不变。", options:["正确","错误"], answer:["A"], explain:"强扩展固定总问题规模，弱扩展固定单处理器问题规模。"},
      {id:"PERF-03", module:"综合/性能", source:"复习全书", type:"multi", stem:"下列哪些说法体现 MPI 与 OpenMP 的关键差异？", options:["MPI 进程通常私有地址空间","OpenMP 线程通常共享地址空间","MPI 通信通常需要显式消息传递","OpenMP 必须使用 tag 匹配消息"], answer:["A","B","C"], explain:"tag 是 MPI 点对点通信概念，不是 OpenMP 必备机制。"},
      {id:"PERF-04", module:"综合/性能", source:"复习课 50", type:"judge", stem:"课程复习强调本次测试重点考察判断能力，因此易混概念的辨析比死背 API 名字更重要。", options:["正确","错误"], answer:["A"], explain:"复习课明确提到测试主要考察判断能力，题库也围绕易错辨析组织。"},
      {id:"PERF-05", module:"综合/性能", source:"真题综合", type:"single", stem:"下面哪一组匹配最准确？", options:["MPI_Barrier：等待通信域内所有进程到达","MPI_Barrier：规约求和","MPI_Allreduce：只让 root 得到结果","MPI_Comm_rank：返回进程总数"], answer:["A"], explain:"`MPI_Reduce` 才是 root 得到规约结果；`MPI_Comm_size` 返回进程总数。"},
      {id:"PERF-06", module:"综合/性能", source:"真题综合", type:"single", stem:"下面哪个组合最可能导致性能下降但不一定导致结果错误？", options:["OpenMP 伪共享","MPI tag 永远不匹配","忘记 MPI_Init","delete 和 delete[] 混用"], answer:["A"], explain:"伪共享主要是性能问题；其他选项更可能导致等待、运行错误或未定义行为。"},

      {id:"LNX-07", module:"Linux", source:"03 Linux 基本操作命令", type:"single", stem:"要在当前目录所有 `.log` 文件中查找字符串 `timeout`，最贴近课程语境的命令是？", options:["grep \"timeout\" *.log","find timeout *.log","ls timeout *.log","touch timeout.log"], answer:["A"], explain:"`grep` 查文本内容；`find` 更常用于按文件名、路径或属性查文件。"},
      {id:"LNX-08", module:"Linux", source:"03 Linux 基本操作命令", type:"judge", stem:"`touch example.txt` 可以创建一个空文件；如果文件已存在，通常会更新它的时间戳。", options:["正确","错误"], answer:["A"], explain:"`touch` 常用于新建空文件或修改访问/修改时间。"},
      {id:"LNX-09", module:"Linux", source:"03 Linux 基本操作命令", type:"single", stem:"递归复制目录 `source_folder` 到 `destination_folder`，应使用？", options:["cp -r source_folder destination_folder","cp source_folder destination_folder","mv -r source_folder destination_folder","grep -r source_folder destination_folder"], answer:["A"], explain:"目录复制需要递归选项 `-r`。"},
      {id:"LNX-10", module:"Linux", source:"05 vim 和 shell", type:"multi", stem:"下列哪些属于 vi/vim 中常见的保存或退出相关命令？", options:[":w",":wq","/word","chmod +x"], answer:["A","B"], explain:"`:w` 保存，`:wq` 保存退出；`/word` 是搜索，`chmod +x` 是 shell 命令。"},
      {id:"LNX-11", module:"Linux", source:"05 vim 和 shell", type:"fill", stem:"让脚本 `make_dirs.sh` 具有可执行权限的常用命令是 chmod ____ make_dirs.sh。", answer:["+x"], explain:"`chmod +x make_dirs.sh` 添加执行权限，之后可用 `./make_dirs.sh` 运行。"},
      {id:"LNX-12", module:"Linux", source:"复习1", type:"judge", stem:"`~/.bashrc` 常用于保存用户 shell 的默认配置，例如别名或环境变量设置。", options:["正确","错误"], answer:["A"], explain:"课程复习和真题都把 `~/.bashrc` 作为环境配置高频点。"},
      {id:"LNX-13", module:"Linux", source:"复习1", type:"single", stem:"KISS 原则在编程语境中强调什么？", options:["保持简单，避免不必要复杂性","尽可能使用最多抽象层","所有程序必须写成脚本","只追求运行速度"], answer:["A"], explain:"KISS = Keep it simple, stupid，强调简单清晰。"},

      {id:"CPP-09", module:"C++", source:"10 C++ 背景介绍", type:"judge", stem:"头文件通常用于放声明，源文件用于放实现；多文件编译时头文件变化可能影响多个目标文件。", options:["正确","错误"], answer:["A"], explain:"这是多文件编译和 Makefile 依赖关系的基础。"},
      {id:"CPP-10", module:"C++", source:"11 输入输出和标准库", type:"single", stem:"进行文件输入输出时，常用的 C++ 头文件是？", options:["fstream","iomanip","cmath","mpi.h"], answer:["A"], explain:"`fstream` 提供文件流相关类。"},
      {id:"CPP-11", module:"C++", source:"11 输入输出和标准库", type:"judge", stem:"`cout` 输出可能先进入缓冲区，不一定每次插入运算符后都立刻显示到终端。", options:["正确","错误"], answer:["A"], explain:"输出流具有缓冲机制，`endl` 等操作可能触发刷新。"},
      {id:"CPP-12", module:"C++", source:"12 函数和类", type:"multi", stem:"下列哪些是面向对象编程中经常讨论的基本元素或机制？", options:["类","对象","继承","MPI_Bcast"], answer:["A","B","C"], explain:"`MPI_Bcast` 是 MPI 集合通信函数，不是 C++ 面向对象机制。"},
      {id:"CPP-13", module:"C++", source:"12 函数和类", type:"judge", stem:"构造函数常用于对象创建时初始化资源，析构函数常用于对象销毁时释放资源。", options:["正确","错误"], answer:["A"], explain:"这也是 RAII 思想的基础。"},
      {id:"CPP-14", module:"C++", source:"13 指针和动态分配", type:"single", stem:"动态分配得到的内存主要位于哪个区域？", options:["堆","栈","代码段","只读常量区"], answer:["A"], explain:"`new` 申请的对象通常位于堆区；局部自动变量通常位于栈。"},
      {id:"CPP-15", module:"C++", source:"13 指针和动态分配", type:"judge", stem:"内存泄漏指程序丢失了已分配动态内存的释放机会，导致该内存无法被正常回收。", options:["正确","错误"], answer:["A"], explain:"例如覆盖掉唯一指针而没有先 `delete`。"},
      {id:"CPP-16", module:"C++", source:"14 多态", type:"multi", stem:"下列哪些和 C++ 多态或泛型能力关系密切？", options:["虚函数","模板","继承","grep"], answer:["A","B","C"], explain:"虚函数对应动态多态，模板对应静态多态，继承是面向对象的重要机制。"},
      {id:"CPP-17", module:"C++", source:"62 多文件编译", type:"single", stem:"Makefile 中目标文件后面的依赖列表主要用于什么？", options:["判断哪些文件变化后需要重新构建目标","指定程序运行时输入","声明 MPI 进程数量","设置 CUDA block 大小"], answer:["A"], explain:"Make 根据目标和依赖的时间戳决定是否执行规则。"},
      {id:"CPP-18", module:"C++", source:"63 测试", type:"judge", stem:"测试不能证明程序绝对没有错误，但可以帮助发现错误、固定预期行为。", options:["正确","错误"], answer:["A"], explain:"课程复习提到理解测试的原理和重要性，测试更像风险控制工具。"},

      {id:"MPI-15", module:"MPI", source:"20 MPI 基础知识", type:"single", stem:"MPI 程序中通常必须最先完成 MPI 环境初始化的是？", options:["MPI_Init","MPI_Finalize","MPI_Reduce","MPI_Comm_free"], answer:["A"], explain:"常见流程是 Init -> 获取 rank/size -> 计算通信 -> Finalize。"},
      {id:"MPI-16", module:"MPI", source:"20 MPI 基础知识", type:"judge", stem:"`MPI_COMM_WORLD` 默认包含启动该 MPI 程序的所有进程。", options:["正确","错误"], answer:["A"], explain:"它是默认全局通信器。"},
      {id:"MPI-17", module:"MPI", source:"20 MPI 基础知识", type:"single", stem:"获取通信器内进程总数的函数是？", options:["MPI_Comm_size","MPI_Comm_rank","MPI_Wtime","MPI_Status"], answer:["A"], explain:"`MPI_Comm_size(comm, &size)` 返回通信器中进程数量。"},
      {id:"MPI-18", module:"MPI", source:"21 MPI 使用建议", type:"single", stem:"C++ MPI 程序常用哪个编译器包装命令编译？", options:["mpicxx","nvcc","gcc -fopenmp","python"], answer:["A"], explain:"`mpicxx` 会自动带上 MPI 头文件和库链接选项。"},
      {id:"MPI-19", module:"MPI", source:"22 点对点通信", type:"multi", stem:"`MPI_Recv` 的匹配条件通常和哪些参数相关？", options:["source","tag","communicator","屏幕分辨率"], answer:["A","B","C"], explain:"点对点消息匹配依赖来源、标签和通信器等信息。"},
      {id:"MPI-20", module:"MPI", source:"22 点对点通信", type:"judge", stem:"`MPI_Status` 中可以查看消息来源和消息标签等信息。", options:["正确","错误"], answer:["A"], explain:"常见字段包括 `MPI_SOURCE`、`MPI_TAG`、`MPI_ERROR`。"},
      {id:"MPI-21", module:"MPI", source:"22 点对点通信", type:"single", stem:"四种发送模式中，必须保证接收已先启动才可安全使用的是？", options:["MPI_Rsend","MPI_Send","MPI_Bsend","MPI_Ssend"], answer:["A"], explain:"Ready send 要求匹配接收已经 posted，否则行为不安全。"},
      {id:"MPI-22", module:"MPI", source:"22 点对点通信", type:"judge", stem:"`MPI_Bsend` 需要用户提供缓冲区，使用上通常比 `MPI_Isend` 更繁琐。", options:["正确","错误"], answer:["A"], explain:"Buffered send 需要管理附加缓冲区，课程速查里也把它列为使用麻烦。"},
      {id:"MPI-23", module:"MPI", source:"23 集合通信", type:"multi", stem:"下列哪些属于集合通信？", options:["MPI_Bcast","MPI_Scatter","MPI_Gather","MPI_Send"], answer:["A","B","C"], explain:"`MPI_Send` 是点对点通信。"},
      {id:"MPI-24", module:"MPI", source:"23 集合通信", type:"single", stem:"所有进程等待同一通信域内其他进程都到达，应使用？", options:["MPI_Barrier","MPI_Rsend","MPI_Wtime","MPI_Get_version"], answer:["A"], explain:"Barrier 是同步屏障。"},
      {id:"MPI-25", module:"MPI", source:"24 集合通信2", type:"single", stem:"每个进程得到它及之前所有进程数据的前缀规约结果，通常对应？", options:["MPI_Scan","MPI_Gather","MPI_Bcast","MPI_Comm_split"], answer:["A"], explain:"`MPI_Scan` 是前缀和/前缀规约。"},
      {id:"MPI-26", module:"MPI", source:"24 集合通信2", type:"judge", stem:"`MPI_Allgather` 可以理解为 Gather 后再把收集结果广播给所有进程。", options:["正确","错误"], answer:["A"], explain:"这是 Allgather 的常见理解方式。"},
      {id:"MPI-27", module:"MPI", source:"25 进程组划分", type:"judge", stem:"`MPI_Comm_split` 的 `key` 影响新通信器中的 rank 排序。", options:["正确","错误"], answer:["A"], explain:"同一 color 进同一组，key 决定组内排序。"},
      {id:"MPI-28", module:"MPI", source:"MPI I/O", type:"single", stem:"多进程协同写同一文件时，为避免互相覆盖，各进程通常应使用不同的什么？", options:["offset","rank 名字","编译器","环境变量 PATH"], answer:["A"], explain:"并行 I/O 中常让 rank 决定文件偏移量。"},

      {id:"PERF-24", module:"综合/性能", source:"真题综合", type:"single", stem:"下面哪项最像正确性问题，而不是单纯性能问题？", options:["MPI tag 不匹配导致接收不到消息","伪共享导致缓存行抖动","dynamic 调度开销较大","warp 分支发散降低利用率"], answer:["A"], explain:"tag 不匹配可能导致程序卡住或结果错误，其他更偏性能。", freq:"高频", diff:"易错"},
