      {id:"DBG-CPP-01", module:"C++", source:"程序改错 / C++ 动态内存", type:"single", stem:"下面代码的主要问题是什么？", code:"int* a = new int[10];\nfor (int i = 0; i < 10; ++i) a[i] = i;\ndelete a;", options:["应使用 delete[] a 释放数组","for 循环少执行一次","new int[10] 不能存放 int","a 必须用 free 释放"], answer:["A"], explain:"`new[]` 申请数组必须配 `delete[]`，否则是未定义行为。AI 生成代码时很常见这个配对错误。", freq:"高频", diff:"易错"},
      {id:"DBG-CPP-02", module:"C++", source:"程序改错 / C++ 指针", type:"single", stem:"下面代码最危险的问题是？", code:"int* p;\n*p = 42;\ncout << *p << endl;", options:["p 没有初始化就解引用","cout 不能输出 int","42 不能赋给 int","指针变量不能命名为 p"], answer:["A"], explain:"未初始化指针指向未知地址，解引用会导致未定义行为。应先让 p 指向合法对象，或初始化为 nullptr 并检查。", freq:"高频", diff:"易错"},
      {id:"DBG-CPP-03", module:"C++", source:"程序改错 / C++ 数组", type:"single", stem:"下面代码的问题是什么？", code:"int a[10];\nfor (int i = 0; i <= 10; ++i) {\n    a[i] = i;\n}", options:["数组越界，i 不能取到 10","a[10] 应改成 a[11] 才一定正确","for 循环不能用 ++i","局部数组不能赋值"], answer:["A"], explain:"`int a[10]` 的合法下标是 0 到 9，`i <= 10` 会访问 a[10]。", freq:"高频", diff:"基础"},
      {id:"DBG-CPP-04", module:"C++", source:"程序改错 / const 成员函数", type:"single", stem:"这段类代码为什么可能编译不过？", code:"class Counter {\n    int x;\npublic:\n    void inc() const { x++; }\n};", options:["const 成员函数中不能修改普通成员 x","类中不能有 int 成员","public 后不能定义函数","x++ 只能用于全局变量"], answer:["A"], explain:"`const` 成员函数承诺不修改对象的可观察状态，普通成员 `x` 不能在其中自增。若确有缓存类需求可了解 `mutable`。", freq:"中高频", diff:"易错"},
      {id:"DBG-CPP-05", module:"C++", source:"程序改错 / iomanip", type:"single", stem:"下面代码想使用 setw/right，最应该补哪一个头文件？", code:"#include <iostream>\nusing namespace std;\nint main() {\n    cout << setw(8) << right << 12 << endl;\n    return 0;\n}", options:["#include <iomanip>","#include <fstream>","#include <vector>","不需要补头文件，setw/right 是 C++ 关键字"], answer:["A"], explain:"`setw`、`right` 是 iostream 的格式控制器，标准写法应包含 `<iomanip>`。`setw(8)` 设置下一次输出宽度为 8，`right` 表示右对齐；`return 0;` 是 main 正常结束的常见写法，但不是这题的关键缺失。", freq:"中高频", diff:"基础"},

      {id:"DBG-LNX-01", module:"Linux", source:"程序改错 / Shell 脚本", type:"single", stem:"这个脚本直接 `./make_dirs.sh` 运行失败，最可能少了什么步骤？", code:"#!/bin/bash\nfor i in $(seq 1 100)\ndo\n    mkdir -p DIR$i\ndone", options:["chmod +x make_dirs.sh","把 bash 改成 MPI","把 mkdir 改成 grep","seq 不能用于循环"], answer:["A"], explain:"有 shebang 还不够，直接 `./script.sh` 运行需要执行权限。也可用 `bash make_dirs.sh` 绕过执行权限。", freq:"高频", diff:"基础"},
      {id:"DBG-LNX-02", module:"Linux", source:"程序改错 / 命令辨析", type:"single", stem:"下面命令想在 `.log` 文件内容中找 timeout，问题是什么？", code:"find . -name \"timeout\" *.log", options:["应使用 grep \"timeout\" *.log 查内容","find 不能在当前目录使用","timeout 必须写成大写","*.log 只能用于 vim"], answer:["A"], explain:"`find` 更适合按文件名/路径查文件；查文件内容应想到 `grep`。", freq:"高频", diff:"易错"},

      {id:"DBG-MPI-01", module:"MPI", source:"程序改错 / MPI 初始化", type:"single", stem:"下面 MPI 代码的明显问题是？", code:"int rank;\nMPI_Comm_rank(MPI_COMM_WORLD, &rank);\nMPI_Init(&argc, &argv);\nMPI_Finalize();", options:["MPI_Comm_rank 应在 MPI_Init 之后调用","MPI_Finalize 不能出现","rank 必须是 double","MPI_COMM_WORLD 只能用于 OpenMP"], answer:["A"], explain:"MPI 程序基本流程是先 `MPI_Init`，再调用普通 MPI 函数，最后 `MPI_Finalize`。", freq:"高频", diff:"基础"},
      {id:"DBG-MPI-02", module:"MPI", source:"程序改错 / MPI 死锁", type:"single", stem:"两个进程运行下面逻辑，大消息时最可能的问题是？", code:"if (rank == 0) {\n    MPI_Send(buf, n, MPI_INT, 1, 0, MPI_COMM_WORLD);\n    MPI_Recv(buf, n, MPI_INT, 1, 0, MPI_COMM_WORLD, MPI_STATUS_IGNORE);\n} else if (rank == 1) {\n    MPI_Send(buf, n, MPI_INT, 0, 0, MPI_COMM_WORLD);\n    MPI_Recv(buf, n, MPI_INT, 0, 0, MPI_COMM_WORLD, MPI_STATUS_IGNORE);\n}", options:["两个进程都先阻塞发送，可能死锁","tag 相同一定错误","rank 不能用于 if","MPI_Recv 不能接收 int"], answer:["A"], explain:"双方都先 `MPI_Send`，如果发送不能立即缓冲完成，就会互相等待。可用 `MPI_Sendrecv`、非阻塞通信或调整收发顺序。", freq:"高频", diff:"易错"},
      {id:"DBG-MPI-03", module:"MPI", source:"程序改错 / tag 匹配", type:"single", stem:"下面代码 rank 0 可能一直等不到消息，原因是？", code:"// rank 1\nMPI_Send(&x, 1, MPI_INT, 0, 7, MPI_COMM_WORLD);\n\n// rank 0\nMPI_Recv(&x, 1, MPI_INT, 1, 8, MPI_COMM_WORLD, MPI_STATUS_IGNORE);", options:["发送 tag 是 7，接收 tag 是 8，不匹配","MPI_INT 不能发送单个 int","rank 0 不能接收 rank 1","tag 必须等于 rank"], answer:["A"], explain:"MPI 点对点匹配要看 communicator、source、tag 等。tag 不匹配会等不到对应消息。", freq:"高频", diff:"易错"},
      {id:"DBG-MPI-04", module:"MPI", source:"程序改错 / 集合通信", type:"single", stem:"下面代码有什么风险？", code:"if (rank == 0) {\n    MPI_Bcast(&x, 1, MPI_INT, 0, MPI_COMM_WORLD);\n}", options:["只有 rank 0 调用集合通信，其他进程没调用，可能卡住","Bcast 只能广播 double","root 不能是 0","MPI_Bcast 必须有 tag"], answer:["A"], explain:"集合通信要求通信器内相关进程共同调用。`MPI_Bcast` 没有 tag 参数，靠通信器和 root 定义参与关系。", freq:"高频", diff:"易错"},
      {id:"DBG-MPI-05", module:"MPI", source:"程序改错 / Reduce", type:"single", stem:"下面代码中非 root 进程打印 `global_sum` 有什么问题？", code:"MPI_Reduce(&local_sum, &global_sum, 1, MPI_INT, MPI_SUM, 0, MPI_COMM_WORLD);\nprintf(\"%d\\n\", global_sum);", options:["MPI_Reduce 的结果只在 root 进程有效","MPI_SUM 不能用于 int","Reduce 会自动让所有进程都有结果","printf 不能用于 MPI 程序"], answer:["A"], explain:"`MPI_Reduce` 结果只在 root。若所有进程都要结果，应使用 `MPI_Allreduce`。", freq:"高频", diff:"易错"},
      {id:"DBG-MPI-06", module:"MPI", source:"程序改错 / 非阻塞通信", type:"single", stem:"下面非阻塞通信代码缺了什么关键步骤？", code:"MPI_Request req;\nMPI_Isend(buf, n, MPI_INT, dest, 0, MPI_COMM_WORLD, &req);\n// 立刻修改或释放 buf", options:["需要 MPI_Wait 或 MPI_Test 确认通信完成后再复用 buf","Isend 后必须立刻 Finalize","非阻塞发送不能发送数组","req 应该是 int"], answer:["A"], explain:"`MPI_Isend` 只是启动发送，缓冲区不能随意修改或释放，通常要 `MPI_Wait` 确认完成。", freq:"高频", diff:"易错"},

      {id:"DBG-OMP-01", module:"OpenMP", source:"程序改错 / 数据竞争", type:"single", stem:"下面 OpenMP 求和代码的问题是？", code:"int sum = 0;\n#pragma omp parallel for\nfor (int i = 0; i < n; ++i) {\n    sum += a[i];\n}", options:["sum 存在数据竞争，应使用 reduction 或同步","parallel for 不能用于数组","i 必须 shared","OpenMP 不能做求和"], answer:["A"], explain:"多个线程同时更新共享变量 `sum` 会数据竞争。最推荐 `reduction(+:sum)`。", freq:"高频", diff:"易错"},
      {id:"DBG-OMP-02", module:"OpenMP", source:"程序改错 / private", type:"single", stem:"这段代码为什么结果可能不符合预期？", code:"int x = 10;\n#pragma omp parallel private(x)\n{\n    printf(\"%d\\n\", x);\n}", options:["private(x) 的线程私有副本初值未定义","private 会让所有线程共享 x","printf 不能在并行区使用","x 必须是 double"], answer:["A"], explain:"`private` 创建每线程副本，但不使用外部初始值。若要初始为 10，应使用 `firstprivate(x)`。", freq:"高频", diff:"易错"},
      {id:"DBG-OMP-03", module:"OpenMP", source:"程序改错 / single vs master", type:"single", stem:"如果要求只有主线程执行，下面代码的问题是什么？", code:"#pragma omp parallel\n{\n    #pragma omp single\n    init_by_main_thread();\n}", options:["single 不保证主线程执行，应使用 master","single 会让所有线程执行","parallel 内不能调用函数","master 会自动广播结果"], answer:["A"], explain:"`single` 是任意一个线程执行一次；`master` 才是主线程执行。", freq:"高频", diff:"易错"},
      {id:"DBG-OMP-04", module:"OpenMP", source:"程序改错 / atomic", type:"single", stem:"下面代码想用 atomic 保护多行临界区，问题是什么？", code:"#pragma omp atomic\n{\n    x += 1;\n    y += 1;\n}", options:["atomic 只适合特定单条语句，多行应考虑 critical","atomic 比 critical 永远更慢","atomic 只能用于 MPI","大括号能让 atomic 保护任意代码"], answer:["A"], explain:"OpenMP `atomic` 不是块级互斥。多行代码同一时间只允许一个线程执行时，用 `critical` 更合适。", freq:"高频", diff:"易错"},
      {id:"DBG-OMP-05", module:"OpenMP", source:"程序改错 / 调度", type:"single", stem:"每次迭代耗时差异很大，下面调度可能有什么问题？", code:"#pragma omp parallel for schedule(static)\nfor (int i = 0; i < n; ++i) {\n    work_with_very_different_cost(i);\n}", options:["static 可能负载不均，可考虑 dynamic/guided","static 一定导致编译失败","schedule 只能写在 MPI 中","循环变量 i 会共享导致错误"], answer:["A"], explain:"`static` 开销低，适合均匀工作量；不均匀任务常考虑 `dynamic` 或 `guided`。", freq:"中高频", diff:"中等"},
      {id:"DBG-OMP-06", module:"OpenMP", source:"程序改错 / task", type:"single", stem:"下面递归任务代码可能缺少什么？", code:"#pragma omp task\nprocess(left);\n#pragma omp task\nprocess(right);\ncombine();", options:["combine 前可能需要 taskwait 等左右任务完成","task 不能用于递归","process 必须是 MPI 函数","combine 会自动等待所有任务"], answer:["A"], explain:"若 `combine` 依赖左右子任务结果，应在前面加 `#pragma omp taskwait`。", freq:"中频", diff:"易错"},

      {id:"DBG-GPU-01", module:"GPU/CUDA", source:"程序改错 / 线程索引", type:"single", stem:"下面 kernel 只能正确处理哪个范围？主要错误是什么？", code:"__global__ void add(float* a, float* b, float* c) {\n    int idx = threadIdx.x;\n    c[idx] = a[idx] + b[idx];\n}", options:["idx 只使用块内线程号，多个 block 会重复写同一段；应加 blockIdx.x * blockDim.x","threadIdx.x 不能用于数组下标","kernel 不能做加法","float 指针不能传入 GPU"], answer:["A"], explain:"一维全局索引通常是 `threadIdx.x + blockIdx.x * blockDim.x`。只用 threadIdx 会让每个 block 的线程下标重复。", freq:"高频", diff:"易错"},
      {id:"DBG-GPU-02", module:"GPU/CUDA", source:"程序改错 / 越界保护", type:"single", stem:"下面 kernel 在 N 不是 block 大小整数倍时有什么风险？", code:"__global__ void add(float* a, float* b, float* c, int N) {\n    int idx = threadIdx.x + blockIdx.x * blockDim.x;\n    c[idx] = a[idx] + b[idx];\n}", options:["没有 if (idx < N) 保护，可能越界访问","idx 公式一定错误","CUDA 不能传 int N","全局内存不能写"], answer:["A"], explain:"常见模板要加 `if (idx < N)`，因为最后一个 block 可能有多余线程。", freq:"高频", diff:"基础"},
      {id:"DBG-GPU-03", module:"GPU/CUDA", source:"程序改错 / 同步", type:"single", stem:"下面代码可能导致什么问题？", code:"if (threadIdx.x < 16) {\n    __syncthreads();\n}", options:["只有部分 block 内线程进入 __syncthreads，可能死锁","__syncthreads 只能在 CPU 调用","threadIdx.x 不能用于 if","16 必须改成 32"], answer:["A"], explain:"`__syncthreads()` 要求同一 block 内线程都到达屏障。放在部分线程才进入的分支里很危险。", freq:"高频", diff:"易错"},
      {id:"DBG-GPU-04", module:"GPU/CUDA", source:"程序改错 / 内存拷贝方向", type:"single", stem:"下面代码想把 CPU 数据拷到 GPU，方向枚举写错在哪里？", code:"cudaMalloc(&d_a, bytes);\ncudaMemcpy(d_a, h_a, bytes, cudaMemcpyDeviceToHost);", options:["应使用 cudaMemcpyHostToDevice","应使用 MPI_Send","cudaMalloc 后不能 memcpy","d_a 和 h_a 必须都是 int"], answer:["A"], explain:"CPU 到 GPU 是 HostToDevice；GPU 回 CPU 才是 DeviceToHost。", freq:"高频", diff:"基础"},
      {id:"DBG-GPU-05", module:"GPU/CUDA", source:"程序改错 / kernel 同步", type:"single", stem:"下面 CUDA Hello World 可能没有输出或输出不完整，最可能缺少？", code:"helloKernel<<<2, 2>>>();\nreturn 0;", options:["cudaDeviceSynchronize()","MPI_Finalize()","omp barrier","delete[]"], answer:["A"], explain:"kernel 异步启动，主机程序退出前应同步等待设备端输出完成。", freq:"高频", diff:"基础"},
      {id:"DBG-GPU-06", module:"GPU/CUDA", source:"程序改错 / shared memory", type:"single", stem:"下面动态共享内存使用缺了什么？", code:"extern __shared__ float s[];\n// kernel launch:\nkernel<<<blocks, threads>>>(...);", options:["kernel 调用第三个参数应传动态共享内存字节数","extern shared 不能用","共享内存必须用 malloc","threads 必须等于 32"], answer:["A"], explain:"`extern __shared__` 大小由 kernel 启动第三个参数给出，例如 `kernel<<<blocks, threads, threads*sizeof(float)>>>(...)`。", freq:"中高频", diff:"易错"},
      {id:"DBG-GPU-07", module:"GPU/CUDA", source:"程序改错 / 原子操作", type:"single", stem:"下面代码多个线程执行时可能有什么问题？", code:"__device__ int sum;\n__global__ void k() {\n    sum += 1;\n}", options:["多个线程同时更新 sum 有数据竞争，应考虑 atomicAdd","__device__ 变量不能是 int","GPU 不能做自增","sum 会自动 reduction"], answer:["A"], explain:"多个 CUDA 线程同时读改写同一地址会竞争。简单累加可用 `atomicAdd(&sum, 1)`。", freq:"高频", diff:"易错"},
      {id:"DBG-GPU-08", module:"GPU/CUDA", source:"程序改错 / warp 分支", type:"single", stem:"下面代码结果可能正确，但性能问题是什么？", code:"if (threadIdx.x % 2 == 0) {\n    do_A();\n} else {\n    do_B();\n}", options:["同一 warp 内可能分支发散，降低利用率","CUDA 不允许 if/else","threadIdx.x 不能取模","do_A 必须是 MPI 函数"], answer:["A"], explain:"同一 warp 中不同线程走不同路径，会分批执行，未走当前路径的 lane 闲置。", freq:"高频", diff:"易错"},

      {id:"DBG-PERF-01", module:"综合/性能", source:"程序改错 / 混合并行", type:"single", stem:"下面混合运行命令最合理的理解是？", code:"OMP_NUM_THREADS=4 mpirun -np 2 ./program", options:["启动 2 个 MPI 进程，每个进程可用 4 个 OpenMP 线程","启动 4 个 MPI 进程和 2 个 CUDA block","只启动 1 个串行进程","OMP_NUM_THREADS 会覆盖 -np"], answer:["A"], explain:"这是 MPI + OpenMP 混合并行常见命令：MPI 管进程数，OpenMP 环境变量管每进程线程数。", freq:"高频", diff:"易错"},
      {id:"DBG-PERF-02", module:"综合/性能", source:"程序改错 / 性能判断", type:"single", stem:"下面优化建议哪里不准确？", code:"// 为了减少 GPU 访存延迟：\n// 只要减少线程数量到 1 个，就能提升性能。", options:["减少并行度通常不利于 GPU 延迟隐藏和吞吐","GPU 不能访问内存","线程数量越少一定越快","访存延迟只能靠 MPI 解决"], answer:["A"], explain:"GPU 靠大量活跃 warp 隐藏延迟。减少到 1 个线程通常会让硬件空闲，不能作为通用优化建议。", freq:"高频", diff:"易错"},

      {id:"DBG-CPP-06", module:"C++", source:"程序改错 / 动态数组初始化", type:"single", stem:"这段代码最大的问题是什么？", code:"int* a = new int[10];\nfor (int i = 0; i < 10; ++i) {\n    cout << a[i] << endl;\n}\ndelete[] a;", options:["动态数组元素没有初始化就读取","delete[] 写错了","new int[10] 不能用循环访问","cout 不能输出数组元素"], answer:["A"], explain:"`new int[10]` 默认初始化时，内置类型元素值未定义，直接输出没有意义。应先赋值，或用 `new int[10]()` 做值初始化。", freq:"中高频", diff:"易错"},
      {id:"DBG-CPP-07", module:"C++", source:"程序改错 / 悬空指针", type:"single", stem:"下面代码的问题是什么？", code:"int* p = new int(5);\ndelete p;\ncout << *p << endl;", options:["p 已经释放，继续解引用是悬空指针问题","delete 后 p 会自动变成 nullptr","cout 不能输出指针指向的值","new int(5) 语法非法"], answer:["A"], explain:"`delete p` 释放对象后，p 的值本身通常还保留旧地址，但那块内存不再属于你。继续 `*p` 是 use-after-free。常见防御是释放后 `p = nullptr`。", freq:"高频", diff:"易错"},
      {id:"DBG-CPP-08", module:"C++", source:"程序改错 / 文件流", type:"single", stem:"代码想读文件，但可能缺少哪一步判断？", code:"#include <fstream>\nifstream fin(\"data.txt\");\nint x;\nfin >> x;", options:["应检查 fin 是否成功打开文件","fstream 不能读 int","ifstream 必须配 delete","data.txt 必须是 MPI 文件"], answer:["A"], explain:"文件路径错误或权限不足时打开会失败。考试改错题常考“能编译但逻辑不稳”：读取前可用 `if (!fin)` 判断。", freq:"中频", diff:"中等"},
      {id:"DBG-CPP-09", module:"C++", source:"程序改错 / 头文件重复包含", type:"single", stem:"多文件工程中，头文件没有保护可能导致什么问题？", code:"// vec.h\nclass Vec { };\n\n// a.cpp 和 b.cpp 都间接多次包含 vec.h", options:["同一声明或定义被重复处理，可能重定义；应使用 include guard 或 #pragma once","头文件不能包含 class","C++ 不允许多文件工程","class Vec 必须写在 main 里"], answer:["A"], explain:"头文件被多次包含很常见，类定义重复会造成编译错误。典型写法是 `#ifndef VEC_H ... #define VEC_H ... #endif` 或 `#pragma once`。", freq:"中频", diff:"中等"},

      {id:"DBG-MPI-07", module:"MPI", source:"程序改错 / Scatter 参数", type:"single", stem:"下面代码中 `MPI_Scatter` 最容易混淆的点是什么？", code:"MPI_Scatter(sendbuf, sendcount, MPI_INT,\n            recvbuf, recvcount, MPI_INT,\n            0, MPI_COMM_WORLD);", options:["sendcount 是每个进程收到的元素数，不是 sendbuf 总长度","root 不能是 0","Scatter 必须有 tag","recvbuf 只能在 root 上使用"], answer:["A"], explain:"`MPI_Scatter` 的 `sendcount` 指发给每个接收进程的数量；如果有 p 个进程，root 的 sendbuf 通常至少要有 `p * sendcount` 个元素。", freq:"高频", diff:"易错"},
      {id:"DBG-MPI-08", module:"MPI", source:"程序改错 / Gather 参数", type:"single", stem:"下面 `MPI_Gather` 中 root 的 `recvbuf` 至少需要多大？", code:"// size 个进程，每个进程发送 4 个 int\nMPI_Gather(sendbuf, 4, MPI_INT,\n           recvbuf, 4, MPI_INT,\n           0, MPI_COMM_WORLD);", options:["至少 size * 4 个 int","至少 4 个 int","至少 rank * 4 个 int","非 root 也必须分配 size * 4 个 int"], answer:["A"], explain:"Gather 是各进程向 root 收集。root 需要容纳所有进程的数据，总数是进程数乘每个进程发送量。非 root 的 recvbuf 通常不使用。", freq:"高频", diff:"易错"},
      {id:"DBG-MPI-09", module:"MPI", source:"程序改错 / Comm_split", type:"single", stem:"下面代码如果只有偶数 rank 调用，会有什么问题？", code:"if (rank % 2 == 0) {\n    MPI_Comm_split(MPI_COMM_WORLD, 0, rank, &newcomm);\n}", options:["MPI_Comm_split 是集合式调用，通常所有进程都要调用；不参加者可用 MPI_UNDEFINED","偶数 rank 不能创建通信器","key 不能用 rank","newcomm 必须是 int"], answer:["A"], explain:"`MPI_Comm_split` 要由原通信器内进程共同调用。若某些进程不加入新通信器，应让它们也调用，并传 `color = MPI_UNDEFINED`。", freq:"中高频", diff:"易错"},
      {id:"DBG-MPI-10", module:"MPI", source:"程序改错 / Waitall", type:"single", stem:"这段非阻塞互发代码还缺少什么？", code:"MPI_Request reqs[2];\nMPI_Isend(&x, 1, MPI_INT, peer, 0, MPI_COMM_WORLD, &reqs[0]);\nMPI_Irecv(&y, 1, MPI_INT, peer, 0, MPI_COMM_WORLD, &reqs[1]);\nuse(y);", options:["应在 use(y) 前 MPI_Waitall 等待接收完成","Irecv 后 y 立即可用","Isend 和 Irecv 不能同时出现","reqs 应改成 MPI_Status"], answer:["A"], explain:"`MPI_Irecv` 返回只表示接收请求已启动，不表示数据已经到达。使用接收缓冲区前要 `MPI_Wait` 或 `MPI_Waitall`。", freq:"高频", diff:"易错"},
      {id:"MPI-51", module:"MPI", source:"集合通信细节", type:"judge", stem:"在 `MPI_Bcast` 中，root 进程和非 root 进程都要调用同一个 `MPI_Bcast`，只是 root 的缓冲区作为发送源。", options:["正确","错误"], answer:["A"], explain:"广播不是 root 单方面调用的发送函数，而是集合通信。所有参与进程调用同一接口，root 参数告诉 MPI 数据源来自哪个 rank。", freq:"高频", diff:"易错"},
      {id:"MPI-52", module:"MPI", source:"点对点细节", type:"judge", stem:"只要 `MPI_Send` 和 `MPI_Recv` 的 tag 相同，就一定能匹配成功。", options:["正确","错误"], answer:["B"], explain:"tag 只是匹配条件之一，还要看 communicator、source/destination、datatype/count 的兼容性以及程序是否真的发出了对应消息。", freq:"高频", diff:"易错"},
      {id:"MPI-53", module:"MPI", source:"20 MPI 基础知识", type:"single", stem:"下面哪句话最准确地区分 MPI 进程和 OpenMP 线程？", options:["MPI 进程通常地址空间私有，OpenMP 线程通常共享同一进程地址空间","MPI 进程共享所有变量，OpenMP 线程必须靠消息通信","MPI 和 OpenMP 都只能在单核 CPU 上运行","MPI 的 rank 与 OpenMP 的 thread id 是同一个编号空间"], answer:["A"], explain:"MPI 以进程为单位，变量通常不共享；OpenMP 以线程为单位，同一进程中的线程共享地址空间。rank 和 thread id 属于不同并行模型。", freq:"高频", diff:"易错"},
      {id:"MPI-54", module:"MPI", source:"22 点对点通信", type:"multi", stem:"一个 `MPI_Recv` 能否匹配到某条消息，通常要同时考虑哪些条件？", options:["通信器是否相同","source/destination 是否对应","tag 是否匹配","两个进程是否打印了相同字符串"], answer:["A","B","C"], explain:"MPI 点对点匹配核心是通信器、来源/目的、tag 等。打印内容不参与消息匹配。", freq:"高频", diff:"易错"},
      {id:"MPI-55", module:"MPI", source:"22 点对点通信", type:"single", stem:"`MPI_Status status; MPI_Recv(..., &status);` 后，想知道实际消息来自哪个 rank，应查看？", options:["status.MPI_SOURCE","status.MPI_TAG","status.MPI_ERROR","MPI_Comm_size"], answer:["A"], explain:"`MPI_Status` 常见字段包括 `MPI_SOURCE`、`MPI_TAG`、`MPI_ERROR`。SOURCE 是实际来源，TAG 是消息标签。", freq:"中高频", diff:"基础"},
      {id:"MPI-56", module:"MPI", source:"22 点对点通信", type:"judge", stem:"`MPI_ANY_SOURCE` 可以放宽接收来源，但并不等于放宽 tag 和 communicator 的匹配。", options:["正确","错误"], answer:["A"], explain:"通配符只通配对应维度。`MPI_ANY_SOURCE` 只是不限定来源；tag 若不是 `MPI_ANY_TAG` 仍要匹配，通信器也仍要一致。", freq:"中高频", diff:"易错"},
      {id:"MPI-57", module:"MPI", source:"23 集合通信", type:"single", stem:"每个进程手里有一个局部误差值，想让所有进程都得到全局最大误差，最贴切的是？", options:["MPI_Allreduce + MPI_MAX","MPI_Reduce + MPI_MAX","MPI_Gather + MPI_MAX","MPI_Bcast + MPI_MAX"], answer:["A"], explain:"关键词是“所有进程都得到结果”和“最大值规约”。`Reduce` 只保证 root 有结果；`Allreduce` 才让所有进程都有规约结果。", freq:"高频", diff:"易错"},
      {id:"MPI-58", module:"MPI", source:"23 集合通信", type:"single", stem:"`MPI_Scatter(sendbuf, sendcount, ..., recvbuf, recvcount, ..., root, comm)` 中，`sendcount` 最准确的含义是？", options:["root 发给每个进程的元素数","root 的 sendbuf 总元素数","非 root 进程总共接收的元素数之和","通信器内进程总数"], answer:["A"], explain:"Scatter 参数很容易把总量和每份数量混淆。`sendcount` 是每个目标进程收到多少个元素；root 总缓冲区通常至少是 `size * sendcount`。", freq:"高频", diff:"易错"},
      {id:"MPI-59", module:"MPI", source:"23 集合通信", type:"judge", stem:"`MPI_Barrier` 能保证所有进程都到达屏障，但不能保证屏障前的通信参数一定写对。", options:["正确","错误"], answer:["A"], explain:"Barrier 是同步等待，不是通信正确性检查器。tag/root/count 写错仍可能卡住或得到错误结果。", freq:"中高频", diff:"中等"},
      {id:"MPI-60", module:"MPI", source:"25 进程组划分", type:"single", stem:"想把偶数 rank 和奇数 rank 分到两个新通信器，`MPI_Comm_split` 的 `color` 最自然写成？", options:["rank % 2","rank","size","MPI_COMM_WORLD"], answer:["A"], explain:"`color` 决定分组，偶数为 0、奇数为 1 正好分两组。`key` 才影响组内排序。", freq:"中高频", diff:"基础"},
      {id:"MPI-61", module:"MPI", source:"24 集合通信2", type:"single", stem:"有 4 个 rank，局部值分别为 1,2,3,4。使用 `MPI_Scan` 加法规约后，rank 2 得到什么？", options:["6","3","10","4"], answer:["A"], explain:"`MPI_Scan` 是前缀规约。rank 2 拿到 rank 0、1、2 的累积和：1+2+3=6。", freq:"中频", diff:"中等"},
      {id:"MPI-62", module:"MPI", source:"MPI 数据类型", type:"multi", stem:"发送 C 结构体或非连续数组片段时，哪些思路通常比直接当作 `MPI_INT` 一整块发送更稳？", options:["构造 MPI 派生数据类型","先打包到连续缓冲区再发送","逐字段发送并保持接收顺序一致","把结构体强制解释为 std::string"], answer:["A","B","C"], explain:"复杂布局要考虑内存间隙和非连续性。派生数据类型、打包、逐字段发送都可行；强行当字符串不符合 MPI 类型语义。", freq:"低频", diff:"易错"},
      {id:"DBG-MPI-16", module:"MPI", source:"程序改错 / ANY_SOURCE", type:"single", stem:"下面代码用 `MPI_ANY_SOURCE` 接收后，回复消息最应该发给谁？", code:"MPI_Status st;\nMPI_Recv(&x, 1, MPI_INT, MPI_ANY_SOURCE, 7, MPI_COMM_WORLD, &st);\nMPI_Send(&ans, 1, MPI_INT, /* ? */, 8, MPI_COMM_WORLD);", options:["st.MPI_SOURCE","MPI_ANY_SOURCE","rank","MPI_COMM_WORLD"], answer:["A"], explain:"既然接收来源不固定，回复时应使用 status 里记录的实际来源 `st.MPI_SOURCE`。`MPI_ANY_SOURCE` 是接收通配符，不能作为发送目标。", freq:"高频", diff:"易错"},
      {id:"DBG-MPI-17", module:"MPI", source:"程序改错 / Finalize 顺序", type:"judge", stem:"若某个 rank 提前 `return` 跳过 `MPI_Finalize`，而其他 rank 还在通信，程序可能出现资源清理或通信异常。", options:["正确","错误"], answer:["A"], explain:"MPI 程序应让所有正常参与的进程有一致的生命周期。提前退出常导致其他进程等待、通信失败或运行环境清理异常。", freq:"中频", diff:"中等"},

      {id:"DBG-OMP-07", module:"OpenMP", source:"程序改错 / 隐式 barrier", type:"single", stem:"下面代码中，第二个 for 是否一定等第一个 for 全部结束后才开始？", code:"#pragma omp parallel\n{\n    #pragma omp for\n    for (int i = 0; i < n; ++i) a[i] = init(i);\n\n    #pragma omp for\n    for (int i = 0; i < n; ++i) b[i] = a[i] + 1;\n}", options:["默认会等，因为 omp for 末尾有隐式 barrier","不会等，必须手写 barrier","OpenMP 不允许连续两个 for","第二个 for 只能由主线程执行"], answer:["A"], explain:"OpenMP 的 `for` 构造默认末尾有隐式 barrier。如果第一个写成 `nowait`，才需要特别考虑第二个循环是否依赖第一个结果。", freq:"中高频", diff:"中等"},
      {id:"DBG-OMP-08", module:"OpenMP", source:"程序改错 / nowait", type:"single", stem:"这段代码有什么潜在问题？", code:"#pragma omp parallel\n{\n    #pragma omp for nowait\n    for (int i = 0; i < n; ++i) a[i] = init(i);\n\n    #pragma omp for\n    for (int i = 0; i < n; ++i) b[i] = a[i] + 1;\n}", options:["nowait 取消了第一个 for 末尾同步，第二个 for 可能读到未完成的 a[i]","nowait 会让循环串行","第二个 for 不能读数组","init 必须是 atomic"], answer:["A"], explain:"`nowait` 是性能优化工具，不是随便加的。若后续代码依赖前一个循环全部完成，就不能取消屏障，或需要手动同步。", freq:"高频", diff:"易错"},
      {id:"DBG-OMP-09", module:"OpenMP", source:"程序改错 / collapse", type:"single", stem:"下面 `collapse(2)` 是否一定安全？", code:"#pragma omp parallel for collapse(2)\nfor (int i = 1; i < n; ++i)\n    for (int j = 1; j < n; ++j)\n        a[i][j] = a[i-1][j] + a[i][j-1];", options:["不一定安全，循环迭代之间有数据依赖","collapse 只能用于三重循环","二维数组不能并行","i 和 j 必须 shared"], answer:["A"], explain:"`collapse` 只是合并循环迭代空间，不能消除数据依赖。这里每个元素依赖上方和左方元素，乱序并行可能结果错误。", freq:"中频", diff:"易错"},
      {id:"DBG-OMP-10", module:"OpenMP", source:"程序改错 / default(none)", type:"single", stem:"为什么有人推荐在调试 OpenMP 时使用 `default(none)`？", code:"#pragma omp parallel for default(none) shared(a,n) reduction(+:sum)\nfor (int i = 0; i < n; ++i) sum += a[i];", options:["它强制显式声明变量共享/私有属性，能减少误判","它让程序自动更快","它取消所有 barrier","它只能用于 MPI 混合编程"], answer:["A"], explain:"OpenMP 数据环境容易出错。`default(none)` 让编译器逼你写清楚变量属性，尤其适合查共享变量和私有变量错误。", freq:"中频", diff:"中等"},
      {id:"OMP-51", module:"OpenMP", source:"同步细节", type:"judge", stem:"`master` 构造末尾默认没有隐式 barrier，而 `single` 末尾默认有隐式 barrier。", options:["正确","错误"], answer:["A"], explain:"这是一道常见辨析题。`single nowait` 可以去掉 single 的隐式 barrier；`master` 本身只限定主线程执行，不负责同步其他线程。", freq:"高频", diff:"易错"},
      {id:"OMP-52", module:"OpenMP", source:"数据环境细节", type:"judge", stem:"并行区外定义的变量在 OpenMP 并行区中默认通常是 shared，并行区内部定义的局部变量通常是 private。", options:["正确","错误"], answer:["A"], explain:"这是 OpenMP 数据环境的默认规则，但考试中遇到复杂作用域仍要具体分析。循环索引变量在 `omp for` 中也通常被私有化。", freq:"高频", diff:"基础"},
      {id:"OMP-53", module:"OpenMP", source:"30 编程模型", type:"single", stem:"下面哪句话最准确描述 OpenMP 的 Fork-Join 模式？", options:["主线程进入并行区时派生线程团队，结束后线程团队汇合回串行执行","每个线程都创建一个新的 MPI 进程","所有线程永久独立运行直到程序结束","只有 master 构造才会产生线程"], answer:["A"], explain:"OpenMP 典型执行模型是串行区由主线程执行，进入 parallel 后 fork 出线程团队，退出并行区后 join。", freq:"高频", diff:"基础"},
      {id:"OMP-54", module:"OpenMP", source:"31 并行构造", type:"judge", stem:"`#pragma omp for` 本身通常要求位于并行区域内；若想一行完成创建线程和分配循环，常用 `#pragma omp parallel for`。", options:["正确","错误"], answer:["A"], explain:"`omp for` 是 work-sharing 构造，负责把循环迭代分给已有线程团队；`parallel for` 是 parallel + for 的组合。", freq:"高频", diff:"基础"},
      {id:"OMP-55", module:"OpenMP", source:"34 数据环境", type:"multi", stem:"下面哪些说法更符合 OpenMP 数据环境的常见规则？", options:["并行区外定义的变量默认通常 shared","并行区内定义的局部变量通常 private","private 变量副本的初值通常未定义","firstprivate 会把外部值初始化到每个线程副本"], answer:["A","B","C","D"], explain:"这四条都是高频规则。真正做题时要结合变量作用域、构造类型和子句具体判断。", freq:"高频", diff:"易错"},
      {id:"OMP-56", module:"OpenMP", source:"32 同步", type:"single", stem:"多个线程执行 `sum += a[i]`，下面哪种处理通常比 `critical` 更符合求和语义？", options:["reduction(+:sum)","ordered","single","lastprivate(sum)"], answer:["A"], explain:"求和是典型规约。`critical` 能保护但会频繁串行化；`reduction` 创建线程局部副本后合并，更贴合语义。", freq:"高频", diff:"基础"},
      {id:"OMP-57", module:"OpenMP", source:"32 同步", type:"single", stem:"`atomic` 与 `critical` 的考试辨析中，哪句话最稳？", options:["atomic 通常只适合特定单条读改写，critical 可保护更大的代码块","atomic 总是保护任意多行代码","critical 只能保护整数自增","两者都不会带来同步开销"], answer:["A"], explain:"atomic 粒度窄、开销通常小；critical 范围更宽但容易串行化。不要把 atomic 当万能临界区。", freq:"高频", diff:"易错"},
      {id:"OMP-58", module:"OpenMP", source:"33 调度", type:"single", stem:"循环前半部分迭代很轻、后半部分迭代很重，且每次耗时难预测，通常优先考虑？", options:["schedule(dynamic) 或 guided","schedule(static) 固定大块","master 包住整个循环","把 chunk 设置为线程总数"], answer:["A"], explain:"负载不均时 dynamic/guided 能让线程做完再取任务，缓解某些线程早早空闲的问题。static 低开销但负载均衡差。", freq:"高频", diff:"中等"},
      {id:"OMP-59", module:"OpenMP", source:"35 任务", type:"judge", stem:"`task` 构造适合递归或不规则工作，但创建任务后并不意味着任务结果马上可用。", options:["正确","错误"], answer:["A"], explain:"task 可异步执行。若后续代码依赖任务产生的结果，需要 `taskwait` 或其他同步。", freq:"中高频", diff:"易错"},
      {id:"OMP-60", module:"OpenMP", source:"36 内存模型", type:"single", stem:"伪共享问题中，为什么不同线程写的是不同变量仍可能慢？", options:["这些变量可能落在同一个缓存行，写入导致缓存行反复失效","OpenMP 不允许不同线程写不同变量","不同变量一定共享同一个地址","伪共享会自动变成 MPI 通信"], answer:["A"], explain:"伪共享是缓存一致性层面的性能问题，不是变量名是否相同的问题。常见处理是填充、对齐或改变数据布局。", freq:"高频", diff:"易错"},
      {id:"OMP-61", module:"OpenMP", source:"37 SIMD", type:"judge", stem:"`#pragma omp simd` 更强调向量化的数据级并行，和创建多个 OpenMP 线程不是同一层面的概念。", options:["正确","错误"], answer:["A"], explain:"SIMD 是一条指令处理多个数据元素；线程并行是多个线程执行工作。二者可以结合，但不能混为一谈。", freq:"中频", diff:"易错"},
      {id:"OMP-62", module:"OpenMP", source:"运行时函数", type:"single", stem:"想在并行区内部判断当前线程是不是 0 号线程，最直接应调用？", options:["omp_get_thread_num()","omp_get_num_threads()","omp_set_num_threads()","omp_get_wtime()"], answer:["A"], explain:"`omp_get_thread_num()` 返回当前线程编号；`omp_get_num_threads()` 返回线程总数。", freq:"中高频", diff:"基础"},
      {id:"DBG-OMP-16", module:"OpenMP", source:"程序改错 / lastprivate", type:"single", stem:"下面代码希望并行循环结束后 `last` 等于最后一次迭代的值，最贴切的子句是？", code:"int last = -1;\n#pragma omp parallel for private(last)\nfor (int i = 0; i < n; ++i) {\n  last = i;\n}", options:["lastprivate(last)","firstprivate(last)","shared(last) 且不加同步","copyin(last)"], answer:["A"], explain:"`private` 副本不会写回外部变量。若要把逻辑上最后一次迭代的值写回，应使用 `lastprivate`。", freq:"中高频", diff:"易错"},
      {id:"DBG-OMP-17", module:"OpenMP", source:"程序改错 / ordered", type:"single", stem:"下面代码想按 i 顺序输出，为什么只写 `ordered` 块还不完整？", code:"#pragma omp parallel for\nfor (int i = 0; i < n; ++i) {\n  #pragma omp ordered\n  cout << i << endl;\n}", options:["外层 for 构造还需要带 `ordered` 子句","ordered 只能用于 MPI","cout 不能在 OpenMP 中使用","ordered 会自动创建线程"], answer:["A"], explain:"OpenMP 的 ordered 区域通常要求对应循环构造声明 `ordered`。同时 ordered 会降低并行效率，非必要不使用。", freq:"中频", diff:"易错"},
      {id:"DBG-OMP-18", module:"OpenMP", source:"程序改错 / sections", type:"judge", stem:"`sections` 适合把少数几个不同代码块分给线程执行；它不是用来自动划分 for 循环迭代的主要构造。", options:["正确","错误"], answer:["A"], explain:"`sections` 表达任务种类不同的并行块；循环迭代分配主要用 `for` 或 `parallel for`。", freq:"低频", diff:"中等"},
      {id:"DBG-OMP-19", module:"OpenMP", source:"程序改错 / copyprivate", type:"single", stem:"一个线程在 `single` 中读入配置值，想把该私有值广播给其他线程私有副本，可考虑？", options:["copyprivate","copyin","lastprivate","MPI_Allreduce"], answer:["A"], explain:"`copyprivate` 用在 single 结束时，把执行 single 的线程中的私有值复制给其他线程。`copyin` 针对 threadprivate 变量进入并行区初始化。", freq:"低频", diff:"易错"},
      {id:"DBG-OMP-20", module:"OpenMP", source:"程序改错 / 嵌套并行", type:"judge", stem:"嵌套 parallel 是否真的产生更多线程，可能受运行时设置和环境变量影响，不能只看代码里写了两层 parallel。", options:["正确","错误"], answer:["A"], explain:"OpenMP 嵌套并行受实现和设置影响，例如是否允许 nested/max active levels。考试更常考不要机械假定线程数相乘。", freq:"低频", diff:"中等"},

      {id:"DBG-GPU-09", module:"GPU/CUDA", source:"程序改错 / 设备变量拷贝", type:"single", stem:"CPU 想给 `__device__` 变量赋值，下面写法有什么问题？", code:"__device__ int dev_x;\nint h = 7;\ndev_x = h;", options:["主机端不能直接给设备变量赋值，应使用 cudaMemcpyToSymbol 等 API","__device__ 变量不能是 int","h 必须在 GPU 上定义","dev_x 必须是指针"], answer:["A"], explain:"`__device__` 变量位于设备端。主机端访问它要通过 CUDA API，例如 `cudaMemcpyToSymbol(dev_x, &h, sizeof(int))`。", freq:"中高频", diff:"易错"},
      {id:"DBG-GPU-10", module:"GPU/CUDA", source:"程序改错 / 统一内存同步", type:"single", stem:"使用统一内存时，下面代码 CPU 读取结果前缺什么？", code:"cudaMallocManaged(&data, N*sizeof(float));\nkernel<<<blocks, threads>>>(data);\nprintf(\"%f\\n\", data[0]);", options:["通常应先 cudaDeviceSynchronize 等 kernel 完成","统一内存不能给 kernel 用","printf 不能输出 float","cudaMallocManaged 必须配 MPI_Finalize"], answer:["A"], explain:"统一内存让 CPU/GPU 使用同一指针，但 kernel 仍是异步启动。CPU 读取 GPU 写入结果前要保证 kernel 完成。", freq:"中高频", diff:"易错"},
      {id:"DBG-GPU-11", module:"GPU/CUDA", source:"程序改错 / block 同步范围", type:"single", stem:"下面说法作为注释哪里错了？", code:"// __syncthreads 可以同步整个 grid 的所有 block\n__syncthreads();", options:["__syncthreads 只能同步同一个 block 内线程","__syncthreads 只能同步 CPU 线程","grid 中不能有 block","同步函数必须写在主机端"], answer:["A"], explain:"CUDA block 之间通常不能在一个 kernel 内用 `__syncthreads` 全局同步。若需要全局同步，常见做法是拆成多个 kernel。", freq:"高频", diff:"易错"},
      {id:"DBG-GPU-12", module:"GPU/CUDA", source:"程序改错 / stream 异步", type:"single", stem:"下面代码想准确计时 kernel，主要缺什么？", code:"double t0 = now();\nkernel<<<blocks, threads, 0, stream>>>();\ndouble t1 = now();", options:["kernel 异步启动，计时前后应同步或使用 CUDA event","kernel 不能放 stream","blocks 必须等于 threads","now 必须是 MPI_Wtime"], answer:["A"], explain:"主机端调用 kernel 后通常立即返回。若直接记录 t1，测到的是启动开销而非执行时间。CUDA event 是更合适的 GPU 计时方式。", freq:"中高频", diff:"易错"},
      {id:"GPU-56", module:"GPU/CUDA", source:"内存层次细节", type:"judge", stem:"共享内存速度快、作用域为 block，因此常用来缓存一个 block 内线程会重复访问的数据。", options:["正确","错误"], answer:["A"], explain:"共享内存是片上存储，延迟比全局内存低很多，但容量有限、作用域有限。典型用法是 tile/分块缓存。", freq:"高频", diff:"基础"},
      {id:"GPU-57", module:"GPU/CUDA", source:"线程组织细节", type:"judge", stem:"`dim3 block(16, 16)` 表示每个 block 有 32 个线程。", options:["正确","错误"], answer:["B"], explain:"二维 block 的线程数是各维度乘积：16 * 16 = 256。不要把维度相加。", freq:"高频", diff:"易错"},

      {id:"DBG-LNX-03", module:"Linux", source:"程序改错 / 通配符", type:"single", stem:"下面命令想找所有 `.log` 文件中的 timeout，哪个写法更稳？", code:"grep timeout *log", options:["grep \"timeout\" ./*.log","find timeout .log","ls timeout | grep log","touch timeout.log"], answer:["A"], explain:"`*.log` 更明确匹配以 `.log` 结尾的文件；给 timeout 加引号能避免特殊字符或空格带来的问题。", freq:"高频", diff:"基础"},
      {id:"DBG-LNX-04", module:"Linux", source:"程序改错 / PATH", type:"single", stem:"你写了可执行程序 `mytool`，但直接输入命令找不到，最可能原因之一是？", code:"$ mytool\ncommand not found", options:["程序所在目录不在 PATH 中，或没有用 ./mytool 指定当前目录","Linux 不能运行自己编译的程序","命令名必须大写","grep 没有安装"], answer:["A"], explain:"shell 只会在 PATH 列出的目录中找命令。当前目录通常不在 PATH 中，所以常用 `./mytool` 运行当前目录程序。", freq:"中高频", diff:"中等"},

      {id:"PERF-31", module:"综合/性能", source:"性能计算", type:"single", stem:"串行时间 80 秒，并行时间 20 秒，使用 8 个处理器，效率是多少？", options:["0.5","4","8","0.25"], answer:["A"], explain:"加速比 S = 80 / 20 = 4；效率 E = S / P = 4 / 8 = 0.5。先算加速比，再除以处理器数。", freq:"高频", diff:"中等"},
      {id:"PERF-32", module:"综合/性能", source:"Amdahl 定律", type:"single", stem:"若串行部分占 5%，理论最大加速比约为？", options:["20","5","95","无法超过 2"], answer:["A"], explain:"处理器数趋于无限时，可并行部分时间趋近于 0，最大加速比约为 `1 / 0.05 = 20`。", freq:"高频", diff:"基础"},
      {id:"PERF-33", module:"综合/性能", source:"模型辨析", type:"multi", stem:"下列哪些错误更偏“程序可能卡住/结果错误”，而不只是性能下降？", options:["MPI tag 不匹配","OpenMP 多线程无同步写共享 sum","CUDA 数组没有 idx < N 越界保护","OpenMP 伪共享"], answer:["A","B","C"], explain:"tag 不匹配可能永远等不到消息；数据竞争会导致结果不确定；CUDA 越界是内存错误。伪共享主要是性能下降，结果通常仍可能正确。", freq:"高频", diff:"易错"},
      {id:"PERF-34", module:"综合/性能", source:"AI 代码审查", type:"judge", stem:"AI 生成的并行代码即使看起来能编译，也需要人工检查通信匹配、同步范围、数据竞争和边界条件。", options:["正确","错误"], answer:["A"], explain:"这正是课程强调的判断能力：并行错误经常不是语法错误，而是时序、作用域、匹配条件和内存访问错误。", freq:"高频", diff:"基础"},

      {id:"DBG-LNX-05", module:"Linux", source:"程序改错 / 空格文件名", type:"single", stem:"下面脚本想逐个处理当前目录的 txt 文件，哪处最容易被文件名中的空格坑到？", code:"for f in *.txt; do\n  grep error $f\ndone", options:["`$f` 应写成 `\"$f\"`，避免空格被拆成多个参数","grep 不能在循环中使用","*.txt 只能匹配目录","for 循环不能处理文件名"], answer:["A"], explain:"Shell 变量展开后会发生词拆分。文件名含空格时，`$f` 会变成多个参数；写成 `grep error \"$f\"` 更稳。", freq:"高频", diff:"易错"},
      {id:"DBG-LNX-06", module:"Linux", source:"程序改错 / 递归复制", type:"single", stem:"下面命令想复制目录 `src` 到 `backup`，报错最可能是因为少了什么？", code:"cp src backup", options:["复制目录通常需要 `cp -r src backup`","cp 不能复制任何文件","backup 必须先用 MPI 创建","src 名字不能超过 3 个字符"], answer:["A"], explain:"`cp` 默认复制普通文件；目录需要递归复制，常用 `cp -r`。考试里看到“复制目录”要立刻想到递归参数。", freq:"中频", diff:"基础"},

      {id:"DBG-CPP-10", module:"C++", source:"程序改错 / 越界", type:"single", stem:"下面代码的核心错误是什么？", code:"int a[10];\nfor (int i = 0; i <= 10; ++i) {\n  a[i] = i;\n}", options:["循环条件应为 `i < 10`，否则访问 a[10] 越界","数组必须从 1 开始编号","int 数组不能放在栈上","++i 不能用于 for 循环"], answer:["A"], explain:"C/C++ 数组下标从 0 到 n-1。`a[10]` 已经越过最后一个元素，是未定义行为。", freq:"高频", diff:"易错"},
      {id:"DBG-CPP-11", module:"C++", source:"程序改错 / 返回局部地址", type:"single", stem:"下面函数为什么危险？", code:"int* make_value() {\n  int x = 42;\n  return &x;\n}", options:["返回了局部变量地址，函数返回后该地址失效","函数不能返回指针","42 不能赋给 int","局部变量必须用 delete 释放"], answer:["A"], explain:"`x` 的生命周期只到函数返回。返回 `&x` 会得到悬垂指针，后续解引用结果不可预测。", freq:"高频", diff:"易错"},
      {id:"DBG-CPP-12", module:"C++", source:"程序改错 / 虚析构", type:"single", stem:"通过基类指针删除派生类对象时，下面代码最应该补什么？", code:"struct Base { ~Base() {} };\nstruct Derived : Base { int* p; ~Derived(){ delete[] p; } };\nBase* b = new Derived;\ndelete b;", options:["把 `Base` 的析构函数声明为 `virtual`","把 Derived 改成 private","把 delete b 改成 free(b)","去掉 Derived 的析构函数"], answer:["A"], explain:"基类指针删除派生类对象时，基类析构函数应为虚函数，否则派生类析构可能不被调用，资源释放不完整。", freq:"中高频", diff:"易错"},
      {id:"DBG-CPP-13", module:"C++", source:"程序改错 / const 成员函数", type:"judge", stem:"`void f() const` 成员函数中一般不能修改普通成员变量；如果修改了，说明它不符合 const 成员函数承诺。", options:["正确","错误"], answer:["A"], explain:"`const` 成员函数把 `this` 视为指向 const 对象的指针。普通成员不能被修改，除非成员被声明为 `mutable` 等特殊情况。", freq:"中高频", diff:"中等"},
      {id:"DBG-CPP-14", module:"C++", source:"程序改错 / iomanip", type:"single", stem:"下面代码想让两个数字都占 6 列宽，问题在哪里？", code:"cout << setw(6) << 12 << 345;", options:["`setw` 只影响紧随其后的一次输出，第二个数前也要写 `setw(6)`","setw 会永久改变所有整数宽度","right 会清空 cout","iomanip 只能用于文件输出"], answer:["A"], explain:"`setw(n)` 是一次性格式控制器，只作用于下一次插入操作。要让两列都对齐，需要 `setw(6) << 12 << setw(6) << 345`。", freq:"高频", diff:"易错"},

      {id:"DBG-MPI-11", module:"MPI", source:"程序改错 / root 不一致", type:"single", stem:"下面集合通信为什么可能卡住或结果混乱？", code:"int root = rank;\nMPI_Bcast(&x, 1, MPI_INT, root, MPI_COMM_WORLD);", options:["同一通信器内参与者必须对 root 参数达成一致","MPI_Bcast 只能在 rank 0 调用","Bcast 必须带 tag","x 必须是 double"], answer:["A"], explain:"集合通信是协同调用。所有参与同一 `MPI_COMM_WORLD` 的进程应使用相同 root；每个进程 root 都不同会破坏匹配语义。", freq:"高频", diff:"易错"},
      {id:"DBG-MPI-12", module:"MPI", source:"程序改错 / 接收缓冲区", type:"single", stem:"下面代码的问题是什么？", code:"int *buf;\nMPI_Recv(buf, 10, MPI_INT, 0, 0, MPI_COMM_WORLD, MPI_STATUS_IGNORE);", options:["buf 没有指向有效存储空间，接收前应分配数组","MPI_Recv 不能接收 int","MPI_STATUS_IGNORE 不能使用","tag 只能写 1"], answer:["A"], explain:"MPI 接收缓冲区必须是可写的有效内存。只声明指针不会分配数组，应先 `std::vector<int> buf(10)` 或 `new int[10]`。", freq:"高频", diff:"易错"},
      {id:"DBG-MPI-13", module:"MPI", source:"程序改错 / Wait", type:"judge", stem:"`MPI_Isend` 发起后，若马上修改发送缓冲区而没有等待通信完成，可能造成发送数据不确定。", options:["正确","错误"], answer:["A"], explain:"非阻塞调用只是启动通信，不代表数据已经被 MPI 完全取走。复用或修改缓冲区前通常要 `MPI_Wait/Test` 确认完成。", freq:"高频", diff:"易错"},
      {id:"DBG-MPI-14", module:"MPI", source:"程序改错 / Reduce 结果", type:"single", stem:"下面代码在非 root 进程打印 `sum` 的问题是什么？", code:"MPI_Reduce(&local, &sum, 1, MPI_INT, MPI_SUM, 0, MPI_COMM_WORLD);\nprintf(\"%d\\n\", sum);", options:["`MPI_Reduce` 的结果只保证在 root 进程有效","Reduce 会自动让所有进程都有 sum","MPI_SUM 不能用于 int","printf 必须写在 MPI_Finalize 后"], answer:["A"], explain:"`MPI_Reduce` 是把结果归约到 root。若所有进程都要拿到结果，应使用 `MPI_Allreduce`。", freq:"高频", diff:"基础"},
      {id:"DBG-MPI-15", module:"MPI", source:"程序改错 / Comm_split", type:"single", stem:"使用 `MPI_Comm_split` 后，为什么还不能继续用旧的 rank 判断新组内身份？", code:"MPI_Comm_split(MPI_COMM_WORLD, color, key, &subcomm);\n// still use rank from MPI_COMM_WORLD as rank in subcomm", options:["新通信器内 rank 需要重新用 `MPI_Comm_rank(subcomm, &subrank)` 查询","Comm_split 会删除 MPI_COMM_WORLD","color 必须等于 rank","key 不能影响排序"], answer:["A"], explain:"通信器定义了编号空间。切分后新通信器有自己的 rank，旧 rank 只能表示世界通信器中的编号。", freq:"中高频", diff:"中等"},

      {id:"DBG-OMP-11", module:"OpenMP", source:"程序改错 / parallel for 变量", type:"single", stem:"下面求和程序最应该怎么改？", code:"int sum = 0;\n#pragma omp parallel for\nfor (int i = 0; i < n; ++i) {\n  sum += a[i];\n}", options:["使用 `reduction(+:sum)`","把 sum 改成 char","删除 parallel for","把 i 声明成 shared"], answer:["A"], explain:"多个线程同时更新 `sum` 会数据竞争。求和是典型规约，应写 `#pragma omp parallel for reduction(+:sum)`。", freq:"高频", diff:"基础"},
      {id:"DBG-OMP-12", module:"OpenMP", source:"程序改错 / single barrier", type:"judge", stem:"OpenMP `single` 默认末尾有隐式 barrier，除非使用 `nowait`。", options:["正确","错误"], answer:["A"], explain:"这是 `single` 和 `master` 的高频区别之一。`master` 不带默认 barrier，`single` 默认会等待其他线程。", freq:"高频", diff:"易错"},
      {id:"DBG-OMP-13", module:"OpenMP", source:"程序改错 / firstprivate", type:"single", stem:"下面代码希望每个线程从 x=5 的初值开始独立计算，最合适的子句是？", code:"int x = 5;\n#pragma omp parallel private(x)\n{\n  x += omp_get_thread_num();\n}", options:["把 `private(x)` 改成 `firstprivate(x)`","把 x 改成全局变量","使用 MPI_Bcast","把 parallel 改成 single"], answer:["A"], explain:"`private(x)` 创建未初始化的线程副本；`firstprivate(x)` 会用并行区外的 `x=5` 初始化每个线程副本。", freq:"高频", diff:"易错"},
      {id:"DBG-OMP-14", module:"OpenMP", source:"程序改错 / critical 粒度", type:"single", stem:"下面代码正确但可能很慢，主要原因是？", code:"#pragma omp parallel for\nfor (int i = 0; i < n; ++i) {\n  #pragma omp critical\n  out[i] = heavy(i);\n}", options:["critical 把每次循环写入都串行化，若各 i 独立通常不需要 critical","critical 会让数组越界","parallel for 不能调用函数","heavy 必须是 CUDA kernel"], answer:["A"], explain:"若每个线程写不同的 `out[i]`，通常没有共享写冲突。过度使用 `critical` 会把并行循环变成近似串行。", freq:"中高频", diff:"中等"},
      {id:"DBG-OMP-15", module:"OpenMP", source:"程序改错 / taskwait", type:"single", stem:"下面代码如果马上使用任务结果，缺少什么？", code:"#pragma omp parallel\n#pragma omp single\n{\n  #pragma omp task\n  compute(a);\n  use(a);\n}", options:["在 use(a) 前需要 `#pragma omp taskwait` 等任务完成","task 不能在 single 中创建","OpenMP 任务只能调用 printf","parallel 必须写在 task 后面"], answer:["A"], explain:"`task` 创建后可能异步执行。若后续代码依赖任务结果，应使用 `taskwait` 或其他同步保证任务完成。", freq:"中高频", diff:"易错"},

      {id:"DBG-GPU-13", module:"GPU/CUDA", source:"程序改错 / 二维索引", type:"single", stem:"二维 CUDA kernel 中，下面线性下标少考虑了什么？", code:"int x = threadIdx.x + blockIdx.x * blockDim.x;\nint y = threadIdx.y + blockIdx.y * blockDim.y;\nint idx = x + y;", options:["二维数组线性化通常应为 `idx = y * width + x`","threadIdx 不能有 y 维","blockIdx 只能用于一维","idx 必须等于 blockDim.x"], answer:["A"], explain:"二维坐标映射到一维数组时要乘以行宽。只写 `x + y` 会让不同坐标映射到同一位置。", freq:"高频", diff:"易错"},
      {id:"DBG-GPU-14", module:"GPU/CUDA", source:"程序改错 / 共享内存初始化", type:"single", stem:"下面使用共享内存时，读之前最应该补什么？", code:"__shared__ float tile[256];\ntile[threadIdx.x] = in[idx];\nfloat v = tile[(threadIdx.x + 1) % 256];", options:["写入 tile 后通常需要 `__syncthreads()` 再让其他线程读取","共享内存不能被读取","tile 必须用 cudaMalloc 分配","threadIdx.x 不能做数组下标"], answer:["A"], explain:"一个线程读别的线程刚写入的共享内存前，需要 block 内同步，否则可能读到旧值或未写入值。", freq:"高频", diff:"易错"},
      {id:"DBG-GPU-15", module:"GPU/CUDA", source:"程序改错 / 拷贝方向", type:"single", stem:"下面代码想把 GPU 结果拷回 CPU，方向参数应该是什么？", code:"cudaMemcpy(h_out, d_out, n*sizeof(float), cudaMemcpyHostToDevice);", options:["应改为 `cudaMemcpyDeviceToHost`","应改为 MPI_Gather","应把 h_out 放在 GPU 上","cudaMemcpy 不能拷贝 float"], answer:["A"], explain:"`h_out` 是主机端结果数组，`d_out` 是设备端数组。设备到主机应使用 `cudaMemcpyDeviceToHost`。", freq:"高频", diff:"基础"},
      {id:"DBG-GPU-16", module:"GPU/CUDA", source:"程序改错 / kernel 配置", type:"single", stem:"`kernel<<<N, 1>>>(...)` 对大数组通常有什么性能问题？", options:["每个 block 只有 1 个线程，并行度和占用率通常很差","grid 中不能有 N 个 block","kernel 只能用 <<<1,N>>>","CUDA 不能处理大数组"], answer:["A"], explain:"功能上可能能跑，但一个 block 一个线程无法充分利用 warp/SM。常见写法是每块 128/256 线程，再按 `(N+block-1)/block` 算 block 数。", freq:"中高频", diff:"中等"},
      {id:"DBG-GPU-17", module:"GPU/CUDA", source:"程序改错 / 错误检查", type:"judge", stem:"CUDA kernel 启动后最好检查错误并同步定位运行期错误；否则越界等问题可能到后续 API 才暴露。", options:["正确","错误"], answer:["A"], explain:"kernel 启动异步，错误也可能延后报告。调试时常用 `cudaGetLastError` 和 `cudaDeviceSynchronize` 缩小问题位置。", freq:"中高频", diff:"中等"},

      {id:"PERF-35", module:"综合/性能", source:"AI 代码审查", type:"multi", stem:"审查 AI 写出的并行代码时，下列哪些应优先人工检查？", options:["数组边界保护","共享变量是否数据竞争","MPI 通信 tag/source/root 是否一致","注释是否足够华丽"], answer:["A","B","C"], explain:"并行代码最危险的错误往往藏在边界、同步、通信匹配和作用范围里；注释漂亮不能替代正确性。", freq:"高频", diff:"易错"},
      {id:"PERF-36", module:"综合/性能", source:"模型辨析", type:"single", stem:"下面哪种错误最可能“结果正确但速度明显变慢”？", options:["OpenMP 伪共享","MPI 接收 tag 写错","CUDA 数组越界写","C++ 返回局部变量地址"], answer:["A"], explain:"伪共享通常不改变逻辑变量，只让缓存一致性反复失效；其他三项更偏正确性错误或未定义行为。", freq:"高频", diff:"易错"},
      {id:"PERF-37", module:"综合/性能", source:"同步范围", type:"single", stem:"把 `__syncthreads()` 当成 MPI 的全局屏障，根本误区是什么？", options:["混淆了同步作用范围：它只同步同一 CUDA block 内线程","CUDA 没有线程","MPI_Barrier 只能同步 GPU","__syncthreads 会修改数组值"], answer:["A"], explain:"并行模型的第一判断是“谁参与”。MPI 看通信器，OpenMP 看线程团队，CUDA `__syncthreads` 看 block。", freq:"高频", diff:"易错"},
      {id:"PERF-38", module:"综合/性能", source:"性能计算", type:"single", stem:"并行效率低但加速比仍大于 1，通常说明什么？", options:["并行化有收益，但处理器利用不充分或开销偏大","程序一定是错的","串行时间为 0","MPI 必须换成 CUDA"], answer:["A"], explain:"效率 `E=S/P` 衡量每个处理器贡献。S>1 表示比串行快，E 低说明通信、同步、负载不均或串行部分消耗了并行收益。", freq:"中高频", diff:"中等"},
      {id:"PERF-39", module:"综合/性能", source:"强弱扩展", type:"judge", stem:"弱扩展中，如果每个处理器分到的问题规模保持不变，理想情况下总运行时间应基本不变。", options:["正确","错误"], answer:["A"], explain:"弱扩展考察系统随处理器数和总问题规模一起增长时能否保持吞吐。强扩展才是固定总问题规模。", freq:"高频", diff:"基础"},
      {id:"PERF-40", module:"综合/性能", source:"程序纠错策略", type:"multi", stem:"定位并行程序错误时，下列哪些做法通常有帮助？", options:["先用小规模输入复现","检查通信/同步参与者是否一致","给共享变量访问加最小必要保护","只看编译器是否报错"], answer:["A","B","C"], explain:"并行错误常常能编译通过。小规模复现、检查参与范围、隔离共享写和边界访问，比只看编译错误更有效。", freq:"高频", diff:"易错"},

      {id:"WRITE-LNX-01", module:"Linux", source:"手写题 / 管道 grep", type:"write", stem:"手写一条命令：在当前目录下所有 `.cpp` 文件中查找包含 `MPI_Comm_rank` 的行，并显示行号。", answer:"参考写法：\n\n```bash\ngrep -n 'MPI_Comm_rank' *.cpp\n```\n\n评分点：`grep` 查内容，`-n` 显示行号，匹配对象是当前目录下的 `*.cpp`。如果要求递归，应写 `grep -R -n 'MPI_Comm_rank' .`。", explain:"这类题先判断是查内容还是查文件名：查内容用 `grep`，查文件名用 `find`。", freq:"高频", diff:"基础"},
      {id:"WRITE-LNX-02", module:"Linux", source:"手写题 / find + grep", type:"write", stem:"手写一条命令：递归查找当前目录下所有 `.h` 文件，并在这些文件中查找 `#pragma omp`。", answer:"参考写法：\n\n```bash\nfind . -name '*.h' -type f -print0 | xargs -0 grep -n '#pragma omp'\n```\n\n简化写法也可：\n\n```bash\ngrep -R -n --include='*.h' '#pragma omp' .\n```\n\n评分点：`find` 负责递归找文件，管道把文件列表交给后续处理；文件名可能含空格时，`-print0 | xargs -0` 更稳。", explain:"管道不是魔法，它只是把前一个命令的标准输出交给后一个命令的标准输入。`grep -R --include` 是更短的等价思路。", freq:"高频", diff:"易错"},
      {id:"WRITE-LNX-03", module:"Linux", source:"手写题 / 统计与排序", type:"write", stem:"手写一条命令：统计 `run.log` 中包含 `error` 的行数。再写一句说明管道在这里传递了什么。", answer:"参考写法：\n\n```bash\ngrep -i 'error' run.log | wc -l\n```\n\n评分点：`grep -i` 忽略大小写查内容，`wc -l` 统计行数；管道传递的是 `grep` 筛出的文本行，不是文件名本身。", explain:"很多同学会混淆“文件名列表”和“文件内容流”。管道传的是标准输出内容。", freq:"高频", diff:"中等"},
      {id:"WRITE-LNX-04", module:"Linux", source:"手写题 / Shell 改错", type:"write", stem:"指出下面脚本的问题并改正：", code:"for f in $(ls *.txt); do\n  grep error $f >> result.txt\ndone", answer:"参考答案：\n\n问题 1：`for f in $(ls *.txt)` 会按空白拆分，文件名含空格时会坏。\n问题 2：`$f` 没有加引号，也会被拆分。\n\n改法：\n\n```bash\nfor f in *.txt; do\n  grep 'error' \"$f\" >> result.txt\ndone\n```\n\n更稳的递归/复杂文件名方案可用 `find ... -print0`。", explain:"Shell 改错优先查变量引用是否加引号、是否错误解析 `ls` 输出、重定向是否覆盖或追加。", freq:"高频", diff:"易错"},

      {id:"WRITE-MPI-01", module:"MPI", source:"手写题 / 编译运行", type:"write", stem:"手写 MPI C++ 程序的常见编译和 4 进程运行命令。假设源文件是 `main.cpp`，可执行文件名为 `main`。", answer:"参考写法：\n\n```bash\nmpicxx main.cpp -o main\nmpirun -np 4 ./main\n```\n\n有些环境使用 `mpic++` 或 `mpiexec -n 4 ./main` 也可以。评分点：编译器包装器负责链接 MPI 库；运行时用 `-np` 或 `-n` 指定进程数。", explain:"考试问 MPI 编译运行时，要写出“编译包装器 + 多进程启动”两步，不要写成普通 `g++` 后直接运行。", freq:"高频", diff:"基础"},
      {id:"WRITE-MPI-02", module:"MPI", source:"手写题 / 函数参数", type:"write", stem:"写出 `MPI_Send(buf, count, datatype, dest, tag, comm)` 各参数含义，并指出 `tag` 和 `comm` 的作用。", answer:"参考答案：\n\n- `buf`：发送缓冲区起始地址。\n- `count`：发送元素个数，不是字节数。\n- `datatype`：元素类型，如 `MPI_INT`。\n- `dest`：目标进程在该通信器内的 rank。\n- `tag`：消息标签，用于区分同一对进程间不同消息。\n- `comm`：通信器，限定参与通信的进程集合和 rank 编号空间。\n\n关键判断：接收端的 `source/tag/comm/datatype/count` 要能与发送端匹配。", explain:"MPI 参数题要抓住通信匹配四件套：通信器、source/dest、tag、数据类型与数量。", freq:"高频", diff:"中等"},
      {id:"WRITE-MPI-03", module:"MPI", source:"手写题 / Recv 参数", type:"write", stem:"写出 `MPI_Recv(buf, count, datatype, source, tag, comm, status)` 各参数含义，并说明 `MPI_ANY_SOURCE` 和 `MPI_ANY_TAG` 的风险。", answer:"参考答案：\n\n- `buf/count/datatype`：接收缓冲区、最大接收元素个数和类型。\n- `source`：期望发送方 rank，可用 `MPI_ANY_SOURCE` 表示任意来源。\n- `tag`：期望消息标签，可用 `MPI_ANY_TAG` 表示任意标签。\n- `comm`：通信器。\n- `status`：返回实际来源、tag、错误状态和可查询的接收数量。\n\n风险：ANY 通配会放宽匹配条件，复杂程序中可能接到“不是你以为的那条消息”，需要结合 status 或协议设计确认。", explain:"通配符不是错，但会降低通信协议的可读性和可验证性。", freq:"高频", diff:"易错"},
      {id:"WRITE-MPI-04", module:"MPI", source:"手写题 / 集合通信改错", type:"write", stem:"下面代码有什么问题？如何修改？", code:"int root = rank;\nMPI_Bcast(&x, 1, MPI_INT, root, MPI_COMM_WORLD);", answer:"参考答案：\n\n问题：`MPI_Bcast` 是集合通信，同一通信器内所有参与进程必须对 `root` 参数一致。这里 `root = rank` 导致每个进程认为自己是 root，调用语义不匹配，可能卡住或结果错误。\n\n改法：\n\n```c\nint root = 0;\nMPI_Bcast(&x, 1, MPI_INT, root, MPI_COMM_WORLD);\n```\n\n并保证 root 进程上的 `x` 在广播前已经赋好值。", explain:"集合通信题先问：谁参与？通信器是否相同？root 是否一致？调用顺序是否一致？", freq:"高频", diff:"易错"},
      {id:"WRITE-MPI-05", module:"MPI", source:"手写题 / 非阻塞改错", type:"write", stem:"指出下面非阻塞通信的 bug，并给出修改思路。", code:"MPI_Isend(buf, n, MPI_DOUBLE, 1, 0, MPI_COMM_WORLD, &req);\nfor (int i = 0; i < n; ++i) buf[i] = 0.0;\nMPI_Wait(&req, MPI_STATUS_IGNORE);", answer:"参考答案：\n\nbug：`MPI_Isend` 只是发起发送，不保证数据已经被 MPI 取走；在 `MPI_Wait` 前修改 `buf`，可能改变正在发送的数据。\n\n修改思路：\n\n```c\nMPI_Isend(buf, n, MPI_DOUBLE, 1, 0, MPI_COMM_WORLD, &req);\nMPI_Wait(&req, MPI_STATUS_IGNORE);\nfor (int i = 0; i < n; ++i) buf[i] = 0.0;\n```\n\n或者使用独立发送缓冲区，等通信完成后再复用。", explain:"非阻塞通信的核心口诀：启动不等于完成，Wait/Test 前缓冲区不能随意复用。", freq:"高频", diff:"易错"},
      {id:"WRITE-MPI-06", module:"MPI", source:"手写题 / Reduce vs Allreduce", type:"write", stem:"写出 `MPI_Reduce` 和 `MPI_Allreduce` 的差别，并说明下面代码为什么只有 root 能安全使用 `sum`。", code:"MPI_Reduce(&local, &sum, 1, MPI_INT, MPI_SUM, 0, MPI_COMM_WORLD);", answer:"参考答案：\n\n`MPI_Reduce` 把各进程数据按运算规约到 `root`，只有 root 的接收缓冲区结果有效。\n`MPI_Allreduce` 等价于规约后再把结果分发给所有进程，所有进程都能得到结果。\n\n因此上面的 `sum` 只保证在 rank 0 有最终值；若每个进程都要用，应改为：\n\n```c\nMPI_Allreduce(&local, &sum, 1, MPI_INT, MPI_SUM, MPI_COMM_WORLD);\n```", explain:"Reduce/Allreduce 的区别不是加法本身，而是结果可见范围。", freq:"高频", diff:"基础"},

      {id:"WRITE-OMP-01", module:"OpenMP", source:"手写题 / 编译运行", type:"write", stem:"手写 OpenMP C++ 程序的常见编译命令，并写出运行时设置 8 个线程的命令。假设源文件是 `main.cpp`。", answer:"参考写法：\n\n```bash\ng++ -fopenmp main.cpp -o main\nexport OMP_NUM_THREADS=8\n./main\n```\n\n有些编译器选项不同，例如 MSVC 用 `/openmp`。评分点：编译时要打开 OpenMP 支持，运行时可用环境变量控制默认线程数。", explain:"OpenMP 和 MPI 最大区别之一：OpenMP 通常仍是一个进程内多线程运行，不需要 `mpirun -np` 启多个进程。", freq:"高频", diff:"基础"},
      {id:"WRITE-OMP-02", module:"OpenMP", source:"手写题 / reduction 改错", type:"write", stem:"下面求和代码有什么错误？请写出推荐修改。", code:"int sum = 0;\n#pragma omp parallel for\nfor (int i = 0; i < n; ++i) {\n  sum += a[i];\n}", answer:"参考答案：\n\n错误：多个线程同时读改写共享变量 `sum`，存在数据竞争，结果不确定。\n\n推荐修改：\n\n```c\nint sum = 0;\n#pragma omp parallel for reduction(+:sum)\nfor (int i = 0; i < n; ++i) {\n  sum += a[i];\n}\n```\n\n评分点：求和、最大值、最小值这类合并操作优先想到 `reduction`，而不是手写大范围 `critical`。", explain:"OpenMP 改错题先看共享变量写入，再看 private/firstprivate/reduction 是否合适。", freq:"高频", diff:"基础"},
      {id:"WRITE-OMP-03", module:"OpenMP", source:"手写题 / private 参数", type:"write", stem:"解释 `private(x)`、`firstprivate(x)`、`shared(x)` 的区别，并说明什么时候会用错。", answer:"参考答案：\n\n- `shared(x)`：所有线程访问同一个 `x`。\n- `private(x)`：每个线程有自己的 `x` 副本，进入并行区时初值通常未定义。\n- `firstprivate(x)`：每个线程有自己的 `x` 副本，并用进入并行区前的值初始化。\n\n易错点：如果希望线程私有但继承原始初值，不能只写 `private`，应写 `firstprivate`；如果共享变量被多个线程写，可能需要同步或 reduction。", explain:"数据环境题本质是在问：这个变量是谁的？初值从哪里来？最后结果是否要合并？", freq:"高频", diff:"易错"},
      {id:"WRITE-OMP-04", module:"OpenMP", source:"手写题 / single master task", type:"write", stem:"解释 `single`、`master`、`task`、`taskwait` 的作用，并指出 `single` 和 `master` 的默认同步差别。", answer:"参考答案：\n\n- `single`：线程团队中任意一个线程执行该区域，默认末尾有隐式 barrier，可用 `nowait` 去掉。\n- `master`：只有主线程执行该区域，默认没有隐式 barrier。\n- `task`：创建一个可异步执行的任务，适合递归、不规则工作。\n- `taskwait`：等待当前任务创建的直接子任务完成。\n\n易错点：创建任务不等于任务已经完成；使用任务结果前要考虑 `taskwait` 或依赖关系。", explain:"OpenMP 任务题常考“创建”和“完成”的区别，和 MPI 非阻塞通信有类似判断味道。", freq:"中高频", diff:"易错"},
      {id:"WRITE-OMP-05", module:"OpenMP", source:"手写题 / schedule", type:"write", stem:"说明 `schedule(static)`、`schedule(dynamic)`、`schedule(guided)` 分别适合什么循环负载，并解释 chunk size 的含义。", answer:"参考答案：\n\n- `static`：迭代工作量接近时适合，分配开销小，可预测性强。\n- `dynamic`：线程做完一块再取下一块，适合每次迭代耗时差异大、负载不均的循环。\n- `guided`：开始块较大，随后逐渐变小，试图兼顾开销和负载平衡。\n- chunk size：每次分给线程的一段连续迭代块大小，例如 `schedule(static, 2)` 表示每块 2 次迭代。\n\n评分点：调度选择看负载形状，不是看哪个名字更高级。", explain:"调度题本质是性能判断：均匀负载少调度开销，不均匀负载要更细地动态分配。", freq:"高频", diff:"中等"},

      {id:"WRITE-PERF-01", module:"综合/性能", source:"手写题 / 并行代码审查", type:"write", stem:"给你一段 AI 生成的 MPI/OpenMP 混合程序，简述你会按什么顺序人工审查它。至少写 6 个检查点。", answer:"参考答案可包含：\n\n1. MPI 初始化/结束是否成对：`MPI_Init`、`MPI_Finalize`。\n2. `rank/size` 是否来自正确通信器。\n3. 点对点通信的 `source/dest/tag/comm/count/datatype` 是否匹配。\n4. 集合通信是否同一通信器内进程共同调用，root 和调用顺序是否一致。\n5. 非阻塞通信是否在缓冲区复用前 `Wait/Test`。\n6. OpenMP 共享变量写入是否有 data race，是否应使用 `private/firstprivate/reduction`。\n7. 同步范围是否过大或过小，`critical/atomic/barrier/taskwait` 是否放对。\n8. 数组边界、循环范围和内存生命周期是否安全。\n9. 小规模输入能否复现，输出是否可与串行版本对拍。\n\n评分点：要覆盖通信、同步、共享数据、边界和验证方法。", explain:"这类题正对老师强调的 AI 时代纠错能力：不要只看代码能不能编译。", freq:"高频", diff:"易错"}

          {title: "10-C++语言介绍：为什么学 C++", items: ["课件强调 C++ 允许写出接近硬件极限性能的代码，因此适合科学计算和并行程序。", "C++ 以 C 为基础，支持面向对象；类是对象的规范，对象是根据类构造出的实例。", "C++ 标准化保证可移植性，常见编译器包括 g++、clang++ 等。"]},
          {title: "10-Hello World 与输入输出", items: ["每个 C++ 程序通常从 `int main()` 开始，`return` 表示函数返回或结束。", "`#include <iostream>` 引入输入输出支持；`cout` 是标准输出流，`cin` 是标准输入流。", "考试看到 `setw/right/setprecision` 要想到格式控制，看到 `cin/cout` 要想到流插入/提取运算符。"]},
          {title: "10-数据类型与类型转换", items: ["数据类型规定数据大小、可执行操作和代码含义；整型、浮点型、字符型、bool 要分清。", "`int` 范围有限，溢出可能出错；`float/double` 用于小数，`0.01` 默认常可看作 double。", "显式类型转换包括 `static_cast`、`const_cast`、`reinterpret_cast`、`dynamic_cast`；不同转换安全性不同，精度可能丢失。"]},
          {title: "11-STL、string 与标准库意识", items: ["STL 是标准模板库，借助模板提供容器、算法、迭代器、仿函数等工具。", "课件提醒并行编程中 STL 容器默认非线程安全，不能因为是标准库就忽略并发访问风险。", "`std::string` 支持拼接、查找、替换、删除，可与 C 风格字符串互转；数组下标仍从 0 开始。"]},
          {title: "11-屏幕输入输出与文件交互", items: ["输入输出章节关注屏幕输入输出、文件流和格式控制。", "`fstream` 用于文件交互；`iomanip` 提供格式控制工具，例如 `setw` 只影响紧随其后的一次输出。", "做题时要分清头文件职责：`iostream` 管标准输入输出，`fstream` 管文件流，`iomanip` 管格式控制。"]},
          {title: "12-函数：声明、定义、调用", items: ["函数是一组接受输入、进行计算并产生输出的语句；只有被调用时才运行。", "要使用函数通常需要函数定义、函数原型/声明、函数调用；声明告诉编译器名字、参数和返回类型。", "形参和实参要区分；函数声明中可省略形参名，但函数实现中必须提供变量名。"]},
          {title: "12-类、对象与封装", items: ["OOP 关键特征包括类、对象、封装、继承、多态、抽象。", "类是对象蓝图，定义数据成员和成员函数；定义类本身不分配对象内存，实例化对象时才分配。", "封装把数据和操作它们的函数绑定起来，隐藏内部细节，只暴露接口。"]},
          {title: "12-构造、析构、static 与访问限定符", items: ["构造函数与类同名、无返回类型、创建对象时自动调用；可有默认构造、复制构造、参数化构造。", "析构函数名前加 `~`，无参数无返回值，通常用于对象销毁和资源释放。", "`static` 成员只有唯一副本，静态成员函数没有 `this` 指针；`public/private/protected` 控制访问范围。"]},
          {title: "12-运算符重载与类代码阅读", items: ["运算符重载让用户定义类型像基本类型一样使用运算符，例如为类定义 `operator<<` 输出。", "课件例子中 `operator<<` 定义在类外，不是成员函数，常需要返回 `ostream` 引用以支持链式输出。", "读类代码时要找构造函数、析构函数、成员变量生命周期、复制赋值是否处理了动态内存。"]},
          {title: "13-指针、数组与引用", items: ["指针存的是地址，64 位机器上通常占 8 字节，不是实际变量值。", "创建指针变量只分配存地址的空间，不会自动分配它指向的数据空间；野指针不是空指针，而是指向不确定地址。", "数组传参会退化为首元素指针，因此经常需要指针 + 长度一起传；引用必须绑定有效对象。"]},
          {title: "13-new/delete、堆栈与内存泄漏", items: ["`new` 先申请内存再调用构造函数；`delete` 先调用析构函数再释放内存。", "`new[]` 必须配 `delete[]`，`new` 配 `delete`，`malloc` 配 `free`；不要重复 delete，不要 delete 非 new 内存。", "堆内存生命周期不受函数作用域限制，由开发者释放；内存泄漏可用 valgrind 等工具查。"]},
          {title: "13-RAII、vector 与智能指针", items: ["RAII 思想是在构造/初始化时获取资源，在析构时自动释放资源。", "`vector` 可避免大量手写 new/delete 数组管理，课件用它展示不需要手动 delete 的容器思路。", "智能指针把裸指针封装成栈上对象，生命周期结束时自动释放，减少内存泄漏、野指针和重复释放。"]},
          {title: "14-静态多态：重载与模板", items: ["函数重载是在同一作用域内同名但参数列表不同，返回值不同本身不能构成重载。", "模板在编译期实例化，支持类型无关的函数/类；函数模板常可自动推导类型，类模板在 C++11 中通常需显式写类型。", "模板具有“传染性”：内部使用模板类型时，外层类/函数往往也要写成模板。"]},
          {title: "14-动态多态：继承、虚函数与抽象类", items: ["继承让派生类复用基类属性和方法；公有继承表达 is-a 关系。", "动态多态通过虚函数和动态绑定实现：基类指针或引用调用虚函数时，实际调用派生类重写版本。", "纯虚函数写作 `virtual void f() = 0;`，含纯虚函数的类是抽象类，不能直接创建对象。"]},
          {title: "C++ 改错总清单：按课件顺序排查", items: ["基础：头文件是否匹配、类型是否正确、数组下标是否从 0 到 n-1。", "类：构造/析构是否管理资源，static 函数是否误用普通成员，访问限定符是否理解错。", "内存/多态：new/delete 是否配对，是否返回局部变量地址，基类析构是否需要 virtual。"]}
        ]
      },
      "MPI": {
        title: "MPI 并行通信",
        subtitle: "按 02：MPI 文件夹中的 20-25 讲 PPT/TXT 课件顺序整理。",
        source: "02： MPI/20-MPI基础知识.txt；21-MPI使用建议.txt；22-MPI点对点通讯.txt；23-MPI集合通讯.txt；24-MPI集合通讯2.txt；25-MPI进程组划分和通信.txt",
        blocks: [
          {title: "20-MPI基础知识：从硬件到消息传递", items: ["课件先从本机硬件、多核处理和科学计算需求引入：MPI适合跨节点/跨进程通信。", "MPI = Message Passing Interface，是标准化、可移植的消息传递接口规范，不是某种编程语言。", "MPI 主要理念：计算机由若干可相互传递消息的进程组成；每个进程有私有存储空间，这一点和 OpenMP 共享内存不同。"]},
          {title: "20-Hello World：通信域、rank、size", items: ["`MPI_COMM_WORLD` 表示默认通信域；在 MPI 中通常只能与同一通信器内的进程通信。", "`MPI_Comm_size` 获取通信域中进程数；`MPI_Comm_rank` 获取当前进程在该通信域中的唯一编号，范围为 0 到 size-1。", "Hello World 输出顺序不保证按 rank 排列，课件用它展示并行程序执行的不确定交错。"]},
          {title: "20-常用函数：计时、同步与异常结束", items: ["`MPI_Wtime` 测墙钟时间，但不同进程调用值不应直接比较为全局同步时间。", "`MPI_Barrier` 让通信器内所有进程都到达后再继续，是同步工具，不是通信匹配错误的修复工具。", "`MPI_Initialized`、`MPI_Get_version`、`MPI_Get_processor_name`、`MPI_Abort` 都是课件基础函数；`MPI_Abort` 会终止通信器中的相关进程。"]},
          {title: "21-MPI使用建议：编译、运行、调试习惯", items: ["C++ 常用 `mpicxx` 编译，运行常见 `mpirun -np N ./program`；不要把普通单进程运行和 MPI 多进程运行混在一起判断。", "调试输出建议带上 rank、size、processor name，否则多个进程同时打印时很难定位问题。", "课程反复强调先搭好 Init、rank/size 查询、通信计算、Finalize 的程序骨架，再逐步加入复杂通信。"]},
          {title: "22-点对点通信：信封模型和匹配条件", items: ["点对点通信是两个进程参与：一方发送，一方接收；可以类比信封，收件人、寄件人、标签和通信域要能对上。", "`MPI_Send` 关注 buf、count、datatype、dest、tag、comm；`MPI_Recv` 关注 buf、count、datatype、source、tag、comm、status。", "考试改错优先查 comm、source/dest、tag，再查 count/datatype 和接收缓冲区是否有效。"]},
          {title: "22-点对点通信：阻塞、非阻塞和死锁", items: ["标准阻塞发送的返回时机可能受消息大小和实现影响；同步发送、缓冲发送、就绪发送的语义要分清。", "`MPI_Isend/Irecv` 只是创建通信请求，缓冲区在 `Wait/Test/Waitall` 确认完成前不能随意修改或释放。", "两个进程都先大消息阻塞发送、再接收，可能互相等待；可考虑 `MPI_Sendrecv`、先贴接收、非阻塞通信或改变收发顺序。"]},
          {title: "23-集合通信：范围、类别和同步感", items: ["集合通信面向通信器内一组进程，用于通信、同步和计算；课件把它分为数据移动、规约、同步三类。", "集合通信例程必须涉及通信器内相关进程；它们通常不接受 tag 参数，不能按点对点通信那套 tag 匹配思路理解。", "本课程课件说明主要讨论阻塞集合操作；做题时默认所有相关进程都要协同调用。"]},
          {title: "23-Bcast/Reduce：广播与规约", items: ["`MPI_Bcast` 是 root 把数据广播给其他进程，适合让所有进程获得同一配置或参数。", "`MPI_Reduce` 把各进程数据按操作规约到 root；结果只保证在 root 有效，非 root 打印结果是高频错误。", "`MPI_Allreduce` 可理解为 Reduce + Bcast 的效果：所有进程都能拿到全局结果。"]},
          {title: "23-Scatter/Gather：分发与集中", items: ["`MPI_Scatter` 从 root 的大数组切块分发给每个进程；`MPI_Gather` 像收考卷，把每个进程的数据集中到 root。", "课件特别提示 Scatter 示例隐患：`N/size` 整除假设可能丢元素，size>N 时 local vector 可能为空，`.data()` 传入 MPI 可能出问题。", "root 的发送/接收缓冲区容量要按所有进程总数据量设计，非 root 侧参数也要符合集合通信调用约定。"]},
          {title: "24-集合通信2：Reduce_scatter/Allgather/Alltoall", items: ["`MPI_Reduce_scatter` 先对各进程数组做规约，再按 counts 数组把结果分发给各进程；counts 在所有调用进程中必须一致理解。", "`MPI_Allgather` 收集所有进程的数据，并让每个进程都得到组合后的全量数据。", "`MPI_Alltoall` 是全交换：每个进程向所有进程发送一定量数据，也从所有进程接收数据。"]},
          {title: "24-Scan 与性能实验意识", items: ["`MPI_Scan` 做前缀规约：每个 rank 得到从较小 rank 到自己的累计结果，可用于前缀和等问题。", "课件用计算圆周率例子做墙钟时间和加速比实验，提醒不要只会写通信 API，还要会读并行效率。", "做性能题要分清：串行部分、通信开销、同步等待、负载不均分别可能拖慢程序。"]},
          {title: "25-通信器划分：Comm_split 的 color/key", items: ["`MPI_Comm_split` 可把 `MPI_COMM_WORLD` 拆成互不重叠的子通信器，例如按 rank 奇偶分组。", "`color` 决定进程进入哪个新通信器；`key` 决定同一 color 组内新 rank 的升序排列，key 可不连续，若相同则原 rank 小者优先。", "新通信器内执行 Reduce 时，root=0 指的是新通信器的 0 号，不一定是原 `MPI_COMM_WORLD` 的 0 号。"]},
          {title: "25-进程组 Group 与通信器 Comm", items: ["课件明确区分：`MPI_Group` 只记录有哪些进程、原 rank 是多少，不能直接通信。", "`MPI_Comm` 在进程组基础上附加通信上下文，才能做 Send/Recv/Allreduce 等通信。", "可用 `MPI_Comm_group` 取通信器的组，用 `MPI_Group_incl/union/intersection` 构造组，再用 `MPI_Comm_create` 创建通信器。"]},
          {title: "25-释放资源与参与者规则", items: ["`MPI_Comm_free` 释放不再使用的通信器；长期频繁拆分不释放可能造成句柄泄漏、程序变慢或无法创建新通信器。", "`MPI_Group_free` 释放进程组，句柄会变为 `MPI_GROUP_NULL`。", "`MPI_Comm_create` 这类调用必须由原 comm 中所有进程参与；只让 rank 0 调用、其他进程跳过，是典型卡住/错误来源。"]},
          {title: "MPI 改错总清单：按课件顺序排查", items: ["基础骨架：是否 Init 后才调用 MPI，是否所有正常进程都能到 Finalize，输出是否带 rank。", "点对点：comm、source/dest、tag、datatype/count、buffer、status 是否匹配；非阻塞通信是否 Wait。", "集合/分组：参与者是否一致，root 是否是当前通信器编号，counts 是否一致，Group 和 Comm 是否混用。"]}
        ]
      },
      "OpenMP": {
        title: "OpenMP 共享内存并行",
        subtitle: "按 03：OpenMP 文件夹中的 30-37 讲 PPT/TXT 课件顺序整理。",
        source: "03： OpenMP/30-OpenMP编程模型.txt；31-OpenMP并行构造.txt；32-OpenMP同步.txt；33-OpenMP并行调度.txt；34-OpenMP数据环境.txt；35-OpenMP3.0与任务.txt；36-OpenMP内存模型.txt；37-OpenMP和SIMD.txt",
        blocks: [
          {title: "30-编程模型：进程、线程与共享内存", items: ["课件先对比进程和线程：进程资源独立，线程继承进程资源并共享内存，调度和创建开销更小。", "OpenMP 是面向共享内存的多 CPU 多线程并行编程接口，线程通过共享变量交互，通过同步机制协同。", "课程建议：OpenMP 语法短，但真正困难是写出正确、简洁、负载均衡的并行代码。"]},
          {title: "30-Hello World 与 Fork-Join", items: ["`#pragma omp parallel` 进入并行区，主线程 fork 出线程团队，结构块结束后 join 回主线程。", "不同线程的 `cout` 输出顺序可能交错；每个线程内部顺序存在，不代表线程间输出有序。", "编译常用 `-fopenmp`；如果程序里未显式指定线程数，运行时可能默认用满逻辑 CPU。"]},
          {title: "30-OpenMP 三要素", items: ["编程指导语句：例如 `#pragma omp parallel [clause...]`，配合结构化代码块。", "库函数：例如设置线程数、获得线程编号、获得线程组大小；设置默认线程数后会影响后续并行区域，直到被覆盖。", "环境变量：例如 `OMP_NUM_THREADS`；课后练习点就是环境变量和程序设置冲突时线程数如何决定。"]},
          {title: "31-线程数优先级与 SPMD 手动划分", items: ["31 讲先问 OpenMP 线程数如何决定，并通过不同位置设置线程数展示优先级。", "SPMD 思路在 OpenMP 中也可用：每个线程取自己的 id 和线程总数，再按 id 手动划分工作。", "课件用积分/π 例子展示周期分布和块状分布；这能帮助理解后续 `omp for` 自动划分。"]},
          {title: "31-共享工作循环构造", items: ["`#pragma omp for` 是工作共享构造，负责把 for 循环迭代分配给已有线程团队。", "`#pragma omp parallel for` 是组合式构造，等价于创建线程团队并立即分割循环，是课件强调的常见编程样式。", "OpenMP 会把共享工作循环构造的循环控制变量私有化；但嵌套在里面的其他循环索引不一定自动私有化。"]},
          {title: "31-规约 reduction", items: ["规约用于把每个线程的局部结果合并为全局结果，典型例子是求和、最大最小。", "课件强调 OpenMP 会为每个线程创建规约变量副本，最后在构造末尾合并。", "共享工作构造末尾有隐式 barrier；这也是 reduction 得到最终结果前需要等待所有线程完成的原因。"]},
          {title: "32-同步：数据竞争的根源", items: ["数据竞争来自两个以上线程访问同一内存区域且至少一个线程写，结果可能每次运行都不同。", "同步用于让线程在时间上达成一致；课件把同步分为互斥同步和事件同步。", "核心判断：并发写共享变量如果没有 reduction、atomic、critical 或其他同步，就高度可疑。"]},
          {title: "32-critical 与 atomic", items: ["`critical` 创建临界区，保护代码块，同一时刻最多一个线程执行，但可能显著串行化。", "`atomic` 是微型 critical，通常只保护一个表达式/单条读改写，能用 atomic 的场合通常比 critical 开销低。", "课件提醒：atomic 不能像 critical 那样用 `{}` 包住多行；同一数据不要混用 atomic 和 critical 做混乱保护。"]},
          {title: "32-barrier/nowait/ordered/collapse", items: ["事件同步包括显式 barrier 和隐式 barrier；parallel、single、sections 等构造末尾常带隐式等待。", "`nowait` 可消除不必要的 barrier，但如果后续依赖前面结果，会引入时序错误。", "`ordered` 子句和 ordered 构造必须同时存在才起作用；`collapse` 展开多重循环时，循环之间必须没有依赖。"]},
          {title: "33-并行调度 schedule", items: ["schedule 子句决定并行循环迭代如何映射到线程；课件重点讲 static 和 dynamic，也提到 guided、auto。", "`schedule(static[,chunk])` 静态划分，chunk 固定，适合每次迭代耗时接近、追求低调度开销的循环。", "`schedule(dynamic[,chunk])` 线程完成一块后再取下一块，负载均衡更好，但运行时调度开销高；guided 的 chunk 会逐渐缩小。"]},
          {title: "34-数据环境：shared/private 的真实判断", items: ["OpenMP 是共享内存模型；并行区外定义的变量默认通常 shared，并行区内局部变量默认通常 private。", "课件特别指出：堆变量通常共享，线程栈中的变量通常私有；函数形参本身可能私有，但它指向的主线程数组可能共享。", "真实代码需要人、编译器和 AI 一起辨认变量属性，不能只看变量名。"]},
          {title: "34-数据子句与 default(none)", items: ["`shared` 明确声明共享变量，虽然有些变量默认共享，但显式列出是好习惯。", "`private` 每线程一份副本，初值通常不可依赖；`firstprivate` 用外部初值初始化副本；`lastprivate` 把逻辑最后一次迭代的值带出。", "`default(none)` 是查错工具：进入并行区域的变量必须显式列入 private、firstprivate、reduction 或 shared。"]},
          {title: "35-single、sections 与 task", items: ["`single` 是线程组中一个线程执行的共享工作构造，其他线程默认在末尾隐式 barrier 等待，可用 nowait 调整。", "sections 是固定数量代码块的静态划分，很像并行 switch；它不是用来自动划分 for 迭代的主工具。", "OpenMP 3.0 引入 task 来处理不规则问题和递归问题，例如链表遍历、二叉树、递归拆分计算 π。"]},
          {title: "35-task 的执行和数据环境", items: ["task 是独立于线程的工作单元，由结构化块代码和任务数据环境组成；创建后可被任意线程抽取执行。", "典型模式：在 parallel 内用 single 只让一个线程启动递归/生成任务，其他线程等待或抢任务执行，避免所有线程重复创建同一批任务。", "`taskwait` 用于保证依赖关系；task 的 shared/private/firstprivate 绑定的是任务数据环境，不是简单绑定到某个线程。"]},
          {title: "36-内存模型与伪共享", items: ["伪共享来自不同线程写不同变量，但这些变量落在同一缓存行，缓存一致性协议反复失效导致程序很慢。", "缓解方法包括只读共享数据、变量内存对齐、填充字节或改变数据布局。", "OpenMP 使用宽松内存一致性模型，否则每次共享变量更新都强制全层次一致会带来巨大管理开销。"]},
          {title: "36-flush 与 MPI-OpenMP 混合", items: ["内存模型包含三类规则：限制共享变量读写的指令、线程间顺序约束、让线程临时视图与内存一致的方法。", "`flush` 强制线程变量临时视图与内存保持一致，但它不是线程间同步操作；需要和同步操作结合才安全。", "混合编程中通常 MPI 负责分布式内存通信，OpenMP 负责节点内共享内存并行；课件例子用 rank 和 thread id 一起组织输出和数据收集。"]},
          {title: "37-SIMD 与 OpenMP", items: ["SIMD = Single Instruction Multiple Data，是数据级并行：一条指令用向量寄存器同时处理多个数据。", "SSE/AVX/AVX512 体现向量宽度逐步变大；`-O2/-O3` 可能触发更积极的自动向量化。", "`#pragma omp simd` 是提示/要求编译器向量化循环，不是创建 OpenMP 线程团队；它和 `parallel for` 属于不同层次，可组合但不能混为一谈。"]},
          {title: "OpenMP 改错总清单：按课件顺序排查", items: ["先判断模型：这是线程共享内存问题，还是 MPI 进程消息传递问题。", "再找变量：共享写、循环变量、函数形参指针、private 初值、lastprivate 写回、default(none) 缺项。", "最后看执行：隐式 barrier、nowait、ordered/collapse 条件、taskwait 依赖、schedule 是否导致性能问题。"]}
        ]

          {title: "40-GPU架构：SM、CUDA 核心与 warp", items: ["GPU 架构围绕 SM（流式多处理器）组织，每个 SM 可支持大量线程并发执行。", "课件以 Fermi/GTX 480 等架构解释：SM 内有 CUDA 核心、共享缓存/共享内存、warp 调度器等。", "GPU 可同时发起成千上万个线程，但这些线程通常以 warp/SIMT 模式被调度执行。"]},
          {title: "40-CUDA 编程模型总览", items: ["CUDA 是 NVIDIA 推出的并行计算平台和编程模型，支持 CUDA C/C++/Fortran、Numba、CuPy 等生态。", "线程层次：Thread → Block → Grid；执行模型：CPU 调用 kernel，GPU 多线程执行 kernel。", "内存模型包含全局内存、共享内存、常量内存等；API 提供内存管理、数据传输、事件管理等能力。"]},
          {title: "41-查看 GPU 与异构并行流程", items: ["`nvidia-smi` 用于查看 GPU 状态，课件提到温度过高会导致频率下降。", "CPU-GPU 异构流程：CPU 数据拷贝到 GPU 显存，调用核函数，结果从 GPU 拷贝回 CPU。", "经典五步：`cudaMalloc` → `cudaMemcpy(HostToDevice)` → `kernel<<<...>>>` → `cudaMemcpy(DeviceToHost)` → `cudaFree`。"]},
          {title: "41-核函数与启动语法", items: ["核函数以 `__global__` 标识，由 Host/CPU 端调用，由 Device/GPU 端执行。", "核函数会被发起的每个 CUDA 线程执行；`kernel_func<<<nblk, nthread>>>(param, ...)` 指定 block 数和每块线程数。", "CUDA 程序常用 `nvcc` 编译；`cudaDeviceReset` 可显式释放和清空当前设备状态。"]},

          {title: "41-CPU 线程与 GPU 线程差别", items: ["CPU 线程通常独立执行复杂任务，通信同步依赖互斥等机制；GPU 线程更适合简单、高度并行的任务。", "GPU 线程通常以 warp 为单位执行，同一 warp 中线程执行相同指令。", "核函数参数传值适合基本类型；指针参数通常应指向设备内存地址，kernel 中修改设备内存后再拷回 CPU。"]},
          {title: "42-全局内存、设备变量与拷贝方向", items: ["全局内存是显存，容量大、所有线程可访问，但访问延迟高、带宽相对慢。", "CPU 内存和 GPU 全局内存不互通，需用 `cudaMemcpy`；方向包括 HostToDevice、DeviceToHost、DeviceToDevice 等。", "`__device__` 设备变量在 GPU 全局内存中，主机端不能直接读写，要用 `cudaMemcpyToSymbol/FromSymbol`。"]},
          {title: "42-原子操作与数据竞争", items: ["GPU 上大量线程同时执行，多个线程无控制读写同一地址会产生数据竞争。", "CUDA 原子操作用于保证对共享地址的特定更新不可被打断，例如 `atomicAdd`。", "原子操作解决正确性但可能降低性能；能用分块规约/共享内存减少冲突时更好。"]},
          {title: "42-共享内存与设备函数", items: ["共享内存位于 SM，属于同一 block 内线程共享，访问延迟远低于全局内存。", "静态共享内存用 `__shared__`；动态共享内存大小由 kernel 启动第三个参数指定，单位是字节。", "`__device__` 设备函数只能从设备函数或 `__global__` 核函数中调用，本质上由 GPU 线程执行。"]},
          {title: "42-常量、纹理与统一内存", items: ["常量内存用于只读数据，对 warp 内统一访问有缓存/广播优势；主机端可修改，kernel 内只读。", "纹理内存偏向只读且具有空间局部性的访问模式，常见于图像/邻域访问。", "统一内存 `cudaMallocManaged` 简化 CPU/GPU 指针使用，但 GPU 写完后 CPU 读前仍需 `cudaDeviceSynchronize()`。"]},
          {title: "43-Warp 与分支发散", items: ["Warp 是 GPU 基本执行单元，通常 32 个线程；内建变量 `warpSize` 表示硬件 warp 大小。", "同一 warp 中线程原则上同时执行相同指令；如果分支选择不同，会分批执行，硬件利用率下降。", "分支发散通常是性能问题，不一定导致结果错误；考试要分清正确性风险和效率下降。"]},
          {title: "43-同步范围：syncwarp 与 syncthreads", items: ["`__syncwarp()` 同步同一 warp 内线程，可减少不必要的 block 级等待。", "`__syncthreads()` 同步整个 block 内所有线程，并带有块内内存栅栏效果。", "课件强调 `__syncthreads()` 严禁放在只有部分线程进入的分支中，否则部分线程等待、部分线程跳过，可能死锁。"]},
          {title: "43-延迟隐藏与线程调度", items: ["GPU 算术指令延迟相对较低，访存指令延迟可非常高；全局内存访问是常见瓶颈。", "GPU 调度器可在某个 warp 等待内存时切换到其他 warp 执行，用足够多活跃 warp 隐藏延迟。", "延迟隐藏不是让单次访存变快，而是让 GPU 在等待期间干别的活。"]},

    function loadFirstImage(imgId, fallbackId, candidates) {
      const img = $(imgId);
      const fallback = $(fallbackId);
      let index = 0;

      const tryNext = () => {
        if (index >= candidates.length) return;
        img.onload = () => {
          img.style.display = "block";
          fallback.style.display = "none";
        };
        img.onerror = () => {
          index += 1;
          tryNext();
        };
        img.src = candidates[index];
      };

      tryNext();
    }
    function save() {
      localStorage.setItem("ppd_answers", JSON.stringify(state.answers));
      localStorage.setItem("ppd_favorites", JSON.stringify(state.favorites));
      localStorage.setItem("ppd_mistakes", JSON.stringify(state.mistakes));

    function persistedState() {
      return {
        answers: state.answers,
        favorites: state.favorites,
        mistakes: state.mistakes,
        reviewStats: state.reviewStats,
        aiNotes: state.aiNotes,
        darkMode: state.darkMode,
        savedAt: Date.now()
      };
    }

    function applyPersistedState(data) {
      if (!data || typeof data !== "object") return;
      if (data.answers) state.answers = data.answers;
      if (data.favorites) state.favorites = data.favorites;
      if (data.mistakes) state.mistakes = data.mistakes;
      if (data.reviewStats) {
        state.reviewStats = {
          wrong: data.reviewStats.wrong || {},
          fav: data.reviewStats.fav || {}
        };

      if (data.aiNotes) state.aiNotes = data.aiNotes;
      if (typeof data.darkMode === "boolean") {
        state.darkMode = data.darkMode;
        localStorage.setItem("ppd_dark_mode", state.darkMode ? "true" : "false");
      }
    }

    function canUseServerState() {
      return location.protocol === "http:" || location.protocol === "https:";
    }

    function scheduleServerStateSave() {
      if (!canUseServerState()) return;
      clearTimeout(serverSaveTimer);
      serverSaveTimer = setTimeout(saveServerState, 350);
    }

    function saveServerState() {
      if (!canUseServerState()) return Promise.resolve();
      return fetch(`${location.origin}/api/state`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(persistedState())
      }).catch(() => {});
    }

    async function loadServerState() {
      if (!canUseServerState()) return false;
      try {
        const response = await fetch(`${location.origin}/api/state`);
        if (!response.ok) return false;
        const data = await response.json();
        if (!data || !data.savedAt) return false;
        applyPersistedState(data);
        localStorage.setItem("ppd_answers", JSON.stringify(state.answers));
        localStorage.setItem("ppd_favorites", JSON.stringify(state.favorites));
        localStorage.setItem("ppd_mistakes", JSON.stringify(state.mistakes));
        localStorage.setItem("ppd_review_stats", JSON.stringify(state.reviewStats));
        localStorage.setItem("ppd_ai_notes", JSON.stringify(state.aiNotes));
        return true;
      } catch {
        return false;
      }
    }
